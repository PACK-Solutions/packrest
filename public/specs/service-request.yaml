      name: service_request_id
      in: path
      required: true
      description: The unique identifier of the service request.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 7d2c9f63-3e72-46e5-bd1c-5d3f7494f210
    ServiceRequestTypeQuery:
      name: type
      in: query
      required: false
      description: Filter service requests by type.
      schema:
        $ref: '#/components/schemas/ServiceRequestType'
    ServiceRequestStatusQuery:
      name: status
      in: query
      required: false
      description: |
        Filter service requests by current status. Repeat the parameter to filter on
        several statuses at once (e.g. `?status=CANCELLED&status=APPROVED`); a service
        request matches when its status equals any of the supplied values. An unknown
        status value is rejected with `400 Bad Request`. When the parameter is omitted,
        service requests are returned regardless of status (no status filter applied).
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ServiceRequestStatus'
      example:
        - CANCELLED
        - APPROVED
    TargetResourceTypeQuery:
      name: target_resource_type
      in: query
      required: false
      description: Filter service requests by target resource type.
      schema:
        $ref: '#/components/schemas/TargetResourceType'
    TargetResourceIdQuery:
      name: target_resource_id
      in: query
      required: false
      description: Filter service requests by the target resource identifier.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
