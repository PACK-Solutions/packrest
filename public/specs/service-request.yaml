    DecisionReturned:
      summary: Send a service request back to the partner with new requirements
      description: |
        Reviewer is examining the ADDRESS_CHANGE SR `7d2c9f63-...` on individual
        `1f1a8119-...` and identifies two problems during manual review:
        1. The submitted proof of address is older than three months (the previously
           accepted document `6f1a6b9d-...` must be replaced by a recent one).
        2. The address line 1 does not match the address on the proof document.

        The reviewer also explicitly validates the postal code field, which was
        correct and requires no further action from the partner.

        Returning the SR with this mixed requirements list lets the partner fix
        the two blocking issues while clearly seeing what has already been accepted.
        The SR reopens in `REQUIRES_INFORMATION`; `rejections[]` stays empty.
      value:
        outcome: RETURNED_FOR_INFORMATION
        requirements:
          - code: address-change-proof
            kind: DOCUMENT
            state: INVALID
            error_code: BUSINESS_RULE_VIOLATION
            reason: 'Document rejected during manual review: the proof is older than three months.'
            accepted_document_types:
              - PROOF_OF_ADDRESS
            document:
              id: 6f1a6b9d-7c23-4f11-ae82-90b3c5d8e14a
              type: PROOF_OF_ADDRESS
          - code: address.line1
            kind: DATA_FIELD
            state: INVALID
            error_code: INCONSISTENT
            reason: The street address does not match the address shown on the submitted proof document. Adjust either the address or upload a matching proof.
            pointer: /address/line1
          - code: address.postal_code
            kind: DATA_FIELD
            state: VALIDATED
            reason: Postal code has been verified and matches the declared city.
            pointer: /address/postal_code
        review_note: Replacement proof of address must be dated within the last 3 months and match the declared street address.
