security:
  - oauth2: []
tags:
  - name: document
    description: |
      Manage documents as standalone resources — upload binary content via
      `multipart/form-data`, retrieve metadata and binaries, and access the full
      version history of each document.
paths:
  /documents:
    get:
      operationId: listDocuments
      description: |
        Retrieve a paginated list of documents available in the system.

        Optionally filter the results by attaching resource. Any combination
        of `contract_id`, `person_id`, and `payment_method_id` may be
        provided; multiple filters are combined with logical AND. When none
        is provided, all documents are listed.
      summary: List documents
      tags:
        - document
      security:
        - oauth2:
            - documents:read
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/ContractIdQuery'
        - $ref: '#/components/parameters/PersonIdQuery'
        - $ref: '#/components/parameters/PaymentMethodIdQuery'
      responses:
        '200':
          description: Paginated collection of documents.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/DocumentCollection'
              examples:
                paginatedResponse:
                  summary: A paginated response for documents
                  value:
                    _embedded:
                      documents:
                        - id: 4f1a8119-4e24-4460-a126-c79f8ed0017f
                          document_type: PROOF_OF_IDENTITY
                          person_id: 1f1a8119-4e24-4460-a126-c79f8ed0017f
                          version: 1
                          content:
                            original_filename: proof-of-identity.pdf
                            mime_type: application/pdf
                            size_bytes: 248173
                          created_at: 2024-05-15T10:32:18Z
                          updated_at: 2024-05-15T10:32:18Z
                          _links:
                            self:
                              href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f
                              method: GET
                            content:
                              href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f/content
                              method: GET
                            versions:
                              href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f/versions
                              method: GET
                    _links:
                      self:
                        href: /documents?page=2&limit=20
                        method: GET
                      first:
                        href: /documents?page=1&limit=20
                        method: GET
                      last:
                        href: /documents?page=5&limit=20
                        method: GET
                      next:
                        href: /documents?page=3&limit=20
                        method: GET
                      prev:
                        href: /documents?page=1&limit=20
                        method: GET
                    page:
                      size: 20
                      total_elements: 100
                      total_pages: 5
                      number: 2
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createDocument
      description: |
        Upload a new document in a single multipart request. The uploaded
        binary becomes version `1` of the new document; subsequent revisions
        go through `POST /documents/{id}`.

        The request body is `multipart/form-data` and combines the binary
        `file` part with the document metadata (`document_type`, at least one
        of `contract_id` / `person_id` / `payment_method_id`, optional
        `metadata`). The document must be attached to **at least one** owner at
        creation — supplying none is rejected with `400 Bad Request`
        (`code: MISSING`); two or three owners are allowed. The owner set is
        immutable afterwards.

        The `document_type` must be valid for at least one of the supplied
        owners (see the owner-scoped enums). A well-formed request whose
        `document_type` / owner pairing breaks that business rule is rejected
        with `422 Unprocessable Entity` (`code: UNPROCESSABLE`), not `400`.

        Two upload constraints are enforced and surface on dedicated HTTP
        status codes (never `400`):

        - File size is capped at `10000000` bytes (10 MB). Larger uploads
          are rejected with `413 Content Too Large`.
        - The `file` part's media type must belong to the whitelist declared
          under `encoding.file.contentType` (office documents, OpenDocument,
          RTF, plain text, CSV, Markdown, JSON, XML, common image formats,
          and standard archives). Other types — including executables,
          installers, and scripts — are rejected with
          `415 Unsupported Media Type`.
      summary: Create a new document
      tags:
        - document
      security:
        - oauth2:
            - documents:write
      requestBody:
        description: Multipart payload containing the binary file and the document metadata.
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentCreate'
            encoding:
              file:
                contentType: application/pdf, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-powerpoint, application/vnd.openxmlformats-officedocument.presentationml.presentation, application/vnd.oasis.opendocument.text, application/vnd.oasis.opendocument.spreadsheet, application/vnd.oasis.opendocument.presentation, application/rtf, text/plain, text/csv, text/markdown, application/json, application/xml, image/jpeg, image/png, image/gif, image/webp, image/svg+xml, image/tiff, image/bmp, image/heic, image/heif, application/zip, application/gzip, application/x-tar, application/x-7z-compressed, application/vnd.rar
      responses:
        '201':
          description: The document has been created.
          headers:
            Location:
              description: URL of the newly created document.
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
              example: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/DocumentResource'
              examples:
                documentCreated:
                  summary: A newly created document at version 1
                  value:
                    id: 4f1a8119-4e24-4460-a126-c79f8ed0017f
                    document_type: PROOF_OF_IDENTITY
                    person_id: 1f1a8119-4e24-4460-a126-c79f8ed0017f
                    version: 1
                    content:
                      original_filename: proof-of-identity.pdf
                      mime_type: application/pdf
                      size_bytes: 248173
                    created_at: 2024-05-15T10:32:18Z
                    updated_at: 2024-05-15T10:32:18Z
                    _links:
                      self:
                        href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f
                        method: GET
                      content:
                        href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f/content
                        method: GET
                      versions:
                        href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f/versions
                        method: GET
                paymentMethodMandate:
                  summary: A signed SEPA mandate attached to a payment method
                  value:
                    id: 8c2d4e6f-1a3b-5c7d-9e1f-3a5b7c9d1e3f
                    document_type: SEPA_MANDATE
                    payment_method_id: a2b4c6d8-1e3f-5a7b-9c1d-3e5f7a9b1c3d
                    version: 1
                    content:
                      original_filename: sepa-mandate.pdf
                      mime_type: application/pdf
                      size_bytes: 312540
                    created_at: 2024-06-10T14:22:05Z
                    updated_at: 2024-06-10T14:22:05Z
                    _links:
                      self:
                        href: /documents/8c2d4e6f-1a3b-5c7d-9e1f-3a5b7c9d1e3f
                        method: GET
                      content:
                        href: /documents/8c2d4e6f-1a3b-5c7d-9e1f-3a5b7c9d1e3f/content
                        method: GET
                      versions:
                        href: /documents/8c2d4e6f-1a3b-5c7d-9e1f-3a5b7c9d1e3f/versions
                        method: GET
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Content Too Large
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ContentTooLarge'
              examples:
                sizeExceeded:
                  summary: The uploaded file is larger than the 10 MB cap
                  value:
                    type: https://pack-solutions.com/probs/content-too-large
                    title: Content Too Large
                    status: 413
                    detail: Uploaded file size 15000000 bytes exceeds the maximum allowed of 10000000 bytes.
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnsupportedMediaType'
              examples:
                executableRejected:
                  summary: A Windows executable was submitted as the binary part
                  value:
                    type: https://pack-solutions.com/probs/unsupported-media-type
                    title: Unsupported Media Type
                    status: 415
                    detail: Media type "application/x-msdownload" is not in the accepted whitelist.
                unknownBinary:
                  summary: The client did not declare a MIME type for the binary part
                  value:
                    type: https://pack-solutions.com/probs/unsupported-media-type
                    title: Unsupported Media Type
                    status: 415
                    detail: Media type "application/octet-stream" is not in the accepted whitelist.
        '422':
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnprocessableEntity'
              examples:
                ownerTypeMismatch:
                  summary: The document_type is not valid for any of the supplied owners
                  value:
                    type: https://pack-solutions.com/probs/unprocessable-entity
                    title: Invalid document type for owner
                    status: 422
                    detail: "Document type 'MEMBERSHIP_FORM' cannot be attached to the provided owner (person_id). It is only valid for: contract_id."
                    errors:
                      - code: UNPROCESSABLE
                        detail: "Document type 'MEMBERSHIP_FORM' cannot be attached to the provided owner (person_id). It is only valid for: contract_id."
                        pointer: /document_type
                antivirusRejected:
                  summary: The uploaded file matched an antivirus signature
                  value:
                    type: https://pack-solutions.com/probs/unprocessable-entity
                    title: File rejected by antivirus scan
                    status: 422
                    detail: 'Antivirus rejected the upload: Eicar-Test-File'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailable'
              examples:
                antivirusUnavailable:
                  summary: The antivirus scanner is unreachable; uploads are temporarily refused
                  value:
                    type: https://pack-solutions.com/probs/service-unavailable
                    title: Antivirus scanner unavailable
                    status: 503
                    detail: The antivirus scanner is unavailable; uploads are temporarily refused
  /documents/{id}:
    get:
      operationId: getDocumentById
      description: Retrieve a document envelope (metadata, current version, content metadata, and HAL links) by its unique identifier.
      summary: Retrieve a document by id
      tags:
        - document
      security:
        - oauth2:
            - documents:read
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Document retrieved.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/DocumentResource'
              examples:
                documentResource:
                  $ref: '#/components/examples/DocumentResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: replaceDocumentContent
      description: |
        Upload a new revision of the document's content. Increments `version`
        by 1; prior versions remain accessible via
        `/documents/{id}/versions/{version_number}`.

        The request body is `multipart/form-data` and contains **only** the
        `file` field. Owners (`contract_id`, `person_id`,
        `payment_method_id`) and `document_type` are immutable after
        creation and cannot be changed through this endpoint.

        Two upload constraints are enforced and surface on dedicated HTTP
        status codes (never `400`):

        - File size is capped at `10000000` bytes (10 MB). Larger uploads
          are rejected with `413 Content Too Large`.
        - The `file` part's media type must belong to the whitelist declared
          under `encoding.file.contentType` (office documents, OpenDocument,
          RTF, plain text, CSV, Markdown, JSON, XML, common image formats,
          and standard archives). Other types — including executables,
          installers, and scripts — are rejected with
          `415 Unsupported Media Type`.

        A concurrent upload that the server detects as conflicting (e.g. a
        competing `POST /documents/{id}` against the same envelope) returns
        `409 Conflict` and leaves the stored content unchanged. Clients
        should re-fetch the envelope before retrying.
      summary: Upload a new version of the document content
      tags:
        - document
      security:
        - oauth2:
            - documents:write
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        description: Multipart payload containing the new binary file.
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentReplaceContent'
            encoding:
              file:
                contentType: application/pdf, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-powerpoint, application/vnd.openxmlformats-officedocument.presentationml.presentation, application/vnd.oasis.opendocument.text, application/vnd.oasis.opendocument.spreadsheet, application/vnd.oasis.opendocument.presentation, application/rtf, text/plain, text/csv, text/markdown, application/json, application/xml, image/jpeg, image/png, image/gif, image/webp, image/svg+xml, image/tiff, image/bmp, image/heic, image/heif, application/zip, application/gzip, application/x-tar, application/x-7z-compressed, application/vnd.rar
      responses:
        '200':
          description: A new version of the document has been stored. The response reflects the updated envelope at the new current `version`.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/DocumentResource'
              examples:
                documentReplaced:
                  summary: A document after a content replacement (version 2)
                  value:
                    id: 4f1a8119-4e24-4460-a126-c79f8ed0017f
                    document_type: PROOF_OF_IDENTITY
                    person_id: 1f1a8119-4e24-4460-a126-c79f8ed0017f
                    version: 2
                    content:
                      original_filename: proof-of-identity-v2.pdf
                      mime_type: application/pdf
                      size_bytes: 251902
                    created_at: 2024-05-15T10:32:18Z
                    updated_at: 2024-06-02T08:12:44Z
                    _links:
                      self:
                        href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f
                        method: GET
                      content:
                        href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f/content
                        method: GET
                      versions:
                        href: /documents/4f1a8119-4e24-4460-a126-c79f8ed0017f/versions
                        method: GET
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          description: Content Too Large
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ContentTooLarge'
              examples:
                sizeExceeded:
                  summary: The replacement revision is larger than the 10 MB cap
                  value:
                    type: https://pack-solutions.com/probs/content-too-large
                    title: Content Too Large
                    status: 413
                    detail: Uploaded file size 15000000 bytes exceeds the maximum allowed of 10000000 bytes.
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnsupportedMediaType'
              examples:
                executableRejected:
                  summary: A Windows executable was submitted as the replacement revision
                  value:
                    type: https://pack-solutions.com/probs/unsupported-media-type
                    title: Unsupported Media Type
                    status: 415
                    detail: Media type "application/x-msdownload" is not in the accepted whitelist.
                unknownBinary:
                  summary: The client did not declare a MIME type for the replacement revision
                  value:
                    type: https://pack-solutions.com/probs/unsupported-media-type
                    title: Unsupported Media Type
                    status: 415
                    detail: Media type "application/octet-stream" is not in the accepted whitelist.
        '422':
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnprocessableEntity'
              examples:
                antivirusRejected:
                  summary: The uploaded file matched an antivirus signature
                  value:
                    type: https://pack-solutions.com/probs/unprocessable-entity
                    title: File rejected by antivirus scan
                    status: 422
                    detail: 'Antivirus rejected the upload: Eicar-Test-File'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailable'
              examples:
                antivirusUnavailable:
                  summary: The antivirus scanner is unreachable; uploads are temporarily refused
                  value:
                    type: https://pack-solutions.com/probs/service-unavailable
                    title: Antivirus scanner unavailable
                    status: 503
                    detail: The antivirus scanner is unavailable; uploads are temporarily refused
    delete:
      operationId: deleteDocumentById
      description: |
        Permanently remove a document and **all** of its versions (cascade)
        from the system using its unique identifier. The operation is
        irreversible.
      summary: Delete a document by id
      tags:
        - document
      security:
        - oauth2:
            - documents:write
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
