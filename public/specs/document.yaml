        The response payload is the raw bytes of the stored file. The actual
        `Content-Type` returned by the server reflects the stored
        `mime_type`; the `application/octet-stream` declaration in this
        contract is the formal envelope for any binary payload.

        The `Content-Disposition` header carries the `original_filename`
        captured at upload time, so clients can preserve a meaningful
        filename when saving the file.
