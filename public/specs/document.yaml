components:
  schemas:
    ProblemDetails:
      type: object
      title: Problem Details
      description: A RFC 9457 compliant problem detail object
      properties:
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Your current balance is 30, but that costs 50.
        instance:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://pack-solutions.com/accounts/12345/msgs/abc
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 403
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: A short, human-readable summary of the problem type.
          example: You do not have enough credit.
        type:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the problem type.
          default: about:blank
          example: https://pack-solutions.com/probs/out-of-stock
    ValidationProblemDetails:
      type: object
      title: Validation Problem Details
      description: |
        An extension of RFC 9457 Problem Details that includes structured validation errors.
        Used for responses where the server needs to communicate specific field-level or business-rule validation failures.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: array
              maxItems: 100
              description: A list of validation errors that occurred during request processing.
              items:
                $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      title: Validation Error
      description: |
        A single validation error entry describing a specific issue with the request.
      properties:
        code:
          $ref: '#/components/schemas/ValidationErrorCode'
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation of the validation error.
        pointer:
          type: string
          minLength: 1
          maxLength: 500
          pattern: ^/
          description: |
            A JSON Pointer (RFC 6901) to the field in the request body that caused the
            error. For asynchronous validations surfaced on a service request (e.g.,
            manual review rejections), the same convention is used in
            `ServiceRequestRequirement.pointer` (entries with `kind=DATA_FIELD`). Consumer
            rendering logic can therefore be shared between synchronous `422` errors and
            asynchronous INVALID requirements.

            When the offending field lives inside a HAL `_embedded` or `_links` block
            (e.g., on a 409 conflict against a resource that exposes its sub-collections
            via embedding), the pointer follows the **physical** structure of the HAL
            response and includes the `_embedded`/`_links` segments — for example
            `/_embedded/individuals/0/birth/date_of_birth`.
      required:
        - code
        - detail
    ValidationErrorCode:
      type: string
      title: Validation Error Code
      description: |
        A machine-readable error code indicating the type of validation failure.

        Prefer the most specific code available. Use `UNPROCESSABLE` and `CUSTOM`
        only as last-resort fallbacks when no specific code fits.

        ### Presence (typically on 422 and 400)
        - `MISSING`: A required resource or related entity is missing (e.g., referenced `subscriber_id` does not exist).
        - `MISSING_FIELD`: A required field was not provided in the request body.

        ### Shape (typically on 400 and 422)
        - `INVALID`: The field value is invalid in a generic sense. Use a more specific code when applicable.
        - `INVALID_FORMAT`: The field value does not match the expected format (e.g., not a valid IBAN, UUID, ISO-8601 date).
        - `OUT_OF_RANGE`: The field value is well-formed but falls outside the accepted range — numeric bounds, temporal window, or string length.
        - `INCONSISTENT`: The field is inconsistent with another field in the same payload (e.g., `allocations` rates do not sum to 100%, `date_of_end` before `date_of_start`).

        ### State (typically on 409)
        - `ALREADY_EXISTS`: The resource or value already exists and duplicates are not allowed.
        - `INVALID_STATE`: The operation is incompatible with the current state of the resource (e.g., trying to cancel an already-executed premium, submitting a contract whose subscriber is still in `DRAFT`).

        ### Business rules (typically on 422)
        - `BUSINESS_RULE_VIOLATION`: A documented business rule is violated and no more specific code above fits (e.g., a regulatory threshold is crossed).

        ### Fallbacks
        - `UNPROCESSABLE`: Legacy generic code. **Prefer `BUSINESS_RULE_VIOLATION` or a state/shape code above.**
        - `CUSTOM`: A custom validation error not covered by the standard codes.
      enum:
        - MISSING
        - MISSING_FIELD
        - INVALID
        - INVALID_FORMAT
        - OUT_OF_RANGE
        - INCONSISTENT
        - ALREADY_EXISTS
        - INVALID_STATE
        - BUSINESS_RULE_VIOLATION
        - UNPROCESSABLE
        - CUSTOM
      example: MISSING_FIELD
    BadRequest:
      type: object
      title: Bad Request
      description: Bad Request (400)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    Unauthorized:
      type: object
      title: Unauthorized
      description: Unauthorized (401)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      type: object
      title: Forbidden
      description: Forbidden (403)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      type: object
      title: Not Found
      description: Not Found (404)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    ContentTooLarge:
      type: object
      title: Content Too Large
      description: Content Too Large (413). Returned when the request body exceeds the maximum allowed size enforced by the API (default 250 KiB / 256000 bytes). File-upload endpoints may apply a larger, content-specific limit.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    UnsupportedMediaType:
      type: object
      title: Unsupported Media Type
      description: Unsupported Media Type (415)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    UnprocessableEntity:
      type: object
      title: Unprocessable Entity
      description: Unprocessable Entity (422)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    ServiceUnavailable:
      type: object
      title: Service Unavailable
      description: Service Unavailable (503)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    InternalServerError:
      type: object
      title: Internal Server Error
      description: Internal Server Error (500)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    HalLink:
      type: object
      title: HalLink
      description: |
        HAL link object. Minimal shape: an `href` (URI of the linked resource)
        and the `method` to use when following it. Navigation and pagination
        relations use `GET`; action relations use `POST` (or `DELETE` for
        resource removal). The project does not use `PUT` or `PATCH`.
      additionalProperties: false
      required:
        - href
        - method
      properties:
        href:
          type: string
          format: uri-reference
          maxLength: 2048
          description: URI of the linked resource.
          example: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
        method:
          $ref: '#/components/schemas/HalLinkMethod'
          description: HTTP method to use when following this link.
    HalLinkMethod:
      type: string
      title: HalLinkMethod
      description: |
        HTTP method to use when following a HAL link. Restricted to
        `GET` (navigation), `POST` (actions and mutations), and `DELETE`
        (resource removal). The project does not use `PUT` or `PATCH`.
      enum:
        - GET
        - POST
        - DELETE
      example: GET
    HalPaginationLinks:
      type: object
      title: HalPaginationLinks
      description: |
        Pagination link relations used inside the `_links` of a collection envelope.
        `first` and `last` are always present; `next` and `prev` are conditional on
        page state. Compose with `HalSelfLinks` in every `*Collection._links`.
      properties:
        first:
          $ref: '#/components/schemas/HalLink'
          description: Link to the first page of the collection.
        last:
          $ref: '#/components/schemas/HalLink'
          description: Link to the last page of the collection.
        next:
          $ref: '#/components/schemas/HalLink'
          description: Link to the next page of the collection. Omitted on the last page.
        prev:
          $ref: '#/components/schemas/HalLink'
          description: Link to the previous page of the collection. Omitted on the first page.
      required:
        - first
        - last
      example:
        first:
          href: /resources?page=1&size=20
          method: GET
        last:
          href: /resources?page=5&size=20
          method: GET
        next:
          href: /resources?page=3&size=20
          method: GET
        prev:
          href: /resources?page=1&size=20
          method: GET
    HalSelfLinks:
      type: object
      title: HalSelfLinks
      description: |
        Base shape for every `_links` block. Guarantees that the `self` link is present
        on every HAL Resource and Collection envelope. Compose with `HalPaginationLinks`
        for paginated collections, or extend inline with action/navigation relations.
      properties:
        self:
          $ref: '#/components/schemas/HalLink'
          description: Link to the current resource.
      required:
        - self
      example:
        self:
          href: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
          method: GET
    PageMetadata:
      type: object
      title: PageMetadata
      description: Pagination metadata for collection responses.
      properties:
        number:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
          description: Current page number (one-based).
          example: 1
        size:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          description: Number of items per page.
          example: 20
        total_elements:
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999999
          description: Total number of items across all pages.
          example: 100
        total_pages:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          description: Total number of pages.
          example: 5
      required:
        - size
        - total_elements
        - total_pages
        - number
    Metadata:
      type: object
      title: Metadata
      description: |
        Set of key-value pairs that you can attach to an object.
        This can be useful for storing additional information about the object in a structured format.

        Capped at 50 entries with 64-char key names and 500-char string values to
        prevent DoS via payload bloat.
      maxProperties: 50
      propertyNames:
        maxLength: 64
      additionalProperties:
        type: string
        maxLength: 500
      example:
        customer_segment: premium
        internal_id: '12345'
    DocumentType:
      title: DocumentType
      type: string
      description: |
        Catalog of document types accepted by the API. Values are grouped by the
        **business entity** the document is typically attached to (`person`,
        `contract`, `payment_method`). Each group is further broken down by
        functional sub-category. Owner-scoped subset enums (`PersonDocumentType`,
        `ContractDocumentType`, `PaymentMethodDocumentType`) narrow this catalog
        to the values that are valid for a given owner.

        ### Person — Identity / Civil status
        - `PROOF_OF_IDENTITY`: Justificatif d'identité (CNI ou passeport, en cours de validité)
        - `BIRTH_CERTIFICATE`: Acte de naissance (< 3 mois)
        - `MARRIAGE_CERTIFICATE`: Acte de mariage
        - `DIVORCE_DECREE`: Jugement de divorce
        - `PROOF_OF_ADDRESS`: Justificatif de domicile

        ### Person — International taxation
        - `CERFA_3916`: CERFA 3916 (compte bancaire à l'étranger)
        - `CERFA_5000`: CERFA 5000 (non-résident)
        - `W9_TAX_FORM`: Formulaire W9 (États-Unis)
        - `W8BEN_FORM`: Formulaire W-8BEN

        ### Person — AML-CFT compliance
        - `CONFIDENTIAL_INFORMATION_SHEET`: Fiche de renseignements confidentiels (versements > 40 k€)
        - `AML_PEP_PROOF`: Justificatif LCB-FT / PPE (Personne Politiquement Exposée)

        ### Person — Legal protection
        - `LEGAL_PROTECTION`: Protection juridique (générique)
        - `GUARDIANSHIP_JUDGMENT`: Jugement de mise sous tutelle
        - `CURATORSHIP_JUDGMENT`: Jugement de mise sous curatelle
        - `JUDICIAL_PROTECTION_ORDER`: Jugement / ordonnance de sauvegarde de justice

        ### Contract — Subscription / product
        - `MEMBERSHIP_FORM`: Bulletin d'adhésion
        - `MUTUAL_REGULATION`: Règlement mutualiste
        - `PROFILED_MANAGEMENT_MANDATE`: Mandat de gestion profilé

        ### Contract — Beneficiary clause
        - `SIGNED_BENEFICIARY_CLAUSE_FORM`: Formulaire de clause bénéficiaire signé
        - `ACCEPTING_BENEFICIARY`: Bénéficiaire acceptant

        ### Contract — Pledge / Third-party seizure
        - `PLEDGE_DEED`: Acte de nantissement
        - `PLEDGE_RELEASE`: Mainlevée de nantissement
        - `DGFIP_THIRD_PARTY_NOTICE`: ATD — Avis tiers détenteur DGFiP

        ### Request / Operation — Generic formalism
        - `SIGNED_REQUEST_FORM`: Formulaire de demande signé
        - `SIGNED_REQUEST_LETTER`: Courrier de demande signé

        ### Payment / Financial operation
        - `PROOF_OF_FUND_ORIGIN`: Justificatif d'origine des fonds

        ### Benefit / Surrender
        - `FUND_DESTINATION_PROOF`: Justificatif de destination des fonds

        ### Bank account details
        - `SEPA_MANDATE`: Mandat SEPA
        - `BANK_DETAILS`: RIB (Relevé d'Identité Bancaire)
        - `FOREIGN_BANK_DETAILS`: RIB étranger

        ### Catch-all
        - `OTHER`: Autre
      enum:
        - PROOF_OF_IDENTITY
        - BIRTH_CERTIFICATE
        - MARRIAGE_CERTIFICATE
        - DIVORCE_DECREE
        - PROOF_OF_ADDRESS
        - CERFA_3916
        - CERFA_5000
        - W9_TAX_FORM
        - W8BEN_FORM
        - CONFIDENTIAL_INFORMATION_SHEET
        - AML_PEP_PROOF
        - LEGAL_PROTECTION
        - GUARDIANSHIP_JUDGMENT
        - CURATORSHIP_JUDGMENT
        - JUDICIAL_PROTECTION_ORDER
        - MEMBERSHIP_FORM
        - MUTUAL_REGULATION
        - PROFILED_MANAGEMENT_MANDATE
        - SIGNED_BENEFICIARY_CLAUSE_FORM
        - ACCEPTING_BENEFICIARY
        - PLEDGE_DEED
        - PLEDGE_RELEASE
        - DGFIP_THIRD_PARTY_NOTICE
        - SIGNED_REQUEST_FORM
        - SIGNED_REQUEST_LETTER
        - PROOF_OF_FUND_ORIGIN
        - FUND_DESTINATION_PROOF
        - SEPA_MANDATE
        - BANK_DETAILS
        - FOREIGN_BANK_DETAILS
        - OTHER
      example: PROOF_OF_IDENTITY
    PersonDocumentType:
      title: PersonDocumentType
      type: string
      description: |
        Subset of `DocumentType` values that are valid when a document is
        attached to a person (`person_id`). Organised by functional
        sub-category. Each value also belongs to the master `DocumentType`
        enum — this schema narrows the catalog to the types that may
        legitimately be attached to a person owner, including the types
        required to satisfy person-scoped service-request requirements
        (NameChange, AddressChange, BankAccountChange, FamilyStatusChange).

        ### Identity / Civil status
        - `PROOF_OF_IDENTITY`: Justificatif d'identité (CNI ou passeport, en cours de validité)
        - `BIRTH_CERTIFICATE`: Acte de naissance (< 3 mois)
        - `MARRIAGE_CERTIFICATE`: Acte de mariage
        - `DIVORCE_DECREE`: Jugement de divorce
        - `PROOF_OF_ADDRESS`: Justificatif de domicile

        ### International taxation
        - `CERFA_3916`: CERFA 3916 (compte bancaire à l'étranger)
        - `CERFA_5000`: CERFA 5000 (non-résident)
        - `W9_TAX_FORM`: Formulaire W9 (États-Unis)
        - `W8BEN_FORM`: Formulaire W-8BEN

        ### AML-CFT compliance
        - `CONFIDENTIAL_INFORMATION_SHEET`: Fiche de renseignements confidentiels (> 40 k€)
        - `AML_PEP_PROOF`: Justificatif LCB-FT / PPE

        ### Legal protection
        - `LEGAL_PROTECTION`: Protection juridique (générique)
        - `GUARDIANSHIP_JUDGMENT`: Jugement de mise sous tutelle
        - `CURATORSHIP_JUDGMENT`: Jugement de mise sous curatelle
        - `JUDICIAL_PROTECTION_ORDER`: Jugement / ordonnance de sauvegarde de justice

        ### Generic formalism
        - `SIGNED_REQUEST_FORM`: Formulaire de demande signé (SR Person-scopés)

        ### Bank account proof
        - `BANK_DETAILS`: RIB (changement de compte bancaire)

        ### Catch-all
        - `OTHER`: Autre
      enum:
        - PROOF_OF_IDENTITY
        - BIRTH_CERTIFICATE
        - MARRIAGE_CERTIFICATE
        - DIVORCE_DECREE
        - PROOF_OF_ADDRESS
        - CERFA_3916
        - CERFA_5000
        - W9_TAX_FORM
        - W8BEN_FORM
        - CONFIDENTIAL_INFORMATION_SHEET
        - AML_PEP_PROOF
        - LEGAL_PROTECTION
        - GUARDIANSHIP_JUDGMENT
        - CURATORSHIP_JUDGMENT
        - JUDICIAL_PROTECTION_ORDER
        - SIGNED_REQUEST_FORM
        - BANK_DETAILS
        - OTHER
      example: PROOF_OF_IDENTITY
    ContractDocumentType:
      title: ContractDocumentType
      type: string
      description: |
        Subset of `DocumentType` values that are valid when a document is
        attached to a contract (`contract_id`). Organised by functional
        sub-category. Each value also belongs to the master `DocumentType`
        enum — this schema narrows the catalog to the types that may
        legitimately be attached to a contract owner, including the types
        required to satisfy contract-scoped service-request requirements
        (Subscription, Renunciation, BeneficiaryClauseChange, PremiumPayment,
        Surrender).

        ### Subscription / product
        - `MEMBERSHIP_FORM`: Bulletin d'adhésion
        - `MUTUAL_REGULATION`: Règlement mutualiste
        - `PROFILED_MANAGEMENT_MANDATE`: Mandat de gestion profilé
        - `SEPA_MANDATE`: Mandat SEPA capturé à la souscription

        ### Beneficiary clause
        - `SIGNED_BENEFICIARY_CLAUSE_FORM`: Formulaire de clause bénéficiaire signé
        - `ACCEPTING_BENEFICIARY`: Bénéficiaire acceptant

        ### Pledge / Third-party seizure
        - `PLEDGE_DEED`: Acte de nantissement
        - `PLEDGE_RELEASE`: Mainlevée de nantissement
        - `DGFIP_THIRD_PARTY_NOTICE`: ATD — Avis tiers détenteur DGFiP

        ### Generic formalism
        - `SIGNED_REQUEST_FORM`: Formulaire de demande signé
        - `SIGNED_REQUEST_LETTER`: Courrier de demande signé

        ### Payment / Financial operation
        - `PROOF_OF_FUND_ORIGIN`: Justificatif d'origine des fonds

        ### Benefit / Surrender
        - `FUND_DESTINATION_PROOF`: Justificatif de destination des fonds

        ### Identity pieces collected at subscription / clause change
        - `PROOF_OF_IDENTITY`: Justificatif d'identité
        - `BIRTH_CERTIFICATE`: Acte de naissance

        ### Catch-all
        - `OTHER`: Autre
      enum:
        - MEMBERSHIP_FORM
        - MUTUAL_REGULATION
        - PROFILED_MANAGEMENT_MANDATE
        - SEPA_MANDATE
        - SIGNED_BENEFICIARY_CLAUSE_FORM
        - ACCEPTING_BENEFICIARY
        - PLEDGE_DEED
        - PLEDGE_RELEASE
        - DGFIP_THIRD_PARTY_NOTICE
        - SIGNED_REQUEST_FORM
        - SIGNED_REQUEST_LETTER
        - PROOF_OF_FUND_ORIGIN
        - FUND_DESTINATION_PROOF
        - PROOF_OF_IDENTITY
        - BIRTH_CERTIFICATE
        - OTHER
      example: MEMBERSHIP_FORM
    PaymentMethodDocumentType:
      title: PaymentMethodDocumentType
      type: string
      description: |
        Subset of `DocumentType` values that are valid when a document is
        attached to a payment method (`payment_method_id`). Covers the
        bank-account-details artefacts collected when capturing or modifying
        a payment instrument.

        Each value also belongs to the master `DocumentType` enum — this
        schema narrows the catalog to the types that make sense on a
        payment-method owner.

        ### Bank account details
        - `SEPA_MANDATE`: Mandat SEPA (prélèvement automatique)
        - `BANK_DETAILS`: RIB (Relevé d'Identité Bancaire)
        - `FOREIGN_BANK_DETAILS`: RIB étranger

        ### Catch-all
        - `OTHER`: Autre
      enum:
        - SEPA_MANDATE
        - BANK_DETAILS
        - FOREIGN_BANK_DETAILS
        - OTHER
      example: SEPA_MANDATE
    Document:
      type: object
      title: Document
      description: |
        Domain representation of a document. Carries the metadata describing
        what the document is and the resources it is attached to. Does not
        carry HAL fields, identifiers, content metadata, or audit timestamps —
        those live on the read wrapper (`DocumentResource`).

        ### Owners

        A document is attached to **at least one** owning resource — one or more
        of `contract_id`, `person_id`, or `payment_method_id`. The owner set is
        fixed at creation and immutable thereafter, so at least one of these
        fields is populated on every document.

        ### Metadata

        `metadata` is a free-form `string → string` map. Partners may use it
        to record source-system identifiers, channels, capture context,
        etc. The server does not interpret keys or values.
      properties:
        contract_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of a contract the document is attached to.
          example: 4f1a8119-4e24-4460-a126-c79f8ed0017f
        document_type:
          $ref: '#/components/schemas/DocumentType'
        metadata:
          $ref: '#/components/schemas/Metadata'
        payment_method_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of a payment method the document is attached to.
          example: a2b4c6d8-1e3f-5a7b-9c1d-3e5f7a9b1c3d
        person_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of a person the document is attached to.
          example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
      required:
        - document_type
    DocumentCreate:
      type: object
      title: DocumentCreate
      description: |
        Multipart body for `POST /documents`. Combines the document metadata
        with the binary payload uploaded as the `file` field.

        Submitted as `multipart/form-data`. The document must be attached to
        **at least one** owning resource at creation: supply one or more of
        `contract_id`, `person_id`, or `payment_method_id` (two or three are
        allowed). Supplying none is rejected with `400 Bad Request`
        (`code: MISSING`). The owner set is immutable afterwards.

        Each owner type has a sub-enum of accepted `document_type` values:
        `PersonDocumentType` for `person_id`, `ContractDocumentType` for
        `contract_id`, `PaymentMethodDocumentType` for `payment_method_id`.
        When several owners are attached, `document_type` need not be valid for
        every owner — the server only requires it to be accepted by **at least
        one** of the supplied owners. A `document_type` compatible with none of
        them is rejected.

        The newly uploaded binary becomes version `1` of the document;
        further uploads via `POST /documents/{id}` create new versions while
        preserving prior ones.
      properties:
        contract_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of a contract the document is attached to.
          example: 4f1a8119-4e24-4460-a126-c79f8ed0017f
        document_type:
          $ref: '#/components/schemas/DocumentType'
        file:
          type: string
          format: binary
          maxLength: 10000000
          description: |
            Binary content of the document being uploaded. Hard-capped at
            `10000000` bytes (10 MB); larger uploads are rejected with
            `413 Content Too Large`. The MIME type of the part must belong to
            the whitelist declared on the operation's
            `encoding.file.contentType` (office documents, OpenDocument, RTF,
            plain text, CSV, Markdown, JSON, XML, common image formats, and
            standard archives); any other type is rejected with
            `415 Unsupported Media Type`. Executables, installers, and scripts
            are never accepted.
        metadata:
          $ref: '#/components/schemas/Metadata'
        payment_method_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of a payment method the document is attached to.
          example: a2b4c6d8-1e3f-5a7b-9c1d-3e5f7a9b1c3d
        person_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of a person the document is attached to.
          example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
      required:
        - document_type
        - file
      anyOf:
        - required:
            - contract_id
        - required:
            - person_id
        - required:
            - payment_method_id
    DocumentReplaceContent:
      type: object
      title: DocumentReplaceContent
      description: |
        Multipart body for `POST /documents/{id}`. Carries only the new binary
        content — owners (`contract_id`, `person_id`, `payment_method_id`)
        and `document_type` are immutable after creation and cannot be
        modified through this endpoint.

        Submitted as `multipart/form-data`. Each successful upload increments
        the document `version` while keeping prior versions accessible via
        `/documents/{id}/versions/{version_number}`.
      properties:
        file:
          type: string
          format: binary
          maxLength: 10000000
          description: |
            Binary content of the new document revision. Hard-capped at
            `10000000` bytes (10 MB); larger uploads are rejected with
            `413 Content Too Large`. The MIME type of the part must belong to
            the whitelist declared on the operation's
            `encoding.file.contentType`; any other type is rejected with
            `415 Unsupported Media Type`.
      required:
        - file
    DocumentContentMetadata:
      type: object
      title: DocumentContentMetadata
      description: |
        Read-only metadata describing the binary content of a document version.
        Embedded inside `DocumentResource` (current version) and
        `DocumentVersionResource` (a specific version).
      properties:
        checksum_sha256:
          type: string
          minLength: 64
          maxLength: 64
          pattern: ^[a-f0-9]{64}$
          readOnly: true
          description: Hex-encoded lowercase SHA-256 checksum of the binary content. Optional.
          example: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
        mime_type:
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          description: MIME type detected/declared at upload time.
          example: application/pdf
        original_filename:
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          description: Filename supplied by the uploader at upload time.
          example: cni.pdf
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          maximum: 104857600
          readOnly: true
          description: Size of the binary content in bytes.
          example: 248173
      required:
        - original_filename
        - mime_type
        - size_bytes
    DocumentResource:
      title: DocumentResource
      description: |
        HAL read wrapper around `Document`. Adds the server-assigned identifier,
        current version number, current content metadata, audit timestamps, and
        HAL `_links`. The `_links` map MUST contain at least `self`, `content`
        (download URL of the current version), and `versions` (link to the
        version history collection).
      allOf:
        - $ref: '#/components/schemas/Document'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a document.

                    | Relation | Method | Always present |
                    |---|---|---|
                    | `self` | GET | yes |
                    | `content` | GET | yes |
                    | `versions` | GET | yes |
                  properties:
                    content:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the binary download of the current version.
                    versions:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the version history collection.
                  required:
                    - content
                    - versions
              readOnly: true
            content:
              allOf:
                - $ref: '#/components/schemas/DocumentContentMetadata'
              readOnly: true
              description: Metadata describing the binary content of the current version.
            created_at:
              type: string
              format: date-time
              minLength: 20
              maxLength: 35
              readOnly: true
              description: Timestamp at which the document was created (ISO-8601 UTC).
              example: 2024-05-15T10:32:18Z
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Server-assigned unique identifier of the document.
              example: 4f1a8119-4e24-4460-a126-c79f8ed0017f
            updated_at:
              type: string
              format: date-time
              minLength: 20
              maxLength: 35
              readOnly: true
              description: Timestamp at which the document was last modified (ISO-8601 UTC).
              example: 2024-05-15T10:32:18Z
            version:
              type: integer
              format: int32
              minimum: 1
              maximum: 10000
              readOnly: true
              description: |
                Current version number. Starts at `1` on creation and is
                incremented by `POST /documents/{id}` calls that upload a new
                revision of the content.
              example: 1
          required:
            - id
            - version
            - content
            - created_at
            - updated_at
            - _links
    DocumentCollection:
      type: object
      title: DocumentCollection
      description: Paginated HAL collection of documents.
      properties:
        _embedded:
          type: object
          description: Embedded document resources for the current page.
          properties:
            documents:
              type: array
              maxItems: 100
              description: Document resources on this page.
              items:
                $ref: '#/components/schemas/DocumentResource'
          required:
            - documents
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
    DocumentVersion:
      type: object
      title: DocumentVersion
      description: |
        Domain representation of a single version of a document. Each upload
        (initial creation through `POST /documents` or replacement via
        `POST /documents/{id}`) produces an immutable `DocumentVersion` entry
        that remains accessible via the version history sub-resource.
      properties:
        content:
          allOf:
            - $ref: '#/components/schemas/DocumentContentMetadata'
          readOnly: true
          description: Metadata describing the binary content of this version.
        uploaded_at:
          type: string
          format: date-time
          minLength: 20
          maxLength: 35
          readOnly: true
          description: Timestamp at which this version was uploaded (ISO-8601 UTC).
          example: 2024-05-15T10:32:18Z
        uploaded_by:
          type: string
          minLength: 1
          maxLength: 255
          readOnly: true
          description: Identifier of the principal that uploaded this version (OAuth2 subject or user id).
          example: user-3f1a8119
        version_number:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
          readOnly: true
          description: Monotonically increasing version number, starting at `1`.
          example: 1
      required:
        - version_number
        - content
        - uploaded_at
        - uploaded_by
    DocumentVersionResource:
      title: DocumentVersionResource
      description: |
        HAL read wrapper around `DocumentVersion`. Adds HAL `_links` containing
        at least `self` (this version), `content` (binary download of this
        version), and `document` (the parent document envelope).
      allOf:
        - $ref: '#/components/schemas/DocumentVersion'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a document version.

                    | Relation | Method | Always present |
                    |---|---|---|
                    | `self` | GET | yes |
                    | `content` | GET | yes |
                    | `document` | GET | yes |
                  properties:
                    content:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the binary download of this version.
                    document:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the parent document envelope.
                  required:
                    - content
                    - document
              readOnly: true
          required:
            - _links
    DocumentVersionCollection:
      type: object
      title: DocumentVersionCollection
      description: Paginated HAL collection of versions for a single document.
      properties:
        _embedded:
          type: object
          description: Embedded document version resources for the current page.
          properties:
            versions:
              type: array
              maxItems: 100
              description: Document version resources on this page.
              items:
                $ref: '#/components/schemas/DocumentVersionResource'
          required:
            - versions
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
    Conflict:
      type: object
      title: Conflict
      description: Conflict (409)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
  examples:
    DocumentResource:
      summary: A proof-of-address document attached to an individual
      description: |
        Example of a `DocumentResource` for a proof-of-address document uploaded
        for the individual `1f1a8119-4e24-4460-a126-c79f8ed0017f`.
      value:
        id: 6f1a6b9d-3f3f-4f31-a2d7-8d8dc2e90b55
        document_type: PROOF_OF_ADDRESS
        person_id: 1f1a8119-4e24-4460-a126-c79f8ed0017f
        version: 1
        content:
          original_filename: proof-of-address-2025-12.pdf
          mime_type: application/pdf
          size_bytes: 248173
          checksum_sha256: 9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08
        created_at: 2026-04-20T10:14:33Z
        updated_at: 2026-04-20T10:14:33Z
        _links:
          self:
            href: /documents/6f1a6b9d-3f3f-4f31-a2d7-8d8dc2e90b55
            method: GET
          content:
            href: /documents/6f1a6b9d-3f3f-4f31-a2d7-8d8dc2e90b55/content
            method: GET
          versions:
            href: /documents/6f1a6b9d-3f3f-4f31-a2d7-8d8dc2e90b55/versions
            method: GET
  responses:
    BadRequest:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequest'
          example:
            value:
              type: https://pack-solutions.com/probs/bad-request
              title: Bad Request
              status: 400
              detail: The request body contains invalid or malformed fields.
              errors:
                - code: INVALID
                  detail: The value provided is not a valid date format. Expected YYYY-MM-DD.
                  pointer: /birth/date_of_birth
                - code: INVALID
                  detail: The value provided is not a valid email address.
                  pointer: /communication/email
                - code: MISSING_FIELD
                  detail: The last_name field is required.
                  pointer: /last_name
      description: Bad Request
    Conflict:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Conflict'
          example:
            value:
              type: https://pack-solutions.com/probs/conflict
              title: Conflict
              status: 409
              detail: The request could not be completed due to a conflict with the current state of the target resource.
              errors:
                - code: ALREADY_EXISTS
                  detail: An individual with the same first name, last name and date of birth already exists.
                  pointer: /last_name
      description: Conflict
    Unauthorized:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Unauthorized'
          example:
            value:
              type: https://pack-solutions.com/probs/unauthorized
              title: Unauthorized
              status: 401
              detail: The request requires user authentication.
      description: Unauthorized
    Forbidden:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Forbidden'
          example:
            value:
              type: https://pack-solutions.com/probs/forbidden
              title: Forbidden
              status: 403
              detail: The server understood the request, but is refusing to fulfill it.
      description: Forbidden
    NotFound:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFound'
          example:
            value:
              type: https://pack-solutions.com/probs/not-found
              title: Not Found
              status: 404
              detail: The server has not found anything matching the Request-URI.
      description: Not Found
    NoContent:
      description: No Content
    ContentTooLarge:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ContentTooLarge'
          example:
            value:
              type: https://pack-solutions.com/probs/content-too-large
              title: Content Too Large
              status: 413
              detail: The request body exceeds the maximum allowed size of 256000 bytes.
      description: Content Too Large
    UnsupportedMediaType:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnsupportedMediaType'
          example:
            value:
              type: https://pack-solutions.com/probs/unsupported-media-type
              title: Unsupported Media Type
              status: 415
              detail: Media type "application/x-msdownload" is not in the accepted whitelist. Allowed types include PDF, Office (doc/docx/xls/xlsx/ppt/pptx), OpenDocument, RTF, plain text, CSV, Markdown, JSON, XML, common image formats (jpeg, png, gif, webp, svg, tiff, bmp, heic, heif) and standard archives (zip, gzip, tar, 7z, rar).
      description: Unsupported Media Type
    InternalServerError:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/InternalServerError'
          example:
            value:
              type: https://pack-solutions.com/probs/internal-server-error
              title: Internal Server Error
              status: 500
              detail: The server encountered an unexpected condition which prevented it from fulfilling the request.
      description: Internal Server Error
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 1
        minimum: 1
        maximum: 10000
        example: 1
      description: Page number (one-based).
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
        minimum: 1
        maximum: 100
        example: 20
      description: Maximum number of items per page.
    IdPath:
      name: id
      in: path
      required: true
      description: The unique identifier of the document.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 4f1a8119-4e24-4460-a126-c79f8ed0017f
    VersionNumberPath:
      name: version_number
      in: path
      required: true
      description: The version number of the document (1-indexed, monotonically increasing).
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 10000
      example: 1
    ContractIdQuery:
      name: contract_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      description: Filter documents attached to the given contract. May be combined with `person_id` and/or `payment_method_id`.
      example: 4f1a8119-4e24-4460-a126-c79f8ed0017f
    PersonIdQuery:
      name: person_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      description: Filter documents attached to the given person. May be combined with `contract_id` and/or `payment_method_id`.
      example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
    PaymentMethodIdQuery:
      name: payment_method_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      description: Filter documents attached to the given payment method. May be combined with `contract_id` and/or `person_id`.
      example: a2b4c6d8-1e3f-5a7b-9c1d-3e5f7a9b1c3d
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://iam.pack-solutions.com/oauth/token
          scopes:
            documents:read: read access to documents
            documents:write: write access to documents
