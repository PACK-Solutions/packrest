openapi: 3.1.2
info:
  title: Document Management API
  description: |
    # Overview
    The Document Management API provides operations for uploading, retrieving, replacing, and deleting
    binary **documents** (PDFs, images, scans, signed forms) attached to a contract, a person, or a
    payment method. It manages both the binary content and its descriptive metadata, and preserves a
    full revision history for each document.

    Unlike resource-embedded attachments, documents managed here are **first-class resources** with their
    own identifier and lifecycle. The same document can be referenced from several owning resources without
    duplication.

    ## Core Concepts

    ### Document Envelope and Versions
    A document is modelled as an **envelope** (stable `id`, classification, ownership, audit timestamps)
    plus an ordered, immutable history of **versions**, each carrying the binary content and its metadata
    (`original_filename`, `mime_type`, `size_bytes`, optional `checksum_sha256`).

    - The first `POST /documents` upload creates the envelope **and** version `1` in a single call.
    - Each subsequent `POST /documents/{id}` upload adds a new version (`2`, `3`, …) — the envelope's
      `version` field tracks the current (latest) version.
    - Prior versions remain individually retrievable via
      `GET /documents/{id}/versions/{version_number}` and
      `GET /documents/{id}/versions/{version_number}/content`.
    - `DELETE /documents/{id}` cascades and removes the envelope along with **all** its versions.

    Replace operations only touch the binary content; the envelope's classification (`document_type`)
    and ownership (`contract_id`, `person_id`, `payment_method_id`) are immutable after creation.

    ### Ownership
    A document must be attached to **at least one** owning resource at creation time — one or
    more of `contract_id`, `person_id`, or `payment_method_id` (two or three are allowed). The
    rule is enforced server-side and surfaces as `400 Bad Request` (`code: MISSING`) when no
    owner is supplied.

    ### Document Types
    Each document is classified by a `document_type` value from a closed catalog (see the `DocumentType`
    schema). Values are grouped by the **business entity** the document is attached to and by
    functional sub-category. Owner-scoped subset enums narrow the catalog per owner:
    `PersonDocumentType`, `ContractDocumentType`, `PaymentMethodDocumentType`. When a
    document is attached to several owners, `document_type` only needs to be valid for
    **at least one** of them, not for every owner.

    **Person** (`person_id`) — civil status and life events of an individual:
    - **Identity / Civil status**: `PROOF_OF_IDENTITY`, `BIRTH_CERTIFICATE`, `MARRIAGE_CERTIFICATE`,
      `DIVORCE_DECREE`, `PROOF_OF_ADDRESS`.
    - **International taxation**: `CERFA_3916`, `CERFA_5000`, `W9_TAX_FORM`, `W8BEN_FORM`.
    - **AML-CFT compliance**: `CONFIDENTIAL_INFORMATION_SHEET`, `AML_PEP_PROOF`.
    - **Legal protection**: `LEGAL_PROTECTION`, `GUARDIANSHIP_JUDGMENT`, `CURATORSHIP_JUDGMENT`,
      `JUDICIAL_PROTECTION_ORDER`.

    **Contract** (`contract_id`) — subscription artefacts and contract-level operations:
    - **Subscription / product**: `MEMBERSHIP_FORM`, `MUTUAL_REGULATION`, `PROFILED_MANAGEMENT_MANDATE`.
    - **Beneficiary clause**: `SIGNED_BENEFICIARY_CLAUSE_FORM`, `ACCEPTING_BENEFICIARY`.
    - **Pledge / Third-party seizure**: `PLEDGE_DEED`, `PLEDGE_RELEASE`, `DGFIP_THIRD_PARTY_NOTICE`.
    - **Request / Operation — generic formalism**: `SIGNED_REQUEST_FORM`, `SIGNED_REQUEST_LETTER`.
    - **Payment / Financial operation**: `PROOF_OF_FUND_ORIGIN`.
    - **Benefit / Surrender**: `FUND_DESTINATION_PROOF`.

    **PaymentMethod** (`payment_method_id`) — bank-account artefacts:
    - **Bank account details**: `SEPA_MANDATE`, `BANK_DETAILS`, `FOREIGN_BANK_DETAILS`.

    A generic `OTHER` fallback exists in all three owner scopes.

    ### Upload and Download Mechanics
    - **Upload** (`POST /documents`, `POST /documents/{id}`) uses `multipart/form-data`. The binary travels
      in a `file` form part; metadata fields (`document_type`, owner ids) sit alongside as additional form
      parts. This is a **single-step** flow — no preflight, no presigned URL.
    - **Download** (`GET /documents/{id}/content`, `GET …/versions/{version_number}/content`) returns
      `application/octet-stream`. Servers set `Content-Type` to the stored `mime_type` and
      `Content-Disposition: attachment; filename="…"` based on the version's `original_filename`.

    #### Upload constraints
    Both upload endpoints enforce the following two checks. Failures are reported with
    `application/problem+json` (RFC 9457) bodies on dedicated HTTP status codes — never `400`.

    - **Maximum file size:** `10000000` bytes (**10 MB**) per uploaded file. Exceeding this
      cap returns `413 Content Too Large`.
    - **Accepted media types:** the `file` part must carry one of the whitelisted MIME types
      below. Any other type (executables, scripts, installers, unknown binaries, …) is rejected
      with `415 Unsupported Media Type`.

      - **Office / documents** — `application/pdf`, `application/msword`,
        `application/vnd.openxmlformats-officedocument.wordprocessingml.document` (`.docx`),
        `application/vnd.ms-excel`,
        `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet` (`.xlsx`),
        `application/vnd.ms-powerpoint`,
        `application/vnd.openxmlformats-officedocument.presentationml.presentation` (`.pptx`),
        `application/vnd.oasis.opendocument.text` (`.odt`),
        `application/vnd.oasis.opendocument.spreadsheet` (`.ods`),
        `application/vnd.oasis.opendocument.presentation` (`.odp`),
        `application/rtf`.
      - **Text & structured data** — `text/plain`, `text/csv`, `text/markdown`,
        `application/json`, `application/xml`.
      - **Images** — `image/jpeg`, `image/png`, `image/gif`, `image/webp`, `image/svg+xml`,
        `image/tiff`, `image/bmp`, `image/heic`, `image/heif`.
      - **Archives** — `application/zip`, `application/gzip`, `application/x-tar`,
        `application/x-7z-compressed`, `application/vnd.rar`.

    The full whitelist is also encoded in the `encoding.file.contentType` of each upload
    operation; clients should treat the operation spec as the source of truth.

    ### Lifecycle Models
    To keep request and response shapes orthogonal, the API uses distinct schemas per stage:
    - **Create** (`DocumentCreate`): `multipart/form-data` body for `POST /documents` — binary + metadata.
    - **Replace** (`DocumentReplaceContent`): `multipart/form-data` body for `POST /documents/{id}` —
      binary only.
    - **Read** (`DocumentResource`, `DocumentVersionResource`): HAL-compliant representations with
      `_links` (`self`, `content`, `versions`).
    - **Collection** (`DocumentCollection`, `DocumentVersionCollection`): paginated HAL envelopes with
      `_embedded`, `_links`, and `page`.

    ## Security and Authentication
    The API is secured using **OAuth 2.0** (Client Credentials flow). Clients must obtain an access token
    and include it in the `Authorization` header as a Bearer token. Operations declare the scope they
    require:
    - `documents:read` for `GET` operations (metadata and binary downloads).
    - `documents:write` for `POST` and `DELETE` operations (uploads, replacements, deletions).
