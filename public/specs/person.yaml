  parameters:
    BankAccountId:
      name: bank_account_id
      in: path
      description: Unique identifier of the bank account.
      required: true
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: b2d4f6e8-1a3c-5e7f-9b1d-3f5e7a9c1b3d
    AddressType:
      name: address_type
      in: path
      required: true
      description: |
        The type of address to create, retrieve, update, or delete.

        - `PRINCIPAL`: Principal residence. A person must have a PRINCIPAL address.
        - `CORRESPONDENCE`: Correspondence address. If not provided, the PRINCIPAL address is used by default.
        - `FISCAL`: Fiscal residence. If not provided, the PRINCIPAL address is used by default.

          enum:
            - PRINCIPAL
            - CORRESPONDENCE
            - FISCAL
          example: PRINCIPAL
      schema:
        $ref: '#/components/schemas/AddressType'
    FiscalType:
      name: fiscal_type
      in: path
      description: |
        Type of fiscal information.

        - `FATCA`: Foreign Account Tax Compliance Act. Required for US persons or entities with US fiscal ties.
        - `CRS`: Common Reporting Standard (OECD). Required for fiscal residents outside France for automatic exchange of information.
        - `FRENCH_RESIDENCY`: French fiscal residency flag. Default when no fiscal information has been registered for the person.
      required: true
      schema:
        $ref: '#/components/schemas/FiscalType'
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
        minimum: 1
        maximum: 100
        example: 20
      description: Maximum number of items per page.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 1
        minimum: 1
        maximum: 10000
        example: 1
      description: Page number (one-based).
    PersonId:
      name: person_id
      in: path
      description: Unique identifier of the person
      required: true
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
