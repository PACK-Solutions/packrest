    UnprocessableSubmitMissingPrerequisites:
      summary: Submit blocked ΓÇõ required sub-resources missing on the individual
      value:
        type: https://pack-solutions.com/probs/unprocessable-entity
        title: Unprocessable Entity
        status: 422
        detail: The individual cannot be submitted because required data is missing. Provide the missing sub-resources via their intermediate endpoints and retry.
        instance: /individuals/1f1a8119-4e24-4460-a126-c79f8ed0017f/submit
        errors:
          - code: MISSING
            detail: A principal address is required before submission. Set it via `POST /individuals/{person_id}/addresses/PRINCIPAL`.
          - code: MISSING
            detail: The French residency fiscal information (`FRENCH_RESIDENCY`) is required before submission. Set it via `POST /individuals/{person_id}/fiscal-informations/FRENCH_RESIDENCY`.
          - code: MISSING
            detail: At least one bank account is required before submission. Create one via `POST /individuals/{person_id}/bank-accounts`.
    UnprocessableSubmitMissingBankAccount:
      summary: Submit blocked ΓÇõ no bank account registered on the individual
      value:
        type: https://pack-solutions.com/probs/unprocessable-entity
