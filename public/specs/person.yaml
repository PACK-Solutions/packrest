    Unauthorized:
      type: object
      title: Unauthorized
      description: Unauthorized (401)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    UnprocessableEntity:
      type: object
      title: Unprocessable Entity
      description: Unprocessable Entity (422)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    ServiceRequestType:
      type: string
      title: Service Request Type
      description: |
        The type of service request driving a manual review.

        - `ADDRESS_CHANGE`: Change the policyholder's postal address.
        - `NAME_CHANGE`: Change the policyholder's name.
        - `FAMILY_STATUS_CHANGE`: Change the policyholder's family or marital status.
        - `BANK_ACCOUNT_CHANGE`: Change the bank account details associated with a contract.
        - `BENEFICIARY_CLAUSE_CHANGE`: Update a contract's beneficiary clause.
        - `CONTRACT_SUBSCRIPTION`: Internal review of a submitted contract. Created automatically by the server on `POST /contracts/{contract_id}/submit`. Absorbs the AML review of the subscription premium.
        - `CONTRACT_RENUNCIATION`: Withdraw a newly subscribed contract within the legal renunciation period. The only service request a partner can initiate explicitly on a contract.
        - `PREMIUM_PAYMENT`: Review of an additional premium payment (e.g., AML check on a high amount). Created automatically by the server when the partner posts a premium that triggers a review.
        - `SEPA_MANDATE_SIGNATURE`: Collection of the signed SEPA direct-debit mandate (mandat de pr├Òl├¿vement) for a newly created `SEPA_DEBIT` payment method. Created automatically by the server on `POST /individuals/{id}/payment-methods`.
      maxLength: 30
      minLength: 1
      enum:
        - ADDRESS_CHANGE
        - NAME_CHANGE
        - FAMILY_STATUS_CHANGE
        - BANK_ACCOUNT_CHANGE
        - CONTRACT_SUBSCRIPTION
        - PREMIUM_PAYMENT
        - BENEFICIARY_CLAUSE_CHANGE
        - CONTRACT_RENUNCIATION
        - SEPA_MANDATE_SIGNATURE
      example: PREMIUM_PAYMENT
    ServiceRequestStatus:
      type: string
      title: Service Request Status
      description: |
        Lifecycle status of a service request.

        - `REQUIRES_INFORMATION`: The request needs additional information or documents before review can proceed.
        - `UNDER_REVIEW`: The request is being reviewed by PACK Solutions.
        - `APPROVED`: The request was approved.
        - `REJECTED`: The request was rejected.
        - `CANCELLED`: The request was cancelled before completion.
        - `EXPIRED`: The request expired without resolution.
      maxLength: 30
      minLength: 1
      enum:
        - REQUIRES_INFORMATION
        - UNDER_REVIEW
        - APPROVED
        - REJECTED
        - CANCELLED
        - EXPIRED
      example: UNDER_REVIEW
    ServiceRequestSummary:
      type: object
      title: Service Request Summary
      description: |
        Embedded preview of a single service request ΓÇõ the strict minimum needed
        for navigation: id, type, status, and the HAL `self` link. The full request
        detail is obtained by following `_links.self`.
      properties:
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Unique identifier of the service request.
          example: 5b1a8119-4e24-4460-a126-c79f8ed0017f
        status:
          $ref: '#/components/schemas/ServiceRequestStatus'
        type:
          $ref: '#/components/schemas/ServiceRequestType'
      required:
        - id
        - type
        - status
        - _links
    DocumentRequirement:
      type: object
      title: Document Requirement
      description: |
        A document expected to satisfy a service request. Each requirement
        carries a machine-readable `code`, a human-readable `reason`, and the
        list of document types accepted to fulfil it.
      properties:
        accepted_document_types:
          type: array
          maxItems: 20
          description: |
            List of accepted `DocumentType` values from the shared catalog.
            Any of these can satisfy the requirement.
          items:
            $ref: '#/components/schemas/DocumentType'
          example:
            - PROOF_OF_ADDRESS
        code:
          type: string
          maxLength: 255
          minLength: 1
          pattern: ^[A-Za-z0-9._-]+$
          description: Machine-readable code identifying the requirement.
          example: address-change-proof
        reason:
          type: string
          maxLength: 1000
          minLength: 1
          description: Human-readable explanation of why the document is needed.
          example: A supporting document is required to update the postal address.
      required:
        - code
        - reason
        - accepted_document_types
    WithServiceRequests:
      type: object
      title: With Service Requests
      description: |
        Mixin merged (via `allOf`) into a resource's `_embedded` namespace.
        Contributes the list of service requests created or updated by the
        latest mutation on the parent resource. A single mutation may trigger
        several reviews at once (e.g. an individual update touching name,
        address and bank account), hence a list rather than a single entry.

        Conventions:
        - The key is **absent** from `_embedded` when no review is required.
        - When present, it is a non-empty list. Each entry exposes the strict
          minimum needed for navigation: id, type, status, and the HAL `self`
          link. The full request detail is obtained by following `_links.self`.
      properties:
        service_requests:
          type: array
          readOnly: true
          maxItems: 10
          description: |
            Embedded previews of the service requests created or updated by the
            latest mutation on the parent resource. Absent from `_embedded`
            when no review is required; otherwise a non-empty list.
          items:
            $ref: '#/components/schemas/ServiceRequestSummary'
    ServiceRequestResource:
      type: object
      title: Service Request Resource
      description: |
        Partner-facing read model for a service request. Returned by
        `GET /{parent}/{parent_id}/service-requests/{service_request_id}` on the
        Contract and Person APIs.

        Type-specific fields (e.g. `beneficiary_clause_draft`, `fund_origin`)
        are carried by per-API extensions composed via `allOf`.
      properties:
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - type: object
              description: HAL navigation links.
              properties:
                parent:
                  $ref: '#/components/schemas/HalLink'
        documents:
          type: array
          maxItems: 50
          readOnly: true
          description: Documents already attached to the service request.
          items:
            $ref: '#/components/schemas/AttachedDocument'
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          readOnly: true
          description: Unique identifier of the service request.
          example: 5b1a8119-4e24-4460-a126-c79f8ed0017f
        previous_outcome:
          oneOf:
            - $ref: '#/components/schemas/PreviousOutcome'
            - type: 'null'
          readOnly: true
          description: |
            Outcome of the previous version of the service request when the
            current one is the result of a `resubmit` action. `null` on the
            first submission.
        rejection_reasons:
          type: array
          maxItems: 50
          readOnly: true
          description: |
            Human-readable reasons returned when the service request is
            `REJECTED`. Empty array when not rejected.
          items:
            $ref: '#/components/schemas/RejectionReason'
        required_documents:
          type: array
          maxItems: 50
          readOnly: true
          description: Documents expected to fulfil the request.
          items:
            $ref: '#/components/schemas/DocumentRequirement'
        status:
          allOf:
            - $ref: '#/components/schemas/ServiceRequestStatus'
          readOnly: true
        type:
          allOf:
            - $ref: '#/components/schemas/ServiceRequestType'
          readOnly: true
        version:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
          readOnly: true
          description: |
            Incremented every time the service request is resubmitted after a
            rejection. The original submission is version `1`.
          example: 1
      required:
        - id
        - type
        - status
        - version
        - required_documents
        - documents
        - rejection_reasons
        - _links
    AttachedDocument:
      type: object
      title: Attached Document
      description: |
        A document already attached to a service request, with its type and the HAL
        `self` link to the document resource in the Document API.
      properties:
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
        document_type:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Document type as declared on upload.
          example: PROOF_OF_ADDRESS
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of the attached document (Document API).
          example: 6f1a6b9d-3f3f-4f31-a2d7-8d8dc2e90b55
      required:
        - id
        - document_type
    RejectionReason:
      type: object
      title: Rejection Reason
      description: |
        A single human-readable reason returned when a service request is `REJECTED`,
        paired with a machine-readable code.
      properties:
        code:
          type: string
          maxLength: 255
          minLength: 1
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable reason code.
          example: PROOF_OF_ADDRESS_ILLEGIBLE
        message:
          type: string
          maxLength: 1000
          minLength: 1
          description: Human-readable explanation.
          example: The submitted proof of address is illegible.
      required:
        - code
        - message
    PreviousOutcome:
      type: string
      title: Previous Outcome
      description: |
        Terminal outcome of the previous version of a service request before it
        was resubmitted. Only non-approved terminal states are tracked here ΓÇõ
        an approved request is never resubmitted.

        - `REJECTED`: The previous version was rejected by the reviewer.
        - `EXPIRED`: The previous version expired without resolution.
      enum:
        - REJECTED
        - EXPIRED
      example: REJECTED
    DocumentReference:
      type: object
      title: Document Reference
      description: |
        Lightweight reference to a document: its identifier plus its type.
      properties:
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of the referenced document.
          example: 6f1a6b9d-7c23-4f11-ae82-90b3c5d8e14a
        type:
          description: Type of the referenced document, from the shared `DocumentType` catalog.
          allOf:
            - $ref: '#/components/schemas/DocumentType'
          example: PROOF_OF_ADDRESS
      required:
        - id
        - type
