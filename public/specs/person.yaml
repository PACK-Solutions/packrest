      pattern: ^[A-Z]{2}$
    ExistingBankAccount:
      title: Existing BankAccount
      description: A bank account with server-generated fields.
      type: object
      allOf:
        - $ref: '#/components/schemas/BankAccount'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Server-generated unique identifier.
              example: b2d4f6e8-1a3c-5e7f-9b1d-3f5e7a9c1b3d
          required:
            - id
    ExistingIndividual:
      type: object
      title: ExistingIndividual
      description: Existing individual with server-generated fields.
      allOf:
        - $ref: '#/components/schemas/Individual'
        - type: object
          required:
            - id
            - first_name
            - last_name
            - birth
            - status
          properties:
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Server-generated unique identifier.
              example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
            status:
              $ref: '#/components/schemas/Status'
    FATCA:
      title: FATCA
      description: FATCA (Foreign Account Tax Compliance Act) specific data
      allOf:
        - $ref: '#/components/schemas/FiscalInformationBase'
        - type: object
          required:
            - tax_identification_number
          properties:
            controlling_person:
              $ref: '#/components/schemas/ControllingPerson'
            fiscal_type:
              type: string
              maxLength: 30
              const: FATCA
            is_pre_existing_contract:
              type: boolean
              description: Indicates if there is a pre-existing contract
              example: true
            us_indicia:
              type: array
              maxItems: 20
              description: |
                A list of US indicia that may indicate a US tax status.

                - `US_CITIZENSHIP_OR_GREEN_CARD`: US citizenship or green card holder.
                - `US_BIRTH_PLACE`: Born in the USA.
                - `US_ADDRESS`: US residence or mailing address.
                - `US_TELEPHONE_NUMBER`: US telephone number.
                - `US_STANDING_INSTRUCTIONS`: Standing instructions to transfer funds to an account in the US.
                - `US_POWER_OF_ATTORNEY`: Power of attorney or signature authority granted to a person with a US address.
                - `US_HOLD_MAIL_OR_IN_CARE_OF_ADDRESS`: An "in-care-of" or "hold mail" address in the US.
                - `US_NATIONALITY_OR_DUAL_NATIONALITY`: US nationality or dual nationality.
              items:
                $ref: '#/components/schemas/UsIndiciaCode'
              example:
                - US_CITIZENSHIP_OR_GREEN_CARD
                - US_NATIONALITY_OR_DUAL_NATIONALITY
    FATCACreate:
      type: object
      description: Payload for creating a new FATCA.
      title: FATCA Creation
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/FATCA'
    FATCAResource:
      type: object
      title: FATCA Resource
      description: FATCA resource with HAL links
      allOf:
        - $ref: '#/components/schemas/FATCA'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a FATCA fiscal information.

                    | Relation | Method | Always present |
                    |---|---|---|
                    | `self` | GET | yes |
                    | `individual` | GET | yes |
                  properties:
                    individual:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the owning individual.
                  required:
                    - individual
          required:
            - _links
    FamilyStatus:
      type: string
      title: Family Status
      description: |
        Family / marital situation of the individual.
        - `SINGLE`: Applicant is not married, not in a civil partnership, and not cohabiting as declared.
        - `MARRIED`: Applicant is legally married.
        - `CIVIL_PARTNERSHIP`: Applicant is in a registered civil partnership (PACS).
        - `COHABITING`: Applicant is living with a partner without being married or in a civil partnership.
        - `DIVORCED`: Applicant was married or in a civil partnership and the union has been legally dissolved.
        - `SEPARATED`: Applicant is legally or factually separated from a spouse or partner.
        - `WIDOWED`: Applicant's spouse or partner is deceased.
        - `UNKNOWN`: Family status is unknown, not provided, or cannot be determined at the time of subscription.
      enum:
        - SINGLE
        - MARRIED
        - CIVIL_PARTNERSHIP
        - COHABITING
        - DIVORCED
        - SEPARATED
        - WIDOWED
        - UNKNOWN
      example: SINGLE
    CivilStatus:
      type: string
      title: Civil Status
      description: |
        Civil status (Madame or Monsieur).

        - `MR`: Monsieur
        - `MRS`: Madame
      enum:
        - MR
        - MRS
      example: MR
    AddressType:
      type: string
      title: Address Type
      description: |
        Type of address attached to a person.

        - `PRINCIPAL`: Principal residence. A person must have a `PRINCIPAL` address.
        - `CORRESPONDENCE`: Correspondence address. If not provided, the `PRINCIPAL` address is used by default.
        - `FISCAL`: Fiscal residence. If not provided, the `PRINCIPAL` address is used by default.
      enum:
        - PRINCIPAL
        - CORRESPONDENCE
        - FISCAL
      example: PRINCIPAL
    FiscalType:
      type: string
      title: Fiscal Type
      description: |
        Type of fiscal information record attached to a person.

        - `FATCA`: Foreign Account Tax Compliance Act. Required for US persons or entities with US fiscal ties.
        - `CRS`: Common Reporting Standard (OECD). Required for fiscal residents outside France for automatic exchange of information.
        - `FRENCH_RESIDENCY`: French fiscal residency flag. Default when no fiscal information has been registered for the person.
      enum:
        - FATCA
        - CRS
        - FRENCH_RESIDENCY
      example: FATCA
    TaxIdentificationAbsenceReason:
      type: string
      title: Tax Identification Absence Reason
      description: |
        Reason for the absence of a Tax Identification Number (TIN), per FATCA standards.

        - `REQUEST_IN_PROGRESS`: Application for TIN has been submitted (Code A).
        - `CANNOT_OBTAIN_OTHER_REASON`: Cannot obtain for another reason (Code B; provide details in `absence_details`).
        - `NOT_PROVIDED_REFRACTORY_CLIENT`: Not provided by client (Code C).
        - `NOT_RESIDENT_OR_RENOUNCED_CITIZENSHIP`: Not a tax resident or has renounced citizenship (Code D).
      enum:
        - REQUEST_IN_PROGRESS
        - CANNOT_OBTAIN_OTHER_REASON
        - NOT_PROVIDED_REFRACTORY_CLIENT
        - NOT_RESIDENT_OR_RENOUNCED_CITIZENSHIP
      example: REQUEST_IN_PROGRESS
    UsIndiciaCode:
      type: string
      title: US Indicia Code
      description: |
        Indicator suggesting a possible US tax status (FATCA).

        - `US_CITIZENSHIP_OR_GREEN_CARD`: US citizenship or green card holder.
        - `US_BIRTH_PLACE`: Born in the USA.
        - `US_ADDRESS`: US residence or mailing address.
        - `US_TELEPHONE_NUMBER`: US telephone number.
        - `US_STANDING_INSTRUCTIONS`: Standing instructions to transfer funds to an account in the US.
        - `US_POWER_OF_ATTORNEY`: Power of attorney or signature authority granted to a person with a US address.
        - `US_HOLD_MAIL_OR_IN_CARE_OF_ADDRESS`: An "in-care-of" or "hold mail" address in the US.
        - `US_NATIONALITY_OR_DUAL_NATIONALITY`: US nationality or dual nationality.
      enum:
        - US_CITIZENSHIP_OR_GREEN_CARD
        - US_BIRTH_PLACE
        - US_ADDRESS
        - US_TELEPHONE_NUMBER
        - US_STANDING_INSTRUCTIONS
        - US_POWER_OF_ATTORNEY
        - US_HOLD_MAIL_OR_IN_CARE_OF_ADDRESS
        - US_NATIONALITY_OR_DUAL_NATIONALITY
      example: US_CITIZENSHIP_OR_GREEN_CARD
    FiscalInformation:
      title: Fiscal information
      description: Fiscal information for a person
      oneOf:
        - $ref: '#/components/schemas/FATCAResource'
        - $ref: '#/components/schemas/CRSResource'
        - $ref: '#/components/schemas/FrenchResidencyResource'
      discriminator:
        propertyName: fiscal_type
        mapping:
          FATCA: '#/components/schemas/FATCAResource'
          CRS: '#/components/schemas/CRSResource'
          FRENCH_RESIDENCY: '#/components/schemas/FrenchResidencyResource'
      examples:
        - $ref: '#/components/examples/FiscalInformation_FATCA'
        - $ref: '#/components/examples/FiscalInformation_CRS'
        - $ref: '#/components/examples/FiscalInformation_FrenchResidency'
    FiscalInformationBase:
      type: object
      title: Fiscal Information
      description: Fiscal information details
      properties:
        fiscal_type:
          type: string
          maxLength: 30
          readOnly: true
          description: |
            The category of fiscal information being provided.
            - `FATCA`: Foreign Account Tax Compliance Act (US standard).
            - `CRS`: Common Reporting Standard (international standard).
            - `FRENCH_RESIDENCY`: Specific data for French tax residency.
        tax_identification_number:
          $ref: '#/components/schemas/TaxIdentificationNumber'
          description: Tax identification number or reason for absence
      required:
        - fiscal_type
    FiscalInformationCreate:
      title: Fiscal Information Create
      description: |
        Polymorphic create/replace payload for a single fiscal record. The
        discriminator `fiscal_type` must match the `{fiscal_type}` path
        parameter on the upsert endpoint; otherwise the server returns
        `422 Unprocessable Entity`.
      oneOf:
        - $ref: '#/components/schemas/FATCACreate'
        - $ref: '#/components/schemas/CRSCreate'
        - $ref: '#/components/schemas/FrenchResidencyCreate'
      discriminator:
        propertyName: fiscal_type
        mapping:
          FATCA: '#/components/schemas/FATCACreate'
          CRS: '#/components/schemas/CRSCreate'
          FRENCH_RESIDENCY: '#/components/schemas/FrenchResidencyCreate'
    FiscalInformations:
      title: Fiscal Informations
      description: List of fiscal and tax information for a person. Limited to a maximum of 3 records.
      type: object
      properties:
        _embedded:
          type: object
          properties:
            fiscal_informations:
              type: array
              maxItems: 3
              items:
                $ref: '#/components/schemas/FiscalInformation'
          required:
            - fiscal_informations
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
      required:
        - _links
        - _embedded
      examples:
        - $ref: '#/components/examples/FiscalInformations'
    Forbidden:
      type: object
      title: Forbidden
      description: Forbidden (403)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    FrenchResidency:
      type: object
      title: French residency
      description: |
        French tax residency flag.

        This record carries no business data; its mere presence indicates that
        the person is a French fiscal resident.

        French residency is the **default** fiscal information for a person:
        if no fiscal information has been registered, the person is implicitly
        treated as a French resident.
      properties:
        fiscal_type:
          type: string
          maxLength: 30
          readOnly: true
          const: FRENCH_RESIDENCY
          description: Discriminator ΓÇõ always `FRENCH_RESIDENCY`.
      required:
        - fiscal_type
    FrenchResidencyCreate:
      type: object
      description: Payload for creating a new French Residency.
      title: French Residency Creation
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/FrenchResidency'
    FrenchResidencyResource:
      type: object
      title: French Residency Resource
      description: French residency resource with HAL links
      allOf:
        - $ref: '#/components/schemas/FrenchResidency'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a French Residency fiscal information.

                    | Relation | Method | Always present |
                    |---|---|---|
                    | `self` | GET | yes |
                    | `individual` | GET | yes |
                  properties:
                    individual:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the owning individual.
                  required:
                    - individual
          required:
            - _links
    HalLink:
      type: object
      title: HalLink
      description: |
        HAL link object. Minimal shape: an `href` (URI of the linked resource)
        and the `method` to use when following it. Navigation and pagination
        relations use `GET`; action relations use `POST` (or `DELETE` for
        resource removal). The project does not use `PUT` or `PATCH`.
      additionalProperties: false
      required:
        - href
        - method
      properties:
        href:
          type: string
          format: uri-reference
          maxLength: 2048
          description: URI of the linked resource.
          example: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
        method:
          $ref: '#/components/schemas/HalLinkMethod'
          description: HTTP method to use when following this link.
    HalLinkMethod:
      type: string
      title: HalLinkMethod
      description: |
        HTTP method to use when following a HAL link. Restricted to
        `GET` (navigation), `POST` (actions and mutations), and `DELETE`
        (resource removal). The project does not use `PUT` or `PATCH`.
      enum:
        - GET
        - POST
        - DELETE
      example: GET
    HalPaginationLinks:
      type: object
      title: HalPaginationLinks
      description: |
        Pagination link relations used inside the `_links` of a collection envelope.
        `first` and `last` are always present; `next` and `prev` are conditional on
        page state. Compose with `HalSelfLinks` in every `*Collection._links`.
      properties:
        first:
          $ref: '#/components/schemas/HalLink'
          description: Link to the first page of the collection.
        last:
          $ref: '#/components/schemas/HalLink'
          description: Link to the last page of the collection.
        next:
          $ref: '#/components/schemas/HalLink'
          description: Link to the next page of the collection. Omitted on the last page.
        prev:
          $ref: '#/components/schemas/HalLink'
          description: Link to the previous page of the collection. Omitted on the first page.
      required:
        - first
        - last
      example:
        first:
          href: /resources?page=1&size=20
          method: GET
        last:
          href: /resources?page=5&size=20
          method: GET
        next:
          href: /resources?page=3&size=20
          method: GET
        prev:
          href: /resources?page=1&size=20
          method: GET
    HalSelfLinks:
      type: object
      title: HalSelfLinks
      description: |
        Base shape for every `_links` block. Guarantees that the `self` link is present
        on every HAL Resource and Collection envelope. Compose with `HalPaginationLinks`
        for paginated collections, or extend inline with action/navigation relations.
      properties:
        self:
          $ref: '#/components/schemas/HalLink'
          description: Link to the current resource.
      required:
        - self
      example:
        self:
          href: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
          method: GET
    Individual:
      type: object
      title: Individual
      description: |
        A natural person. 

        This model captures essential identity data, including birth information.
      allOf:
        - $ref: '#/components/schemas/PersonBase'
        - type: object
          properties:
            birth:
              $ref: '#/components/schemas/BirthWithRequiredDate'
            civil_status:
              $ref: '#/components/schemas/CivilStatus'
            external_reference:
              type: string
              maxLength: 50
              description: Membership number assigned by the insurer (external reference).
              example: '7500000'
            family_status:
              $ref: '#/components/schemas/FamilyStatus'
            first_name:
              type: string
              maxLength: 50
              description: Given name(s).
              example: Marie
            last_name:
              type: string
              maxLength: 60
              description: Family name.
              example: Dubois
            nationalities:
              type: array
              maxItems: 10
              description: List of countries where the person holds citizenship.
              items:
                $ref: '#/components/schemas/CountryCode'
              example:
                - FR
            social_security_number:
              type: string
              maxLength: 15
              description: National social security identifier.
              example: '290022199999999'
    IndividualCollection:
      type: object
      title: Individual Collection
      description: Paginated collection of individuals with HAL links and metadata
      properties:
        _embedded:
          $ref: '#/components/schemas/IndividualCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
    IndividualCollectionEmbedded:
      type: object
      title: Individual Collection Embedded
      description: Embedded resources for an Individual collection.
      properties:
        individuals:
          type: array
          maxItems: 100
          description: List of individual resources.
          items:
            $ref: '#/components/schemas/IndividualResource'
      required:
        - individuals
    IndividualCreate:
      type: object
      title: IndividualCreate
      description: Payload for creating an individual. Requires first name, last name, and date of birth.
      allOf:
        - $ref: '#/components/schemas/Individual'
        - type: object
          required:
            - first_name
            - last_name
            - birth
      examples:
        - $ref: '#/components/examples/IndividualCreate'
    IndividualResource:
      type: object
      title: Individual Resource
      description: |
        Individual resource with HAL links.

        When the latest mutation triggered one or more service requests (e.g.
        sensitive field changes on an `ENGAGED` individual ΓÇõ a single update may
        touch several fields at once), the embedded `_embedded.service_requests`
        list navigates to each request detail. The key is absent from `_embedded`
        when no review was triggered. The submitted values awaiting approval are
        carried by the service request itself.
      allOf:
        - $ref: '#/components/schemas/ExistingIndividual'
        - type: object
          properties:
            _embedded:
              $ref: '#/components/schemas/IndividualResourceEmbedded'
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for an individual. `submit` is exposed only
                    when `status: DRAFT`.

                    | Relation | Method | Always present | Conditional on status |
                    |---|---|---|---|
                    | `self` | GET | yes | ΓÇõ |
                    | `addresses` | GET | yes | ΓÇõ |
                    | `fiscal_informations` | GET | yes | ΓÇõ |
                    | `bank_accounts` | GET | yes | ΓÇõ |
                    | `service_requests` | GET | yes | Link to `GET /service-requests?target_resource_type=INDIVIDUAL&target_resource_id={id}` in the Service Request API |
                    | `submit` | POST | no | `DRAFT` only |
                  properties:
                    addresses:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the addresses collection of this individual.
                    bank_accounts:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the bank accounts collection of this individual.
                    fiscal_informations:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the fiscal informations collection of this individual.
                    service_requests:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to service requests targeting this individual (`GET /service-requests?target_resource_type=INDIVIDUAL&target_resource_id={id}`).
                    submit:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to submit the individual. Present only when `status: DRAFT`.'
                  required:
                    - addresses
                    - fiscal_informations
                    - bank_accounts
                    - service_requests
          required:
            - _links
      examples:
        - $ref: '#/components/examples/IndividualResource'
    IndividualResourceEmbedded:
      title: Individual Resource Embedded
      description: |
        Embedded resources for an Individual resource. Exposes a
        `service_requests` list when the latest mutation triggered one or more
        manual reviews (key absent otherwise). A single update may touch several
        fields at once (e.g. name, address and bank account) and therefore
        trigger several reviews.
      readOnly: true
      additionalProperties: true
      allOf:
        - $ref: '#/components/schemas/WithServiceRequests'
    IndividualUpdate:
      type: object
      title: IndividualUpdate
      description: |
        Individual update payload for partial updates. All fields are optional.
        Uses POST on the resource with the `id` as a path parameter.
      allOf:
        - $ref: '#/components/schemas/PersonBase'
        - type: object
          properties:
            birth:
              $ref: '#/components/schemas/Birth'
            civil_status:
              $ref: '#/components/schemas/CivilStatus'
            external_reference:
              type: string
              maxLength: 50
              description: Membership number assigned by the insurer (external reference).
              example: '7500000'
            first_name:
              type: string
              maxLength: 50
              description: Given name(s).
              example: Marie
            last_name:
              type: string
              maxLength: 60
              description: Family name.
              example: Dubois
            nationalities:
              type: array
              maxItems: 10
              description: List of countries where the person holds citizenship.
              items:
                $ref: '#/components/schemas/CountryCode'
              example:
                - FR
            social_security_number:
              type: string
              maxLength: 15
              description: National social security identifier.
              example: '290022199999999'
      examples:
        - $ref: '#/components/examples/IndividualUpdate'
    InternalServerError:
      type: object
      title: Internal Server Error
      description: Internal Server Error (500)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    Metadata:
      type: object
      title: Metadata
      description: |
        Set of key-value pairs that you can attach to an object.
        This can be useful for storing additional information about the object in a structured format.

        Capped at 50 entries with 64-char key names and 500-char string values to
        prevent DoS via payload bloat.
      maxProperties: 50
      propertyNames:
        maxLength: 64
      additionalProperties:
        type: string
        maxLength: 500
      example:
        customer_segment: premium
        internal_id: '12345'
    NotFound:
      type: object
      title: Not Found
      description: Not Found (404)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    PageMetadata:
      type: object
      title: PageMetadata
      description: Pagination metadata for collection responses.
      properties:
        number:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
          description: Current page number (one-based).
          example: 1
        size:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          description: Number of items per page.
          example: 20
        total_elements:
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999999
          description: Total number of items across all pages.
          example: 100
        total_pages:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          description: Total number of pages.
          example: 5
      required:
        - size
        - total_elements
        - total_pages
        - number
    Rate:
      type: object
      title: Rate
      description: |
        A percentage with fixed precision of 2 decimals.
        The actual decimal percentage is computed as `value * 10^(-2)`.
        For example, `{ "value": 1050, "scale": 2 }` represents 10.50%.
      properties:
        scale:
          type: integer
          format: int32
          minimum: 2
          maximum: 2
          const: 2
          description: Fixed number of decimal places.
          examples:
            - 2
        value:
          type: integer
          format: int64
          minimum: 0
          maximum: 10000
          description: |
            The unscaled integer value of the percentage.
            Valid range: 0 to 10000, representing 0.00% to 100.00%.
          examples:
            - 0
            - 50
            - 1050
            - 10000
      required:
        - value
        - scale
      additionalProperties: false
      examples:
        - value: 0
          scale: 2
        - value: 1050
          scale: 2
        - value: 10000
          scale: 2
    PersonBase:
      type: object
      title: PersonBase
      description: Base properties common to all person types
      properties:
        communication:
          $ref: '#/components/schemas/Communication'
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Set of key-value pairs
    PhoneNumber:
      type: string
      title: Phone number
      description: Phone number in E.164 format
      maxLength: 16
      pattern: ^\+[1-9]\d{1,14}$
      example: '+33612345678'
    PlaceOfBirth:
      type: object
      title: Place of birth
      description: Place of birth
      properties:
        city:
          type: string
          maxLength: 100
          description: City of birth
          example: Dijon
        country_code:
          $ref: '#/components/schemas/CountryCode'
        postal_code:
          type: string
          maxLength: 20
          description: Postal code of birth city
          example: '21000'
      required:
        - city
        - postal_code
        - country_code
    ProblemDetails:
      type: object
      title: Problem Details
      description: A RFC 9457 compliant problem detail object
      properties:
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Your current balance is 30, but that costs 50.
        instance:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://pack-solutions.com/accounts/12345/msgs/abc
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 403
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: A short, human-readable summary of the problem type.
          example: You do not have enough credit.
        type:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the problem type.
          default: about:blank
          example: https://pack-solutions.com/probs/out-of-stock
    ValidationProblemDetails:
      type: object
      title: Validation Problem Details
      description: |
        An extension of RFC 9457 Problem Details that includes structured validation errors.
        Used for responses where the server needs to communicate specific field-level or business-rule validation failures.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: array
              maxItems: 100
              description: A list of validation errors that occurred during request processing.
              items:
                $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      title: Validation Error
      description: |
        A single validation error entry describing a specific issue with the request.
      properties:
        code:
          $ref: '#/components/schemas/ValidationErrorCode'
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation of the validation error.
        pointer:
          type: string
          minLength: 1
          maxLength: 500
          pattern: ^/
          description: |
            A JSON Pointer (RFC 6901) to the field in the request body that caused the
            error. For asynchronous validations surfaced on a service request (e.g.,
            manual review rejections), the same convention is used in
            `ServiceRequestRequirement.pointer` (entries with `kind=DATA_FIELD`). Consumer
            rendering logic can therefore be shared between synchronous `422` errors and
            asynchronous INVALID requirements.

            When the offending field lives inside a HAL `_embedded` or `_links` block
            (e.g., on a 409 conflict against a resource that exposes its sub-collections
            via embedding), the pointer follows the **physical** structure of the HAL
            response and includes the `_embedded`/`_links` segments ΓÇõ for example
            `/_embedded/individuals/0/birth/date_of_birth`.
      required:
        - code
        - detail
    ValidationErrorCode:
      type: string
      title: Validation Error Code
      description: |
        A machine-readable error code indicating the type of validation failure.

        Prefer the most specific code available. Use `UNPROCESSABLE` and `CUSTOM`
        only as last-resort fallbacks when no specific code fits.

        ### Presence (typically on 422 and 400)
        - `MISSING`: A required resource or related entity is missing (e.g., referenced `subscriber_id` does not exist).
        - `MISSING_FIELD`: A required field was not provided in the request body.

        ### Shape (typically on 400 and 422)
        - `INVALID`: The field value is invalid in a generic sense. Use a more specific code when applicable.
        - `INVALID_FORMAT`: The field value does not match the expected format (e.g., not a valid IBAN, UUID, ISO-8601 date).
        - `OUT_OF_RANGE`: The field value is well-formed but falls outside the accepted range ΓÇõ numeric bounds, temporal window, or string length.
        - `INCONSISTENT`: The field is inconsistent with another field in the same payload (e.g., `allocations` rates do not sum to 100%, `date_of_end` before `date_of_start`).

        ### State (typically on 409)
        - `ALREADY_EXISTS`: The resource or value already exists and duplicates are not allowed.
        - `INVALID_STATE`: The operation is incompatible with the current state of the resource (e.g., trying to cancel an already-executed premium, submitting a contract whose subscriber is still in `DRAFT`).

        ### Business rules (typically on 422)
        - `BUSINESS_RULE_VIOLATION`: A documented business rule is violated and no more specific code above fits (e.g., a regulatory threshold is crossed).

        ### Fallbacks
        - `UNPROCESSABLE`: Legacy generic code. **Prefer `BUSINESS_RULE_VIOLATION` or a state/shape code above.**
        - `CUSTOM`: A custom validation error not covered by the standard codes.
      enum:
        - MISSING
        - MISSING_FIELD
        - INVALID
        - INVALID_FORMAT
        - OUT_OF_RANGE
        - INCONSISTENT
        - ALREADY_EXISTS
        - INVALID_STATE
        - BUSINESS_RULE_VIOLATION
        - UNPROCESSABLE
        - CUSTOM
      example: MISSING_FIELD
    CurrencyCode:
      type: string
      title: Currency Code
      description: |
        ISO 4217 currency code.

        - `EUR`: Euro
        - `USD`: US Dollar
        - `GBP`: British Pound Sterling
        - `CHF`: Swiss Franc
      enum:
        - EUR
        - USD
        - GBP
        - CHF
      example: EUR
    ServiceRequestRequirement:
      type: object
      title: Service Request Requirement
      description: |
        A single requirement that must be fulfilled for a service request to progress.

        Service requests expose a flat `requirements: ServiceRequestRequirement[]`
        array. When no entry remains in `MISSING` or `INVALID` state, the SR
        auto-transitions from `REQUIRES_INFORMATION` to `UNDER_REVIEW`. Business resources (Contract,
        Premium, IndividualΓÇª) do **not** carry this model; missing fields on a
        business resource surface as synchronous `422 Unprocessable Entity` errors
        on the mutation that needs them.

        Combines a `kind` (data field vs document) with a `state` to describe precisely
        what the partner must provide or correct. Requirements persist throughout the full
        lifecycle of the service request; only their `state` evolves.

        `state` is server-managed: it is never accepted in a request body and is
        present only on read responses.

        Document requirement lifecycle (`kind=DOCUMENT`):
        `MISSING` ΓÁÈ *(document attached)* ΓÁÈ `SUBMITTED` ΓÁÈ *(reviewer accepts)* ΓÁÈ `VALIDATED`
                                                         ΓÁÈ *(reviewer rejects)* ΓÁÈ `INVALID`
                                          ΓÁÈ *(new document attached)* ΓÁÈ `SUBMITTED`

        Data field requirement lifecycle (`kind=DATA_FIELD`):
        `MISSING` ΓÁÈ *(field posted)* ΓÁÈ `VALIDATED`
        `INVALID` ΓÁÈ *(corrected value posted)* ΓÁÈ `VALIDATED`

        The six cases:

        - **Missing data field** ΓÇõ `kind=DATA_FIELD`, `state=MISSING`. POST the value to
          the service request endpoint; `pointer` locates the target field.
        - **Invalid data field** ΓÇõ `kind=DATA_FIELD`, `state=INVALID`. POST a corrected
          value; `pointer` locates the field and `error_code` classifies the rejection
          programmatically.
        - **Missing document** ΓÇõ `kind=DOCUMENT`, `state=MISSING`. Upload a file via the
          service request `documents` endpoint with a `document_type` from
          `accepted_document_types`.
        - **Submitted document** ΓÇõ `kind=DOCUMENT`, `state=SUBMITTED`. A document has been
          attached and is awaiting manual review. `document` (its `id` and `type`) identifies
          the attached document. The requirement no longer blocks the SR from entering `UNDER_REVIEW`.
        - **Invalid document** ΓÇõ `kind=DOCUMENT`, `state=INVALID`. A document was attached
          but rejected during manual review. `document` (its `id` and `type`) identifies the
          rejected document and `error_code` classifies the rejection. Upload a replacement
          to transition back to `SUBMITTED`.
        - **Validated document** ΓÇõ `kind=DOCUMENT`, `state=VALIDATED`. A document was
          accepted during manual review. `document` (its `id` and `type`) identifies the
          accepted document.
      properties:
        accepted_document_types:
          type: array
          maxItems: 20
          description: |
            List of document types that can satisfy this requirement.
            Present only when `kind=DOCUMENT`. Each value is a `DocumentType`
            from the shared catalog.
          items:
            $ref: '#/components/schemas/DocumentType'
          example:
            - PROOF_OF_ADDRESS
        document:
          readOnly: true
          description: |
            Reference (id + type) of the document attached to satisfy this requirement.
            Present only when `kind=DOCUMENT` and a document has been attached
            (`state` is `SUBMITTED`, `VALIDATED`, or `INVALID` following a review).
            Absent when `state=MISSING`.
          allOf:
            - $ref: '#/components/schemas/DocumentReference'
        error_code:
          description: |
            Machine-readable classification of why this entry is in `state=INVALID`.
            Optional and present only when `state=INVALID`. Reuses the same enum as
            `ValidationError.code` (synchronous `422` errors), so consumers can share
            the same switch logic across both error channels.
          allOf:
            - $ref: '#/components/schemas/ValidationErrorCode'
          example: BUSINESS_RULE_VIOLATION
        kind:
          $ref: '#/components/schemas/ServiceRequestRequirementKind'
        pointer:
          type: string
          minLength: 1
          maxLength: 255
          pattern: ^/
          description: |
            RFC 6901 JSON Pointer to the offending field, relative to the service request
            payload. Present when `kind=DATA_FIELD`. Same convention as
            `ValidationError.pointer` (synchronous 422 errors), allowing consumers to share
            rendering and field-locator logic between both error channels.
          example: /address/postal_code
        state:
          allOf:
            - $ref: '#/components/schemas/ServiceRequestRequirementState'
          readOnly: true
      required:
        - kind
        - state
    ServiceRequestRequirementKind:
      type: string
      title: Service Request Requirement Kind
      description: |
        Nature of a service request requirement.

        - `DATA_FIELD`: a missing or invalid data field on the service request payload.
          Provide or correct the value via `POST` on the service request endpoint.
        - `DOCUMENT`: a missing or invalid supporting document.
          Upload or replace the file via `POST` on the service request `documents` endpoint.
      enum:
        - DATA_FIELD
        - DOCUMENT
      example: DOCUMENT
    ServiceRequestRequirementState:
      type: string
      title: Service Request Requirement State
      description: |
        Current status of a service request requirement.

        - `MISSING`: nothing has been provided yet for this entry ΓÇõ the partner must supply
          the requested field value or document.
        - `INVALID`: a value or document was provided but rejected, either by automated
          validation (format error, business rule) or during manual review by a case handler.
          The partner must replace it to unblock the requirement.
        - `SUBMITTED`: a document has been attached and is awaiting manual review by a case
          handler. Only applies to `kind=DOCUMENT` requirements. The entry no longer blocks
          the service request from transitioning to `UNDER_REVIEW`, but `VALIDATED` is not
          set until a reviewer explicitly accepts it.
        - `VALIDATED`: the value or document provided for this entry was accepted ΓÇõ either
          by automated validation (data fields) or during manual review by a case handler
          (documents). A requirement in this state no longer blocks the service request from
          progressing; it is kept in the list for auditability.
      enum:
        - MISSING
        - INVALID
        - SUBMITTED
        - VALIDATED
      example: MISSING
    DocumentType:
      title: DocumentType
      type: string
      description: |
        Catalog of document types accepted by the API. Values are grouped by the
        **business entity** the document is typically attached to (`person`,
        `contract`, `payment_method`). Each group is further broken down by
        functional sub-category. Owner-scoped subset enums (`PersonDocumentType`,
        `ContractDocumentType`, `PaymentMethodDocumentType`) narrow this catalog
        to the values that are valid for a given owner.

        ### Person ΓÇõ Identity / Civil status
        - `PROOF_OF_IDENTITY`: Justificatif d'identit├Ò (CNI ou passeport, en cours de validit├Ò)
        - `BIRTH_CERTIFICATE`: Acte de naissance (< 3 mois)
        - `MARRIAGE_CERTIFICATE`: Acte de mariage
        - `DIVORCE_DECREE`: Jugement de divorce
        - `PROOF_OF_ADDRESS`: Justificatif de domicile

        ### Person ΓÇõ International taxation
        - `CERFA_3916`: CERFA 3916 (compte bancaire ├á l'├Òtranger)
        - `CERFA_5000`: CERFA 5000 (non-r├Òsident)
        - `W9_TAX_FORM`: Formulaire W9 (├Êtats-Unis)
        - `W8BEN_FORM`: Formulaire W-8BEN

        ### Person ΓÇõ AML-CFT compliance
        - `CONFIDENTIAL_INFORMATION_SHEET`: Fiche de renseignements confidentiels (versements > 40 kΓé¼)
        - `AML_PEP_PROOF`: Justificatif LCB-FT / PPE (Personne Politiquement Expos├Òe)

        ### Person ΓÇõ Legal protection
        - `LEGAL_PROTECTION`: Protection juridique (g├Òn├Òrique)
        - `GUARDIANSHIP_JUDGMENT`: Jugement de mise sous tutelle
        - `CURATORSHIP_JUDGMENT`: Jugement de mise sous curatelle
        - `JUDICIAL_PROTECTION_ORDER`: Jugement / ordonnance de sauvegarde de justice

        ### Contract ΓÇõ Subscription / product
        - `MEMBERSHIP_FORM`: Bulletin d'adh├Òsion
        - `MUTUAL_REGULATION`: R├¿glement mutualiste
        - `PROFILED_MANAGEMENT_MANDATE`: Mandat de gestion profil├Ò

        ### Contract ΓÇõ Beneficiary clause
        - `SIGNED_BENEFICIARY_CLAUSE_FORM`: Formulaire de clause b├Òn├Òficiaire sign├Ò
        - `ACCEPTING_BENEFICIARY`: B├Òn├Òficiaire acceptant

        ### Contract ΓÇõ Pledge / Third-party seizure
        - `PLEDGE_DEED`: Acte de nantissement
        - `PLEDGE_RELEASE`: Mainlev├Òe de nantissement
        - `DGFIP_THIRD_PARTY_NOTICE`: ATD ΓÇõ Avis tiers d├Òtenteur DGFiP

        ### Request / Operation ΓÇõ Generic formalism
        - `SIGNED_REQUEST_FORM`: Formulaire de demande sign├Ò
        - `SIGNED_REQUEST_LETTER`: Courrier de demande sign├Ò

        ### Payment / Financial operation
        - `PROOF_OF_FUND_ORIGIN`: Justificatif d'origine des fonds

        ### Benefit / Surrender
        - `FUND_DESTINATION_PROOF`: Justificatif de destination des fonds

        ### Bank account details
        - `SEPA_MANDATE`: Mandat SEPA
        - `BANK_DETAILS`: RIB (Relev├Ò d'Identit├Ò Bancaire)
        - `FOREIGN_BANK_DETAILS`: RIB ├Òtranger

        ### Catch-all
        - `OTHER`: Autre
      enum:
        - PROOF_OF_IDENTITY
        - BIRTH_CERTIFICATE
        - MARRIAGE_CERTIFICATE
        - DIVORCE_DECREE
        - PROOF_OF_ADDRESS
        - CERFA_3916
        - CERFA_5000
        - W9_TAX_FORM
        - W8BEN_FORM
        - CONFIDENTIAL_INFORMATION_SHEET
        - AML_PEP_PROOF
        - LEGAL_PROTECTION
        - GUARDIANSHIP_JUDGMENT
        - CURATORSHIP_JUDGMENT
        - JUDICIAL_PROTECTION_ORDER
        - MEMBERSHIP_FORM
        - MUTUAL_REGULATION
        - PROFILED_MANAGEMENT_MANDATE
        - SIGNED_BENEFICIARY_CLAUSE_FORM
        - ACCEPTING_BENEFICIARY
        - PLEDGE_DEED
        - PLEDGE_RELEASE
        - DGFIP_THIRD_PARTY_NOTICE
        - SIGNED_REQUEST_FORM
        - SIGNED_REQUEST_LETTER
        - PROOF_OF_FUND_ORIGIN
        - FUND_DESTINATION_PROOF
        - SEPA_MANDATE
        - BANK_DETAILS
        - FOREIGN_BANK_DETAILS
        - OTHER
      example: PROOF_OF_IDENTITY
    Status:
      type: string
      title: Person Status
      description: |
        The lifecycle status of the person within the system.
        - `DRAFT`: The person is being created. The client must validate personal data before submitting, and must set the submission prerequisites through the intermediate endpoints: a principal address, the French residency fiscal information (`FRENCH_RESIDENCY`), and at least one bank account.
        - `SUBMITTED`: The person has been submitted to the client and can now be selected for a contract role in a subscription.
        - `ENGAGED`: The person is engaged on a contract that has been accepted by internal managers (Contract API, via an approved `CONTRACT_SUBSCRIPTION` service request created by the partner after submission). Direct updates are no longer allowed through the Person API; changes must go through the service requests sub-resource at `/individuals/{id}/service-requests`.
      enum:
        - DRAFT
        - SUBMITTED
        - ENGAGED
      example: DRAFT
    TINBase:
      type: object
      title: TIN
      description: Tax Identification Number details
      properties:
        number:
          type: string
          maxLength: 50
          description: The Tax Identification Number
        tin_type:
          type: string
          maxLength: 20
          description: Discriminator for the TIN type
      required:
        - tin_type
    TaxIdentificationNumber:
      title: Tax identification number
      description: Tax identification number or reason for absence
      oneOf:
        - $ref: '#/components/schemas/TaxIdentificationNumberValue'
        - $ref: '#/components/schemas/TaxIdentificationNumberAbsence'
      discriminator:
        propertyName: tin_type
        mapping:
          NUMBER: '#/components/schemas/TaxIdentificationNumberValue'
          ABSENCE: '#/components/schemas/TaxIdentificationNumberAbsence'
    TaxIdentificationNumberAbsence:
      title: Tax identification number absence
      description: Reason and details for the absence of a Tax Identification Number (TIN).
      allOf:
        - $ref: '#/components/schemas/TINBase'
        - type: object
          properties:
            absence_details:
              type: string
              maxLength: 500
              description: Additional details if absence_reason is CANNOT_OBTAIN_OTHER_REASON
              example: The country does not issue TINs for individuals.
            absence_reason:
              $ref: '#/components/schemas/TaxIdentificationAbsenceReason'
            tin_type:
              type: string
              maxLength: 20
              const: ABSENCE
          required:
            - tin_type
            - absence_reason
    TaxIdentificationNumberValue:
      title: Tax identification number value
      description: A Tax Identification Number (TIN) for a person.
      allOf:
        - $ref: '#/components/schemas/TINBase'
        - type: object
          properties:
