openapi: 3.1.2
info:
  title: Person Management API
  description: |
    # Overview
    The Person Management API provides a comprehensive set of operations for managing **Individuals**. It serves as the central repository for identity, address, and fiscal information.

    ## Core Concepts

    ### Lifecycle and Status
    Every **Individual** transitions through a defined lifecycle. The `status` field is strictly computed by the server and exposed on read operations; it cannot be provided during creation or updated manually.

    The person's lifecycle can be one of the following states:
    - `DRAFT`: The person is being created. Required identity fields: `first_name`, `last_name`, and `birth.date_of_birth`. Before submitting, the client must also set, through the intermediate endpoints, a principal address (`POST /individuals/{id}/addresses/PRINCIPAL`), the French residency fiscal information (`POST /individuals/{id}/fiscal-informations/FRENCH_RESIDENCY`), and at least one bank account (`POST /individuals/{id}/bank-accounts`).
    - `SUBMITTED`: The person has been submitted to the client via `POST /individuals/{id}/submit`. The person can now be selected for a contract role in a subscription.
    - `ENGAGED`: The person is engaged on a contract once that contract has been accepted (Contract API: `ACCEPTED`). Direct mutations remain available (`POST /individuals/{id}`, `POST /individuals/{id}/addresses/{address_type}`, `POST /individuals/{id}/fiscal-informations/{fiscal_type}`, `POST /individuals/{id}/bank-accounts`); when a sensitive field is touched, the server automatically creates the matching service request(s) and exposes them under `_embedded.service_requests` (a single update may touch several sensitive fields and trigger several reviews). `ENGAGED` is sticky and is not rolled back if the underlying contract is later cancelled.

    ### Lifecycle Transitions
    - `DRAFT` ΓÁÈ `SUBMITTED`: Triggered by calling `POST /individuals/{id}/submit`. All required identity fields must be present, and the principal address, French residency fiscal information, and at least one bank account must already be set; otherwise the call fails with `422 Unprocessable Entity`.
    - `SUBMITTED` ΓÁÈ `ENGAGED`: Triggered when an approved `CONTRACT_SUBSCRIPTION` service request transitions the related contract to `ACCEPTED`. The service request is created by the partner after the contract has been submitted.

    ### Lifecycle Models
    To ensure data integrity and clear separation of concerns, the API uses distinct models for different stages of a person's lifecycle:
    - **Create Models** (`IndividualCreate`): Used when adding a new person. These include required fields and do not allow `id` input.
    - **Update Models** (`IndividualUpdate`): Used for partial updates (POST on an existing resource). All fields are optional.
    - **Read Models** (`IndividualResource`): HAL-compliant representations used for GET operations, including self-links and related resource links.

    ## Security and Authentication
    The API is secured using **OAuth 2.0** (Client Credentials flow).
    Clients must obtain an access token and include it in the `Authorization` header as a Bearer token.

    ### Scopes
    Access is controlled via two primary scopes:
    - `persons:read`: Grants read-only access. Required for all `GET` operations.
    - `persons:write`: Grants write access. Required for all mutating operations (`POST`, `DELETE`).

    ## Key Use Cases
    - **Identity Management**: Create and maintain accurate profiles for customers, partners, or employees.
    - **Fiscal Compliance**: Handle complex tax residency and identification (TIN) across multiple jurisdictions (FATCA, CRS).
    - **Communication**: Maintain physical addresses per person.

    ## Navigation & HAL
    This API follows **HAL (Hypertext Application Language)** principles. Most resources include a `_links` object, allowing you to discover related actions and navigate the API programmatically.
  version: 0.0.60
  contact:
    email: support@pack-solutions.com
    name: Pack Solutions Support
  license:
    name: Proprietary
    url: https://pack-solutions.com/license
security:
  - oauth2: []
tags:
  - name: individual
    description: |
      Operations related to natural persons (individuals).
      Includes management of identity, birth details, and social security.
  - name: fiscal-information
    description: |
      Management of tax residency and reporting (CRS, FATCA).
      Handle Tax Identification Numbers (TIN) across different jurisdictions.
  - name: address
    description: |
      Physical address management for persons.
      Supports up to 3 address types per person: PRINCIPAL (mandatory), CORRESPONDENCE, and FISCAL.
      The address type serves as the natural identifier. If CORRESPONDENCE or FISCAL are not explicitly set, they default to the PRINCIPAL address.
  - name: bank-account
    description: |
      Banking coordinates management for persons.
      Supports IBAN-based accounts with direct debit and bank transfer authorization.
paths:
  /individuals:
    get:
      operationId: listIndividuals
      security:
        - oauth2:
            - persons:read
      summary: List Individuals
      description: |
        Returns a paginated list of all natural persons.
        Use this endpoint to browse your customer base or search for individuals based on their status.
        The response is HAL-compliant, including pagination links and embedded resources.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/Status'
          description: Filter by person lifecycle status (e.g., DRAFT, SUBMITTED, ENGAGED).
      responses:
        '200':
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/IndividualCollection'
              examples:
                individualCollection:
                  $ref: '#/components/examples/IndividualCollection'
          description: Successful response with list of individuals.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - individual
    post:
      operationId: createIndividual
      summary: Create Individual
      description: |
        Registers a new natural person in the system.

        ### Lifecycle & Status
        Upon creation, an individual is set to the `DRAFT` status.
        - **Required fields**: `first_name`, `last_name`, and `birth.date_of_birth` are required to obtain a person id.
        - **Status transitions**: Once all requirements are fulfilled, the client must call `POST /individuals/{id}/submit` to transition the person to `SUBMITTED`.
        - **Requirements**: Use the `requirements` array in the response to identify missing or invalid information preventing submission.

        ### Identity & Uniqueness
        A duplicate check is automatically performed based on the combination of:
        - **First Name**
        - **Last Name**
        - **Date of Birth**

        If a record with these identical attributes already exists, the API will return a `409 Conflict` error to prevent data fragmentation.

        To bypass this check and force the creation of a duplicate record, set the `X-Force-Duplicate` header to `true`. This is exclusively used for proven homonyms and requires the `persons:write` scope.

        ### Guidelines
        - **ID**: Do not provide an `id`. It is generated by the system and returned in the response.
        - **Format**: Ensure dates follow the `YYYY-MM-DD` format.
        - **Required Fields**: Refer to the `IndividualCreate` schema for a list of mandatory fields.
      parameters:
        - name: X-Force-Duplicate
          in: header
          required: false
          schema:
            type: boolean
            const: true
          description: |
            Administrative override to bypass duplicate detection.
            Exclusively used for proven homonyms.
            Requires the `persons:write` scope.
      requestBody:
        required: true
        description: Data needed to create a new individual.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndividualCreate'
            examples:
              individualCreate:
                $ref: '#/components/examples/IndividualCreate'
      responses:
        '201':
          description: Individual created successfully.
          headers:
            Location:
              description: URL of the created resource
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/IndividualResource'
              examples:
                individualCreated:
                  $ref: '#/components/examples/IndividualResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: |
            Conflict. The request would create an individual that violates a uniqueness rule.
            - `duplicatePerson`: an individual with the same `first_name`, `last_name`, and `birth.date_of_birth` already exists. Set the `X-Force-Duplicate` header to `true` to bypass this check for proven homonyms.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                duplicatePerson:
                  $ref: '#/components/examples/DuplicatePersonConflict'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - persons:write
      tags:
        - individual
  /individuals/{person_id}:
    delete:
      operationId: deleteIndividualById
      description: |
        Archive an individual's record in the system. This is a logical deletion; the data is preserved
        for historical and compliance purposes but the individual will no longer be considered active.

        ### Restrictions
        - Individuals in `ENGAGED` status (engaged in a contract) cannot be archived. The related
          contracts must be cancelled or ended before the individual can be archived. Calling this
          endpoint on an engaged individual returns `409 Conflict`.
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The individual cannot be archived in its current state.
            - `personEngaged`: the individual is in `ENGAGED` status (engaged in a contract). Cancel or end the related contracts before retrying.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                personEngaged:
                  $ref: '#/components/examples/ConflictPersonEngaged'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Archive the specified instance of Individual by id (logical deletion)
      security:
        - oauth2:
            - persons:write
      tags:
        - individual
    get:
      operationId: getIndividualById
      security:
        - oauth2:
            - persons:read
      description: Retrieve detailed information about a specific individual using their unique identifier.
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '200':
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/IndividualResource'
              examples:
                individualResource:
                  $ref: '#/components/examples/IndividualResource'
                individualDraft:
                  $ref: '#/components/examples/IndividualDraft'
                individualEngaged:
                  $ref: '#/components/examples/IndividualEngaged'
                individualUnderReview:
                  $ref: '#/components/examples/IndividualUnderReview'
          description: |
            Individual retrieved. `_embedded.service_requests` is absent when
            no manual review is in flight, or populated with the navigation
            previews of the active service requests (which carry the
            submitted values awaiting approval).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Retrieve the specified instance of Individual by id
      tags:
        - individual
    post:
      operationId: updateIndividualById
      description: |
        Update an existing individual's information. Partial update: only the
        provided fields are modified.

        ### Direct update vs. service request ΓÇõ server-driven

        When the individual is `DRAFT` or `SUBMITTED`, all fields are updated
        directly. When the individual is `ENGAGED`, sensitive fields
        (`last_name`, `birth.*`, `civility`, `address` linkage, ΓÇª) require
        manual review. The partner does **not** need to detect this case
        up front: the server inspects the payload and, when review is
        required, automatically creates the corresponding service request(s),
        which carry the submitted values until they are approved. A single
        update may touch several sensitive fields at once (e.g. name, address
        and bank account) and therefore trigger several service requests.

        The status code reflects what actually happened:
        - `200 OK` ΓÇõ the whole payload was applied immediately. No service
          request was created; `_embedded.service_requests` is absent.
        - `202 Accepted` ΓÇõ at least one field requires manual review. The
          server created one or more service requests and exposes their
          navigation previews in `_embedded.service_requests` (each entry's
          `_links.self.href`); the submitted values awaiting approval are
          carried by those service requests.

        ### Mixed-payload behaviour

        A payload that mixes directly-updatable fields with review-able ones
        is **not** rejected: the server applies the direct fields immediately
        and creates a service request for the rest. The response is then
        `202 Accepted` with the directly-applied fields reflected on the
        resource and the review-able ones carried by the service request.

        ### Applying an approved service request

        Reviewers apply approved changes through the standalone Service
        Request API; partners never need to replay the change manually.

        ### Requirements system

        After each direct update, review the `requirements` array in the
        response to see what remains before calling
        `POST /individuals/{id}/submit`. Requirements for ongoing service
        requests live on the service request itself, not on the individual.
      parameters:
        - $ref: '#/components/parameters/PersonId'
      requestBody:
        required: true
        description: Individual content
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndividualUpdate'
      responses:
        '200':
          description: |
            Update applied immediately. The whole payload was directly
            updatable on the individual: `_embedded.service_requests` is
            absent.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/IndividualResource'
              examples:
                individualResource:
                  $ref: '#/components/examples/IndividualResource'
        '202':
          description: |
            Update accepted. At least one field requires manual review: the
            server auto-created the matching service request(s), exposed under
            `_embedded.service_requests`, which carry the submitted values.
            Directly-updatable fields in a mixed payload
            are already reflected on the returned resource. The examples
            below walk through every SR type the server may auto-create on an
            `ENGAGED` individual (`NAME_CHANGE`, `ADDRESS_CHANGE`,
            `FAMILY_STATUS_CHANGE`, `BANK_ACCOUNT_CHANGE`); the first also
            shows several reviews triggered by a single update.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/IndividualResource'
              examples:
                individualUnderReview:
                  $ref: '#/components/examples/IndividualUnderReview'
                individualUnderAddressReview:
                  $ref: '#/components/examples/IndividualUnderAddressReview'
                individualUnderFamilyStatusReview:
                  $ref: '#/components/examples/IndividualUnderFamilyStatusReview'
                individualUnderBankAccountReview:
                  $ref: '#/components/examples/IndividualUnderBankAccountReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The update collides with a real invariant on the
            individual (e.g. attempting to clear a mandatory field).
            Service-request workflows never surface here ΓÇõ they are returned
            as `202` with `_embedded.service_requests` populated.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Update the specified instance of Individual by id
      security:
        - oauth2:
            - persons:write
      tags:
        - individual
  /individuals/{person_id}/fiscal-informations:
    get:
      operationId: listPersonFiscalInformations
      security:
        - oauth2:
            - persons:read
      summary: List Fiscal Records
      description: |
        Returns a collection of all fiscal and tax reporting records
        associated with a person.

        This endpoint allows you to view the person's status across
        different regulatory frameworks such as **FATCA** (US), **CRS**
        (International), and local **French Residency** rules.

        If no fiscal information has been explicitly registered for the
        person, `FRENCH_RESIDENCY` is returned as the implicit default.

        ### Writes
        Per-type create/replace flows through `POST /individuals/{person_id}/fiscal-informations/{fiscal_type}`. There is no collection-level write.
      tags:
        - fiscal-information
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '200':
          description: Successful retrieval of fiscal records.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FiscalInformations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /individuals/{person_id}/fiscal-informations/{fiscal_type}:
    parameters:
      - $ref: '#/components/parameters/PersonId'
      - $ref: '#/components/parameters/FiscalType'
    get:
      operationId: getPersonFiscalInformationByType
      security:
        - oauth2:
            - persons:read
      summary: Retrieve Fiscal Information by Type
      description: |
        Retrieve specific fiscal information for a person based on the type
        (FATCA, CRS, or FRENCH_RESIDENCY).

        `FRENCH_RESIDENCY` is the implicit default: it is returned even when
        no fiscal information has been explicitly registered for the person.
      tags:
        - fiscal-information
      responses:
        '200':
          description: Successful response
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FiscalInformation'
              examples:
                fatca:
                  $ref: '#/components/examples/FiscalInformation_FATCA'
                crs:
                  $ref: '#/components/examples/FiscalInformation_CRS'
                frenchResidency:
                  $ref: '#/components/examples/FiscalInformation_FrenchResidency'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: upsertPersonFiscalInformationByType
      summary: Upsert Fiscal Information by Type
      description: |
        Create or fully replace the fiscal record under the given type
        (FATCA, CRS, or FRENCH_RESIDENCY). The submitted body represents
        the fiscal record in its entirety; partial update is not supported.

        The body's `fiscal_type` discriminator must match the
        `{fiscal_type}` value in the path. A mismatch returns `422
        Unprocessable Entity`.
      tags:
        - fiscal-information
      security:
        - oauth2:
            - persons:write
      requestBody:
        required: true
        description: Fiscal record payload to upsert under the given type.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiscalInformationCreate'
            examples:
              fatca:
                $ref: '#/components/examples/FiscalInformationCreate_FATCA'
              crs:
                $ref: '#/components/examples/FiscalInformationCreate_CRS'
              frenchResidency:
                $ref: '#/components/examples/FiscalInformationCreate_FrenchResidency'
      responses:
        '200':
          description: Fiscal record upserted (created or fully replaced).
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FiscalInformation'
              examples:
                fatca:
                  $ref: '#/components/examples/FiscalInformation_FATCA'
                crs:
                  $ref: '#/components/examples/FiscalInformation_CRS'
                frenchResidency:
                  $ref: '#/components/examples/FiscalInformation_FrenchResidency'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /individuals/{person_id}/addresses:
    get:
      operationId: getPersonAddresses
      security:
        - oauth2:
            - persons:read
      summary: List Addresses
      description: |
        Returns all physical addresses associated with a specific person.

        ### Address Types
        A person can have up to 3 distinct address types:
        - **PRINCIPAL**: The primary residence (mandatory).
        - **CORRESPONDENCE**: The address where mail should be sent (optional; defaults to PRINCIPAL if not provided).
        - **FISCAL**: The legal tax residency address (optional; defaults to PRINCIPAL if not provided).

        ### Writes
        Per-type create/replace flows through `POST /individuals/{person_id}/addresses/{address_type}`. There is no collection-level write.
      tags:
        - address
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '200':
          description: Successful retrieval of the address collection.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Addresses'
              examples:
                addresses:
                  $ref: '#/components/examples/Addresses'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /individuals/{person_id}/addresses/{address_type}:
    parameters:
      - $ref: '#/components/parameters/PersonId'
      - $ref: '#/components/parameters/AddressType'
    get:
      operationId: getPersonAddressByType
      security:
        - oauth2:
            - persons:read
      summary: Retrieve Address by Type
      description: |
        Retrieve a specific address for a person based on the address type
        (PRINCIPAL, CORRESPONDENCE, or FISCAL).

        If the requested type has not been explicitly set, the server
        returns the PRINCIPAL address as the default value.

        If no address is set for the specified type and the person, the
        server returns a `404 Not Found` error.
      tags:
        - address
      responses:
        '200':
          description: |
            Address retrieved. `_embedded.service_requests` is absent when no
            `ADDRESS_CHANGE` review is in flight on this typed address, or
            populated with the navigation previews of the active reviews.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AddressResource'
              examples:
                addressResource:
                  $ref: '#/components/examples/AddressResource'
                addressResourceUnderReview:
                  $ref: '#/components/examples/AddressUnderReview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: upsertPersonAddressByType
      summary: Upsert Address by Type
      description: |
        Create or fully replace the address under the given type
        (PRINCIPAL, CORRESPONDENCE, or FISCAL). The submitted body
        represents the address in its entirety; partial update is not
        supported.

        ### Direct update vs. service request ΓÇõ server-driven

        When the owning individual is `DRAFT` or `SUBMITTED`, the typed
        address is upserted directly. When the individual is `ENGAGED`,
        the server automatically creates an `ADDRESS_CHANGE` service
        request scoped to this typed address; the persisted address still
        reflects the value approved prior to the upsert until the service
        request is approved.

        The status code reflects what actually happened:
        - `200 OK` ΓÇõ the typed address was upserted immediately. No service
          request was created; `_embedded.service_requests` is absent.
        - `202 Accepted` ΓÇõ the owning individual is `ENGAGED`: the server
          created an `ADDRESS_CHANGE` service request and exposes its
          navigation preview as an entry in `_embedded.service_requests`
          (follow `_links.self.href`).
      tags:
        - address
      security:
        - oauth2:
            - persons:write
      requestBody:
        required: true
        description: Address payload to upsert under the given type.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressCreate'
      responses:
        '200':
          description: |
            Address upserted immediately (created or fully replaced). The
            owning individual is `DRAFT` or `SUBMITTED`; no service request
            was created and `_embedded.service_requests` is absent.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AddressResource'
              examples:
                addressResource:
                  $ref: '#/components/examples/AddressResource'
        '202':
          description: |
            Upsert accepted. The owning individual is `ENGAGED`: the server
            auto-created an `ADDRESS_CHANGE` service request, exposed under
            `_embedded.service_requests`. The address payload is held under
            review until the service request is approved.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AddressResource'
              examples:
                addressResourceUnderReview:
                  $ref: '#/components/examples/AddressUnderReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /individuals/{person_id}/submit:
    post:
      operationId: submitPerson
      summary: Submit a person
      description: |
        Submits the person's data and transitions the person from `DRAFT` to `SUBMITTED` status.

        ### Prerequisites
        The person must be in `DRAFT` status and the following data must be present.

        Identity fields on the individual itself:
        - `first_name`
        - `last_name`
        - `birth.date_of_birth`

        Required sub-resources, each set through its own intermediate endpoint before submission:
        - A **principal address** ΓÇõ set via `POST /individuals/{person_id}/addresses/PRINCIPAL`.
        - The **French residency fiscal information** (`FRENCH_RESIDENCY`) ΓÇõ set via `POST /individuals/{person_id}/fiscal-informations/FRENCH_RESIDENCY`.
        - At least one **bank account** ΓÇõ created via `POST /individuals/{person_id}/bank-accounts`.

        If any of the above is missing, submission fails with `422 Unprocessable Entity` and the
        response `errors[]` array enumerates every missing item (one entry per prerequisite, with
        `code: MISSING`) so the client can fix them and retry.

        ### Behavior
        - If submission succeeds, the person transitions to `SUBMITTED` status. The person can then be selected for a contract role in a subscription.
        - If submission fails (e.g., missing required data), a `422 Unprocessable Entity` error is returned with details about what is missing.

        ### Restrictions
        - This endpoint can only be called on persons in `DRAFT` status.
        - Calling this on a person already in `SUBMITTED` or `ENGAGED` status will result in a `409 Conflict` error.
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '200':
          description: Person submitted successfully.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/IndividualResource'
              examples:
                individualSubmitted:
                  $ref: '#/components/examples/IndividualResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The individual cannot be submitted in its current state.
            - `incompatibleStatus`: the individual is not in `DRAFT` status. Only individuals in `DRAFT` can be submitted.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '422':
          description: |
            Unprocessable Entity. The person is in `DRAFT` but cannot be submitted because required
            data is missing. The `errors[]` array lists every missing item ΓÇõ one entry per
            prerequisite ΓÇõ so the client can set the missing data and retry.

            Possible missing prerequisites:
            - **Principal address** ΓÇõ set via `POST /individuals/{person_id}/addresses/PRINCIPAL`.
            - **French residency fiscal information** (`FRENCH_RESIDENCY`) ΓÇõ set via `POST /individuals/{person_id}/fiscal-informations/FRENCH_RESIDENCY`.
            - **Bank account** ΓÇõ at least one is required; create one via `POST /individuals/{person_id}/bank-accounts`.

            Missing identity fields (`first_name`, `last_name`, `birth.date_of_birth`) are reported
            here too, with `code: MISSING_FIELD` and a `pointer` to the offending field.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnprocessableEntity'
              examples:
                missingPrerequisites:
                  $ref: '#/components/examples/UnprocessableSubmitMissingPrerequisites'
                missingBankAccount:
                  $ref: '#/components/examples/UnprocessableSubmitMissingBankAccount'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - persons:write
      tags:
        - individual
  /individuals/{person_id}/bank-accounts:
    get:
      operationId: listBankAccounts
      security:
        - oauth2:
            - persons:read
      summary: List Bank Accounts
      description: |
        Returns the complete list of bank accounts associated with a specific person.
      tags:
        - bank-account
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '200':
          description: Successful retrieval of the bank account collection.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BankAccounts'
              examples:
                bankAccountCollection:
                  $ref: '#/components/examples/BankAccountCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createBankAccount
      summary: Create Bank Account
      description: |
        Creates a new bank account for the specified person.

        ### Guidelines
        - **ID**: Do not provide an `id`. It is generated by the system.
        - **BIC**: May be omitted if it can be derived from the IBAN.
        - **Validation**: IBAN format and BIC consistency are verified on creation.

        ### Direct update vs. service request ΓÇõ server-driven

        When the owning individual is `DRAFT` or `SUBMITTED`, the bank
        account is created directly. When the individual is `ENGAGED`, the
        server automatically creates a `BANK_ACCOUNT_CHANGE` service
        request; the new bank account is held under review until the
        request is approved.

        The status code reflects what actually happened:
        - `201 Created` ΓÇõ the bank account was created immediately. The
          response carries a `Location` header to the new resource and
          `_embedded.service_requests` is absent.
        - `202 Accepted` ΓÇõ the owning individual is `ENGAGED`: the server
          auto-created the `BANK_ACCOUNT_CHANGE` service request, exposed as
          an entry in `_embedded.service_requests` (follow `_links.self.href`).
          No `Location` header is returned; clients should follow the service
          request to track approval.
      tags:
        - bank-account
      parameters:
        - $ref: '#/components/parameters/PersonId'
      requestBody:
        required: true
        description: Data needed to create a new bank account.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountCreate'
            examples:
              bankAccountCreate:
                $ref: '#/components/examples/BankAccountCreate'
      responses:
        '201':
          description: |
            Bank account created immediately. The owning individual is
            `DRAFT` or `SUBMITTED`; no service request was created and
            `_embedded.service_requests` is absent.
          headers:
            Location:
              description: URL of the created resource
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BankAccountResource'
              examples:
                bankAccountCreated:
                  $ref: '#/components/examples/BankAccountResource'
        '202':
          description: |
            Creation accepted. The owning individual is `ENGAGED`: the
            server auto-created a `BANK_ACCOUNT_CHANGE` service request,
            exposed under `_embedded.service_requests`. The bank account is
            held under review until the service request is approved.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BankAccountResource'
              examples:
                bankAccountUnderReview:
                  $ref: '#/components/examples/BankAccountUnderReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - persons:write
  /individuals/{person_id}/bank-accounts/{bank_account_id}:
    get:
      operationId: getBankAccountById
      security:
        - oauth2:
            - persons:read
      summary: Retrieve a Bank Account
      description: Retrieve detailed information about a specific bank account.
      tags:
        - bank-account
      parameters:
        - $ref: '#/components/parameters/PersonId'
        - $ref: '#/components/parameters/BankAccountId'
      responses:
        '200':
          description: |
            Bank account retrieved. `_embedded.service_requests` is absent
            when no review is in flight on this account, or populated with
            the navigation previews of active `BANK_ACCOUNT_CHANGE`
            service requests on the owning individual.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BankAccountResource'
              examples:
                bankAccountResource:
                  $ref: '#/components/examples/BankAccountResource'
                bankAccountUnderReview:
                  $ref: '#/components/examples/BankAccountUnderReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: updateBankAccountById
      summary: Update a Bank Account
      description: |
        Update or close an existing bank account.

        ### Closing a Bank Account
        To close a bank account, provide `valid_until` and `closure_reason_code`.
        A closed bank account remains visible for audit purposes.

        ### Direct update vs. service request ΓÇõ server-driven

        When the owning individual is `DRAFT` or `SUBMITTED`, every field
        is updated directly. When the individual is `ENGAGED`, the server
        automatically creates a `BANK_ACCOUNT_CHANGE` service request and
        the submitted values are held under review until approval.

        The status code reflects what actually happened:
        - `200 OK` ΓÇõ the update was applied immediately. No service request
          was created and `_embedded.service_requests` is absent.
        - `202 Accepted` ΓÇõ the owning individual is `ENGAGED`: the server
          auto-created the `BANK_ACCOUNT_CHANGE` service request, exposed as
          an entry in `_embedded.service_requests` (follow `_links.self.href`).
      tags:
        - bank-account
      parameters:
        - $ref: '#/components/parameters/PersonId'
        - $ref: '#/components/parameters/BankAccountId'
      requestBody:
        required: true
        description: Bank account content to update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountUpdate'
      responses:
        '200':
          description: |
            Bank account updated immediately. The owning individual is
            `DRAFT` or `SUBMITTED`; no service request was created and
            `_embedded.service_requests` is absent.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BankAccountResource'
              examples:
                bankAccountUpdated:
                  $ref: '#/components/examples/BankAccountResource'
        '202':
          description: |
            Update accepted. The owning individual is `ENGAGED`: the server
            auto-created a `BANK_ACCOUNT_CHANGE` service request, exposed
            under `_embedded.service_requests`. The submitted values are
            held under review until the service request is approved.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BankAccountResource'
              examples:
                bankAccountUpdatedUnderReview:
                  $ref: '#/components/examples/BankAccountUnderReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - persons:write
components:
  schemas:
    Address:
      title: Address
      description: Postal address details following a Stripe-like structure with address lines.
      type: object
      properties:
        city:
          type: string
          minLength: 1
          maxLength: 100
          description: City or locality.
          example: New York
        country_code:
          $ref: '#/components/schemas/CountryCode'
        line1:
          type: string
          minLength: 1
          maxLength: 255
          description: Primary address line (e.g., street number and street name).
          example: 10 Main Street
        line2:
          type: string
          maxLength: 255
          description: Secondary address line (e.g., building, apartment, floor).
          example: Building A, Apartment 42, 3rd floor
        line3:
          type: string
          maxLength: 255
          description: Third address line (e.g., special delivery code, additional routing).
          example: Suite 200
        line4:
          type: string
          maxLength: 255
          description: Fourth address line (e.g., PO Box, additional delivery instructions).
          example: PO Box 12345
        postal_code:
          type: string
          minLength: 1
          maxLength: 20
          pattern: ^[A-Za-z0-9 -]{1,20}$
          description: Postal or ZIP code.
          example: '10001'
        state:
          type: string
          maxLength: 100
          description: State, province, or region.
          example: NY
      required:
        - line1
        - postal_code
        - city
        - country_code
    AddressCreate:
      type: object
      description: Payload for creating a new Address.
      title: Address Creation
      allOf:
        - $ref: '#/components/schemas/Address'
        - type: object
          required:
            - line1
            - postal_code
            - city
            - country_code
    AddressResource:
      type: object
      description: |
        HAL representation of an Address. Embeds a `service_requests` list
        under `_embedded` when one or more `ADDRESS_CHANGE` reviews are in
        flight on this typed address (typically because the partner upserted
        the address on an `ENGAGED` individual). The key is absent when no
        review is required.
      title: Address Resource
      allOf:
        - $ref: '#/components/schemas/TypedAddress'
        - type: object
          properties:
            _embedded:
              $ref: '#/components/schemas/AddressResourceEmbedded'
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a typed address.

                    | Relation | Method | Always present |
                    |---|---|---|
                    | `self` | GET | yes |
                    | `individual` | GET | yes |
                  properties:
                    individual:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the owning individual.
                  required:
                    - individual
          required:
            - _links
    AddressResourceEmbedded:
      title: Address Resource Embedded
      description: |
        Embedded resources for an Address resource. Exposes a
        `service_requests` list when one or more `ADDRESS_CHANGE` reviews are in
        flight on this typed address (typically because the partner upserted
        the address on an `ENGAGED` individual). The key is absent when no
        review is required.
      readOnly: true
      additionalProperties: true
      allOf:
        - $ref: '#/components/schemas/WithServiceRequests'
    TypedAddress:
      type: object
      title: TypedAddress
      description: Address with server-generated type.
      allOf:
        - $ref: '#/components/schemas/Address'
        - type: object
          required:
            - address_type
          properties:
            address_type:
              allOf:
                - $ref: '#/components/schemas/AddressType'
              readOnly: true
    Addresses:
      type: object
      title: Addresses
      description: 'A collection of addresses for a specific person. A person can have a maximum of 3 addresses: - PRINCIPAL (mandatory) - CORRESPONDENCE (optional, if not set, PRINCIPAL is used) - FISCAL (optional, if not set, PRINCIPAL is used)'
      properties:
        _embedded:
          $ref: '#/components/schemas/AddressesEmbedded'
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
      examples:
        - $ref: '#/components/examples/Addresses'
    AddressesEmbedded:
      type: object
      title: Addresses Embedded
      description: Embedded resources for an Addresses collection
      properties:
        addresses:
          description: 'List of addresses. A person can have a maximum of 3 addresses: - PRINCIPAL (mandatory) - CORRESPONDENCE (optional, if not set, PRINCIPAL is used) - FISCAL (optional, if not set, PRINCIPAL is used)'
          type: array
          maxItems: 3
          items:
            $ref: '#/components/schemas/AddressResource'
      required:
        - addresses
    BankAccount:
      title: BankAccount
      description: Banking coordinates associated with a person.
      type: object
      properties:
        account_holder_name:
          type: string
          maxLength: 140
          description: Full name of the account holder.
          example: Jean Dupont
        bic:
          type: string
          maxLength: 11
          description: Bank Identifier Code (ISO 9362). May be derived from the IBAN.
          example: BNPAFRPPXXX
        change_reason_code:
          oneOf:
            - type: string
              maxLength: 50
            - type: 'null'
          description: Reason code for the creation of this account replacing a previous one.
          example: BANK_CHANGE
        closure_reason_code:
          oneOf:
            - type: string
              maxLength: 50
            - type: 'null'
          description: Reason code for closing this bank account.
          example: ACCOUNT_CLOSED
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        iban:
          type: string
          maxLength: 34
          description: International Bank Account Number (ISO 13616).
          example: FR7630006000011234567890189
        is_bank_transfer_authorized:
          type: boolean
          description: Whether the account is authorized for bank transfers.
          example: true
        is_direct_debit_authorized:
          type: boolean
          description: Whether the account is authorized for direct debit.
          example: true
        label:
          type: string
          maxLength: 100
          description: Human-readable label for the bank account.
          example: Compte courant principal
        valid_from:
          type: string
          format: date
          minLength: 10
          maxLength: 10
          description: Date from which the bank account is valid (ISO 8601).
          example: 2025-01-15
        valid_until:
          oneOf:
            - type: string
              format: date
              minLength: 10
              maxLength: 10
            - type: 'null'
          description: Date until which the bank account is valid. Set when closing the account.
          example: 2026-12-31
      required:
        - account_holder_name
        - iban
        - currency
        - valid_from
    BankAccounts:
      type: object
      title: BankAccounts
      description: Collection of all bank accounts associated with a specific person.
      properties:
        _embedded:
          $ref: '#/components/schemas/BankAccountsEmbedded'
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
      required:
        - _embedded
        - _links
    BankAccountsEmbedded:
      type: object
      title: BankAccounts Embedded
      description: Embedded bank accounts in a collection response.
      properties:
        bank_accounts:
          type: array
          maxItems: 100
          description: List of bank account resources.
          items:
            $ref: '#/components/schemas/BankAccountResource'
      required:
        - bank_accounts
    BankAccountCreate:
      type: object
      description: Payload for creating a new bank account.
      title: BankAccount Creation
      allOf:
        - $ref: '#/components/schemas/BankAccount'
        - type: object
          required:
            - account_holder_name
            - iban
            - currency
            - valid_from
    BankAccountResource:
      type: object
      description: |
        HAL representation of a BankAccount. Embeds a `service_requests`
