openapi: 3.1.2
info:
  title: Contract API
  description: |
    # Overview
    The Contract API provides operations for creating and managing **contracts** throughout their lifecycle, including payments (one-time and periodic premiums) and consultation.

    ## Core Concepts

    ### Lifecycle and Status
    Every **Contract** transitions through a defined lifecycle. The `status` field is strictly computed by the server and exposed on read operations; it cannot be provided during creation or updated manually.

    The contract's lifecycle can be one of the following states:
    - `DRAFT`: The contract is in preparation by the partner and can still be updated. The partner is responsible for collecting and validating all required data before submitting; missing fields surface as `422 Unprocessable Entity` on `POST /contracts/{contract_id}/submit`.
    - `SUBMITTED`: The contract has been submitted to PACK Solutions and the official `contract_number` has been generated. Internal review is driven by the `CONTRACT_SUBSCRIPTION` service request automatically created on submit. Direct field updates via `POST /contracts/{contract_id}` are locked.
    - `ACCEPTED`: The contract has been accepted by PACK Solutions and is now active.
    - `REJECTED`: The contract was rejected during review.
    - `CANCELLED`: The contract was cancelled by the partner or the user via `POST /contracts/{contract_id}/cancel`.

    ### Lifecycle Transitions
    - `DRAFT` → `SUBMITTED`: Triggered by `POST /contracts/{contract_id}/submit`. Generates the `contract_number`. The server **automatically creates** the `CONTRACT_SUBSCRIPTION` service request that drives the subsequent transition, and exposes it as an entry in the response's `_embedded.service_requests` list. Requires the subscriber to be in `SUBMITTED` or `ENGAGED` (Person API) and the contract to carry `subscriber_id` and `date_of_effect`; missing fields surface as `422 Unprocessable Entity`. Attached premiums cascade `DRAFT → SUBMITTED`.
    - `SUBMITTED` → `ACCEPTED`: Triggered by approval of the auto-created `CONTRACT_SUBSCRIPTION` service request. Cascades premium transitions for every linked premium (`SUBMITTED → ACCEPTED`).
    - `SUBMITTED` → `REJECTED`: Triggered by rejection of the `CONTRACT_SUBSCRIPTION` service request. Cascades to every non-terminal premium (`→ REJECTED`).
    - `DRAFT`, `SUBMITTED` → `CANCELLED`: Cancelled via `POST /contracts/{contract_id}/cancel`. Cascades to every non-terminal service request and every non-executed premium on the contract.

    ### Premium lifecycle on a contract
    Attached premiums **mirror the parent contract status** while in the non-terminal prefix (`DRAFT`/`SUBMITTED`/`ACCEPTED`), then transition to premium-specific terminal states:
    - **One-time premium**: `DRAFT`, `SUBMITTED`, `ACCEPTED` → `EXECUTED` (after order execution) / `CANCELLED` / `REJECTED`.
    - **Periodic premium**: `DRAFT`, `SUBMITTED`, `ACCEPTED` → `SUSPENDED` (pause) / `CANCELLED` / `REJECTED` / `ENDED` (natural end).

    Each premium carries a server-managed `kind` derived from the contract's status at creation:
    - `kind: SUBSCRIPTION` — premium created while the contract was `DRAFT` or `SUBMITTED`. Its status mirrors the contract and reaches `ACCEPTED` only once the contract reaches `ACCEPTED`.
    - `kind: STANDALONE` — premium created while the contract was `ACCEPTED`. The premium is created directly in `ACCEPTED`.

    AML review (`PREMIUM_PAYMENT` service request) is **decoupled** from the premium status: it is exposed under `_embedded.service_requests` and gates order execution / recurring collection but does not change the premium's `status`. The subscription premium (created while the contract is `DRAFT` or `SUBMITTED`) does not generate a separate `PREMIUM_PAYMENT` SR — its AML review is absorbed by the contract's `CONTRACT_SUBSCRIPTION` review.

    Both one-time and periodic premiums can be **edited in place via `POST .../{premium_id}` while the parent contract is in `DRAFT`** (i.e. premium status `DRAFT`). Once the contract is `SUBMITTED`, direct field updates are locked; cancel and create a new premium instead.

    ### Lifecycle Models
    To ensure data integrity and clear separation of concerns, the API uses distinct models for different stages of a contract's lifecycle:
    - **Create Models** (`ContractCreate`): Used when creating a new contract. These include required fields and do not allow `id` input.
    - **Update Models** (`ContractUpdate`): Used for updates (POST on an existing resource). All fields are optional.
    - **Read Models** (`ContractResource`): HAL-compliant representations used for GET operations, including self-links and related resource links.

    ## Security and Authentication
    The API is secured using **OAuth 2.0** (Client Credentials flow).
    Clients must obtain an access token and include it in the `Authorization` header as a Bearer token.

    ### Scopes
    Access is controlled via two primary scopes:
    - `contracts:read`: Grants read-only access. Required for all `GET` operations.
    - `contracts:write`: Grants write access. Required for all mutating operations (`POST`).

    ## Navigation & HAL
    This API follows **HAL (Hypertext Application Language)** principles. Most resources include a `_links` object, allowing you to discover related actions and navigate the API programmatically.
  version: 0.0.61
  contact:
    email: support@pack-solutions.com
    name: Pack Solutions Support
  license:
    name: Proprietary
    url: https://pack-solutions.com/license
security:
  - oauth2: []
tags:
  - name: contract
    description: |
      Operations related to contract management.
      Includes creation, update, submission, cancellation, and consultation of contracts throughout their lifecycle.
  - name: one-time-premium
    description: Operations for managing one-time premiums (single payments) associated with a specific contract.
  - name: periodic-premium
    description: Operations for managing periodic premiums (recurring payments) associated with a specific contract.
paths:
  /contracts:
    get:
      operationId: listContracts
      description: Retrieve a paginated list of contracts.
      security:
        - oauth2:
            - contracts:read
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A paginated list of contracts.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: List contracts
      tags:
        - contract
    post:
      operationId: createContract
      description: Create a new contract with the provided details. This operation initiates the contract process.
      security:
        - oauth2:
            - contracts:write
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractCreate'
            examples:
              createContractMinimal:
                $ref: '#/components/examples/CreateContractMinimal'
              createContract:
                $ref: '#/components/examples/CreateContract'
        description: Contract creation payload
        required: true
      responses:
        '201':
          description: The contract has been created.
          headers:
            Location:
              description: URL of the created contract
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
              example: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractResource'
              examples:
                contractResponse:
                  $ref: '#/components/examples/Contract'
        '400':
          description: |
            Bad Request. The create payload violates the `ContractCreate` schema (e.g. a `required`
            field is missing). The `errors[]` array lists every offending pointer with its `code`,
            so the client can fix every issue in a single retry.

            Possible case:
            - `MISSING_FIELD` on `/product_id` — `product_id` is the only field required at creation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              examples:
                missingProduct:
                  $ref: '#/components/examples/BadRequestCreateMissingProduct'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          description: |
            Unprocessable Entity. The create payload is well-formed (schema validation passed) but
            semantically invalid — typically a referential-integrity failure. The `errors[]` array
            lists every offending pointer with its `code`.

            Possible case:
            - `MISSING` on `/subscriber_id` — the provided `subscriber_id` does not match any existing
              person. `subscriber_id` is optional at creation; either omit it or pass a valid id.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnprocessableEntity'
              examples:
                unknownSubscriber:
                  $ref: '#/components/examples/UnprocessableCreateUnknownSubscriber'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Create a new contract
      tags:
        - contract
  /contracts/{contract_id}:
    get:
      operationId: getContractById
      description: Retrieve detailed information about a specific contract using its unique identifier.
      security:
        - oauth2:
            - contracts:read
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          description: |
            Contract retrieved. `_embedded.service_requests` is absent when
            no manual review is in flight, or populated with the navigation
            previews of the active service requests (which carry the
            submitted values awaiting approval).
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractResource'
              examples:
                contractResponse:
                  $ref: '#/components/examples/Contract'
                contractUnderReview:
                  $ref: '#/components/examples/ContractUnderReview'
                contractRejected:
                  $ref: '#/components/examples/ContractRejected'
                contractCancelled:
                  $ref: '#/components/examples/ContractCancelled'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Retrieve a contract by id
      tags:
        - contract
    post:
      operationId: updateContract
      security:
        - oauth2:
            - contracts:write
      description: |
        Update an existing contract with the provided details. Partial
        update: only the provided fields are modified.

        ### Direct update vs. service request — server-driven

        When the contract is `DRAFT`, every field is updated directly. When
        the contract is `ACCEPTED`, sensitive fields (e.g.
        `beneficiary_clause`) require manual review. The partner does **not**
        need to detect this case up front: the server inspects the payload
        and, when review is required, automatically creates the
        corresponding service request (e.g. `BENEFICIARY_CLAUSE_CHANGE`),
        which carries the submitted values until it is approved.

        The status code reflects what actually happened:
        - `200 OK` — the whole payload was applied immediately. No service
          request was created; `_embedded.service_requests` is absent.
        - `202 Accepted` — at least one field requires manual review. The
          server created one or more service requests and exposes their
          navigation previews in `_embedded.service_requests` (each entry's
          `_links.self.href`); the submitted values awaiting approval are
          carried by those service requests.

        ### Mixed-payload behaviour

        A payload that mixes directly-updatable fields with review-able ones
        is **not** rejected: the server applies the direct fields immediately
        and creates a service request for the rest. The response is then
        `202 Accepted` with the directly-applied fields reflected on the
        resource and the review-able ones carried by the service request.

        ### Applying an approved service request

        Reviewers apply approved changes through the standalone Service
        Request API; partners never need to replay the change manually.

        ### Locked statuses

        Once a contract is `SUBMITTED`, `REJECTED`, or `CANCELLED`, direct
        updates are locked. Any field-changing call returns `409 Conflict`
        with `incompatibleStatus`. Service-request flows (e.g. submitting a
        `CONTRACT_RENUNCIATION`) remain available through the dedicated
        endpoints.
      parameters:
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractUpdate'
        description: Contract update payload
        required: true
      responses:
        '200':
          description: |
            Update applied immediately. The whole payload was directly
            updatable on the contract: `_embedded.service_requests` is
            absent.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractResource'
              examples:
                contractResponse:
                  $ref: '#/components/examples/Contract'
        '202':
          description: |
            Update accepted. At least one field requires manual review: the
            server auto-created the matching service request(s), exposed under
            `_embedded.service_requests`, which carry the submitted values.
            Directly-updatable fields in a mixed payload
            are already reflected on the returned resource.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractResource'
              examples:
                contractUnderReview:
                  $ref: '#/components/examples/ContractUnderReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The update could not be applied because of a lifecycle
            invariant.
            - `incompatibleStatus`: the contract is `SUBMITTED`, `REJECTED`,
              or `CANCELLED` and does not permit direct updates. Service
              requests are unaffected and remain creatable subject to each
              type's preconditions.
            Service-request workflows never surface here — they are returned
            as `202` with `_embedded.service_requests` populated.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Update a contract
      tags:
        - contract
    delete:
      operationId: deleteContract
      summary: Delete a contract
      description: |
        Permanently remove a contract from the system.

        ### Prerequisites
        The contract must be in `DRAFT` status.

        ### Restrictions
        - Only contracts in `DRAFT` status can be deleted.
        - Calling this on a contract in any other status will result in a `409 Conflict` error.
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '204':
          description: The contract has been successfully deleted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The contract cannot be deleted.
            - `incompatibleStatus`: the contract is not in `DRAFT` status. Only contracts in `DRAFT` can be deleted.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
      tags:
        - contract
  /contracts/{contract_id}/submit:
    post:
      operationId: submitContract
      summary: Submit a contract
      description: |
        Submits the contract and transitions it from `DRAFT` to `SUBMITTED`,
        generating the official `contract_number`, locking direct updates,
        and **automatically creating** the `CONTRACT_SUBSCRIPTION` service
        request that drives the `SUBMITTED → ACCEPTED|REJECTED` transition.

        The created service request is exposed as an entry in the returned
        `ContractResource`'s `_embedded.service_requests` list. It also absorbs
        the AML review of the subscription premium — no separate
        `PREMIUM_PAYMENT` service request is created for it during the
        subscription flow.

        ### Prerequisites
        The contract must be in `DRAFT` status and:
        - The contract must carry the fields required for submission: `subscriber_id` and `date_of_effect`.
          `product_id` is required at creation already, so it is guaranteed to be present here.
          If `subscriber_id` and/or `date_of_effect` are missing on the contract, submission fails with
          `422 Unprocessable Entity` and the response `errors[]` array enumerates every missing field
          (one entry per pointer, with `code: MISSING_FIELD`).
        - The person referenced by `subscriber_id` must be in `SUBMITTED` or `ENGAGED` status (Person API).
          Otherwise `409 Conflict` with type `subscriberNotSubmitted`.

        ### Premium lifecycle
        Attached premiums have their own lifecycle and are not cascaded by contract submission. A premium
        not backed by a service request stays in `ACCEPTED` (one-time) or `ACTIVE` (periodic); a premium
        backed by a service request progresses with that request.

        ### Behavior
        - If submission succeeds, the contract transitions to `SUBMITTED`,
          the `contract_number` is generated, direct field updates via
          `POST /contracts/{contract_id}` are locked, and the
          `CONTRACT_SUBSCRIPTION` service request is created server-side.
          Because a service request is always created, the response is
          `202 Accepted` and carries the updated `ContractResource` with
          the new SR exposed under `_embedded.service_requests`.
        - If submission fails (e.g., missing required data), a `422
          Unprocessable Entity` error is returned with details about what
          is missing.

        ### Restrictions
        - This endpoint can only be called on contracts in `DRAFT` status.
        - Calling this on a contract not in `DRAFT` status will result in a `409 Conflict` error.
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '202':
          description: |
            Submission accepted. The contract has transitioned to
            `SUBMITTED` and the server auto-created the
            `CONTRACT_SUBSCRIPTION` service request that drives the
            `SUBMITTED → ACCEPTED|REJECTED` transition. The SR is exposed
            under `_embedded.service_requests` on the returned
            `ContractResource`. Because a service request is always
            created by this operation, this endpoint never returns `200`.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractResource'
              examples:
                contractSubmitted:
                  $ref: '#/components/examples/ContractSubmitted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The contract cannot be submitted in its current state.
            - `incompatibleStatus`: the contract is not in `DRAFT` status. Only contracts in `DRAFT` can be submitted.
            - `subscriberNotSubmitted`: the person referenced by `subscriber_id` is not in `SUBMITTED` or `ENGAGED` status. Submit the subscriber via `POST /individuals/{person_id}/submit` (Person API) before retrying.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
                subscriberNotSubmitted:
                  $ref: '#/components/examples/ConflictSubscriberNotSubmitted'
        '422':
          description: |
            Unprocessable Entity. The contract is in `DRAFT` but cannot be submitted because required
            fields are missing on the contract resource itself. The `errors[]` array lists every
            missing field — one entry per pointer with `code: MISSING_FIELD` — so the client can patch
            the contract in a single round-trip and retry.

            Possible missing fields:
            - `subscriber_id` — populate via `POST /contracts/{contract_id}` and ensure the referenced
              person is in `SUBMITTED` or `ENGAGED` status.
            - `date_of_effect` — populate via `POST /contracts/{contract_id}`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnprocessableEntity'
              examples:
                missingSubscriber:
                  $ref: '#/components/examples/UnprocessableSubmitMissingSubscriber'
                missingFields:
                  $ref: '#/components/examples/UnprocessableSubmitMissingFields'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
      tags:
        - contract
  /contracts/{contract_id}/cancel:
    post:
      operationId: cancelContract
      summary: Cancel a contract
      description: |
        Cancels the contract and transitions it to `CANCELLED` status.

        ### Prerequisites
        The contract must be in one of the following statuses: `DRAFT` or `SUBMITTED`.

        ### Behavior
        - If cancellation succeeds, the contract transitions to `CANCELLED` status.
        - The contract can be cancelled by the partner or the user.

        ### Restrictions
        - This endpoint cannot be called on contracts in `ACCEPTED`, `REJECTED`, or already `CANCELLED` status.
        - Calling this on a contract in an invalid status will result in a `409 Conflict` error.
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          description: Contract cancelled successfully.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractResource'
              examples:
                contractCancelled:
                  $ref: '#/components/examples/ContractCancelled'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The contract cannot be cancelled in its current state.
            - `incompatibleStatus`: the contract is not in `DRAFT` or `SUBMITTED` status. Only contracts in `DRAFT` or `SUBMITTED` status can be cancelled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
      tags:
        - contract
  /contracts/{contract_id}/one-time-premiums:
    get:
      operationId: listPremiums
      description: |
        Returns a paginated list of all one-time premiums associated with a contract.
        Use this endpoint to browse premiums or filter them by their lifecycle status.

        ### Lifecycle & Status
        Each one-time premium follows a defined lifecycle (see `PremiumStatus`):
        - **DRAFT**, **SUBMITTED**, **ACCEPTED** — mirror the parent contract status.
        - **EXECUTED** — Buy/sell orders executed, payment collected, valuation event created.
        - **CANCELLED** — Premium has been cancelled.
        - **REJECTED** — The backing service request was rejected.
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PremiumStatus'
        - name: amount
          in: query
          schema:
            $ref: '#/components/schemas/Amount'
            description: Premium amount paid by the client.
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PremiumCollection'
              examples:
                premiumCollection:
                  $ref: '#/components/examples/PremiumCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Get all premiums for a contract
      security:
        - oauth2:
            - contracts:read
      tags:
        - one-time-premium
    post:
      operationId: createPremium
      description: |
        Create a new one-time premium for a given contract.

        ### Server-managed `kind`, status and review

        The premium's `kind` is **not** declared by the partner. The server
        derives it from the contract's status at creation:
        - Contract in `DRAFT` or `SUBMITTED` → `kind: SUBSCRIPTION`. The
          premium mirrors the contract status (`DRAFT` or `SUBMITTED`) and
          progresses to `ACCEPTED` once the contract reaches `ACCEPTED`.
        - Contract in `ACCEPTED` → `kind: STANDALONE`. The premium is
          created directly in `ACCEPTED`.

        The premium's `status` always mirrors the parent contract status
        while in the non-terminal prefix (`DRAFT`/`SUBMITTED`/`ACCEPTED`).
        AML review is **decoupled** from the premium status: when an AML
        check is needed, the server creates the matching `PREMIUM_PAYMENT`
        service request automatically and exposes it under
        `_embedded.service_requests` on the returned `PremiumResource`.
        Order execution is gated on the review being approved.

        The status code reflects whether a review was triggered:
        - `201 Created` — no AML review needed. The response carries a
          `Location` header to the new resource and
          `_embedded.service_requests` is absent.
        - `202 Accepted` — an AML review is required. The
          `PREMIUM_PAYMENT` service request is exposed under
          `_embedded.service_requests`. No `Location` header is returned;
          clients should follow the service request to track approval.

        For premiums created during the subscription flow (contract `DRAFT`
        or `SUBMITTED`), the AML review is absorbed by the contract's
        `CONTRACT_SUBSCRIPTION` service request — no separate
        `PREMIUM_PAYMENT` SR is created for the subscription premium.

        ### Allocation strategies
        The `allocations` object defines how the premium amount is distributed across investment supports. Two strategies are available:
        - **Free allocation** (`allocations.funds`): the partner picks individual funds and their rates.
        - **Managed allocation** (`allocations.preset_allocations`): the partner picks predefined profiles.
        Both can be combined; rates must sum to 100%.

        ### Guidelines
        - **Format**: dates follow the `YYYY-MM-DD` format.
        - **Required Fields**: see `PremiumCreate`.
      parameters:
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PremiumCreate'
            examples:
              createPremium:
                $ref: '#/components/examples/CreatePremium'
              createPremiumMixedAllocations:
