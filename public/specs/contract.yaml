        ### Lifecycle & Status
        Each periodic premium follows a defined lifecycle (see `PeriodicPremiumStatus`):
        - **DRAFT**, **SUBMITTED**, **ACCEPTED** — mirror the parent contract status.
        - **SUSPENDED** — Premium temporarily paused. Can be resumed via `POST .../resume`.
        - **CANCELLED** — Premium has been permanently terminated.
        - **REJECTED** — The backing service request was rejected.
        - **ENDED** — Natural end of periodicity (`date_of_end` reached).
