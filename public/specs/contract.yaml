      summary: Cancel a one-time premium
      description: |
        Cancels a one-time premium and transitions it to `CANCELLED` status.

        ### Prerequisites
        The premium must be in a non-terminal status (`DRAFT`, `SUBMITTED`, or `ACCEPTED`). Once the
        premium has been executed it can no longer be cancelled.

        ### Behavior
        - If cancellation succeeds, the premium transitions to `CANCELLED` status.
        - Any in-flight `PREMIUM_PAYMENT` service request is closed (transitioned to `CANCELLED`).
        - If the premium has `kind: SUBSCRIPTION`, the cancellation is **local to this premium**: the
          parent contract and the related `CONTRACT_SUBSCRIPTION` service request are **not**
          affected. Only the link from the `PREMIUM_PAYMENT` SR to the `CONTRACT_SUBSCRIPTION` is
          released by closing the SR.

        ### Restrictions
        - This endpoint cannot be called on premiums in `EXECUTED`, `REJECTED`, or already `CANCELLED` status.
        - Calling this on a premium in an invalid status will result in a `409 Conflict` error.
