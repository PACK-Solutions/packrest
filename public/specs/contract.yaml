        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The premium cannot be cancelled.
            - `incompatibleStatus`: the premium is in `EXECUTED`, `REJECTED`, or already `CANCELLED` status. Only non-terminal premiums (`DRAFT`, `SUBMITTED`, `ACCEPTED`) can be cancelled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
