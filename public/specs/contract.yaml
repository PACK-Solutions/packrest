            - contracts:read
      tags:
        - periodic-premium
    post:
      operationId: createPeriodicPremium
      description: |
        Create a new periodic (recurring) premium for a given contract.

        ### Server-managed `kind`, status and review

        The premium's `kind` is **not** declared by the partner. The server
        derives it from the contract's status at creation:
        - Contract in `DRAFT` or `SUBMITTED` → `kind: SUBSCRIPTION`. The
          premium mirrors the contract status and progresses to `ACCEPTED`
          once the contract reaches `ACCEPTED`.
        - Contract in `ACCEPTED` → `kind: STANDALONE`. The premium is
          created directly in `ACCEPTED`.

        The premium's `status` always mirrors the parent contract status
        while in the non-terminal prefix (`DRAFT`/`SUBMITTED`/`ACCEPTED`).
        AML review is **decoupled** from the premium status: when the
        cumulative scheduled amount triggers an AML check, the server
        creates the matching `PREMIUM_PAYMENT` service request
        automatically and exposes it under `_embedded.service_requests`.
        Recurring collection is gated on the review being approved.

        The status code reflects whether a review was triggered:
        - `201 Created` — no AML review needed. The response carries a
          `Location` header to the new resource and
          `_embedded.service_requests` is absent.
        - `202 Accepted` — an AML review is required: the
          `PREMIUM_PAYMENT` service request is exposed under
          `_embedded.service_requests`. No `Location` header is returned;
          clients should follow the service request to track approval.

        For periodic premiums created during the subscription flow, the
        AML review is absorbed by the contract's `CONTRACT_SUBSCRIPTION`
        service request — no separate `PREMIUM_PAYMENT` SR is created for
        initial periodic premiums.

        ### `date_of_start` (optional)

        `date_of_start` is optional. When absent, the server defaults it at
        acceptance time to `max(date_of_effect, date_of_acceptance) + 30
        days` to honour the legal renunciation window. When provided, the
        server validates that the value falls outside the renunciation
        window once the contract is `ACCEPTED`.

        ### Allocation strategies
        See the one-time premium description for the `allocations` rules
        (free vs. managed allocation, sum to 100%).

        ### Updates after creation

        Periodic premiums can be edited via
        `POST /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}`
        **while the parent contract is in `DRAFT`** (i.e. premium status
        `DRAFT`). Once the contract is `SUBMITTED`, the premium can no
        longer be edited in place; to change any field, cancel the existing
        premium via
        `POST /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}/cancel`
        and create a new one. The new premium runs through its own review
        when applicable.

        ### Guidelines
        - **Format**: dates follow the `YYYY-MM-DD` format.
        - **Required Fields**: see `PeriodicPremiumCreate`.
      parameters:
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeriodicPremiumCreate'
            examples:
              createPeriodicPremium:
                $ref: '#/components/examples/CreatePeriodicPremium'
              createPeriodicPremiumMixedAllocations:
                $ref: '#/components/examples/CreatePeriodicPremiumMixedAllocations'
              createPeriodicPremiumPresetAllocations:
                $ref: '#/components/examples/CreatePeriodicPremiumPresetAllocations'
        description: Periodic Premium content
        required: true
      responses:
        '201':
          description: |
            Periodic premium created. No AML review was needed;
            `_embedded.service_requests` is absent. The premium's status
            mirrors the parent contract status
            (`DRAFT`/`SUBMITTED`/`ACCEPTED`).
          headers:
            Location:
              description: URL of the newly created Periodic Premium resource.
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
              example: /contracts/3c7d1f62-0f0a-4f6b-9b8c-0e3a3b1c0001/periodic-premiums/a2b3c4d5-6e7f-8a9b-0c1d-2e3f4a5b6c7d
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PeriodicPremiumResource'
              examples:
                periodicPremium:
                  $ref: '#/components/examples/PeriodicPremium'
        '202':
          description: |
            Creation accepted. An AML review was triggered: the
            server-created `PREMIUM_PAYMENT` service request is exposed
            under `_embedded.service_requests`. The premium's status still
            mirrors the parent contract status; recurring collection is
            gated on the service request being approved.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PeriodicPremiumResource'
              examples:
                periodicPremiumUnderReview:
                  $ref: '#/components/examples/PeriodicPremiumUnderReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The periodic premium violates a contract-level invariant.
            - `incompatibleStatus`: the parent contract is in `REJECTED` or `CANCELLED`. Only `DRAFT`, `SUBMITTED`, or `ACCEPTED` contracts can receive new periodic premiums.

            Allocation-shape violations and `date_of_start` falling within
            the renunciation window surface as `422 Unprocessable Entity`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '422':
          description: |
            Unprocessable Entity. The request was well-formed but violates a business rule.
            - `dateOfStartWithinRenunciationPeriod`: `date_of_start` falls within or before the legal renunciation window (`date_of_acceptance + 30 days`). The earliest valid value is the day after the renunciation period expires. Detectable at creation only when the parent contract is `ACCEPTED` (acceptance date known).
            - `allocationsNotSum100`: the supplied `allocations` (free funds + preset allocations combined) do not sum exactly to 100%.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnprocessableEntity'
              examples:
                dateOfStartWithinRenunciationPeriod:
                  $ref: '#/components/examples/PeriodicPremiumDateOfStartUnprocessable'
                allocationsNotSum100:
                  $ref: '#/components/examples/UnprocessableAllocationsNotSum100'
        '500':
          $ref: '#/components/responses/InternalServerError'
      summary: Create a new periodic premium for a contract
      security:
        - oauth2:
            - contracts:write
      tags:
        - periodic-premium
