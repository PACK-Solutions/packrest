        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/PremiumId'
      responses:
        '200':
          description: One-time premium cancelled successfully.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PremiumResource'
              examples:
                premiumCancelled:
                  $ref: '#/components/examples/PremiumCancelled'
