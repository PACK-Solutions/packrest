    UnprocessableCreateUnknownSubscriber:
      summary: Create blocked — subscriber_id references an unknown person
      value:
        type: https://pack-solutions.com/probs/unprocessable-entity
        title: Unprocessable Entity
        status: 422
        detail: The contract cannot be created because `subscriber_id` does not reference any known person. Either omit `subscriber_id` (it is optional at creation) or pass an existing person id.
        instance: /contracts
        errors:
          - code: MISSING
            detail: '`subscriber_id` 1f1a8119-4e24-4460-a126-c79f8ed0017f does not reference any known person.'
            pointer: /subscriber_id
    ConflictIncompatibleStatus:
      value:
        type: https://pack-solutions.com/probs/conflict
        title: Operation not allowed for current contract status
        status: 409
        detail: The contract is in `CANCELLED` status. Cancelled contracts cannot be modified, submitted, or cancelled again. Service requests cannot be created on a contract in this status.
        instance: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f
        errors:
          - code: INVALID_STATE
            detail: Contract status `CANCELLED` does not permit this operation.
    ConflictSubscriberNotSubmitted:
      value:
        type: https://pack-solutions.com/probs/conflict
        title: Subscriber not submitted
        status: 409
        detail: The person referenced by `subscriber_id` is in `DRAFT` status. The subscriber must be in `SUBMITTED` or `ENGAGED` status before the contract can be submitted. Submit the subscriber via `POST /individuals/{person_id}/submit` (Person API) and retry.
        instance: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f/submit
        errors:
          - code: INVALID_STATE
            detail: Subscriber 1f1a8119-4e24-4460-a126-c79f8ed0017f is in `DRAFT` status; subscriber must be `SUBMITTED` or `ENGAGED` before contract submission.
            pointer: /subscriber_id
    ConflictRenunciationPeriodExpired:
      summary: Renunciation request rejected because the 30-day legal window has elapsed
      value:
        type: https://pack-solutions.com/probs/conflict
        title: Renunciation period expired
        status: 409
        detail: The legal 30-day renunciation window has elapsed. The contract was accepted on 2026-04-01; the renunciation window closed on 2026-05-01. The contract can no longer be renounced through this endpoint.
        instance: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f/service-requests
        errors:
          - code: OUT_OF_RANGE
            detail: Today's date falls outside the legal 30-day renunciation window following `date_of_acceptance` (2026-04-01). The window closed on 2026-05-01.
    UpdatePremium:
      summary: Update a one-time premium (partial allocation rebalance)
      description: |
        Partial update body for `POST /contracts/{contract_id}/one-time-premiums/{premium_id}`.
        Only the keys present are overwritten; the server validates that the
        resulting `allocations` still sums to 100%.
      value:
        allocations:
          funds:
            - fund_id: 3a7c1e2f-4b5d-6e8f-9a0b-1c2d3e4f5001
              allocation_rate:
                value: 60
                scale: 2
            - fund_id: 3a7c1e2f-4b5d-6e8f-9a0b-1c2d3e4f5002
              allocation_rate:
                value: 40
                scale: 2
          preset_allocations: []
    UpdatePeriodicPremium:
      summary: Update a periodic premium (amount + periodicity)
      description: |
        Partial update body for `POST /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}`.
        Only the keys present are overwritten; the server validates that the
        resulting `allocations` still sums to 100% when allocations are part
        of the payload.
      value:
        periodic_amount:
          value: 75000
          scale: 2
          currency: EUR
        periodicity: QUARTERLY
    UnprocessableAllocationsNotSum100:
      summary: Allocations do not sum to 100%
      description: |
        Returned by `POST /contracts/{contract_id}/one-time-premiums` (and the
        related update / periodic-premium endpoints) when the supplied
        `allocations` (free funds + preset allocations combined) do not sum
        exactly to 100%.
      value:
        type: https://pack-solutions.com/probs/unprocessable
        title: Allocation rates do not sum to 100%
        status: 422
        detail: The provided `allocations` rates sum to 95%. Free funds and preset allocations combined must total exactly 100%.
        instance: /contracts/3c7d1f62-0f0a-4f6b-9b8c-0e3a3b1c0001/one-time-premiums
        errors:
          - code: INCONSISTENT
            detail: The sum of `funds[].allocation_rate` and `preset_allocations[].allocation_rate` must be exactly 100%.
            pointer: /allocations
