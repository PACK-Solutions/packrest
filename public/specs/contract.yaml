          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PeriodicPremiumResource'
              examples:
                periodicPremiumCancelled:
                  $ref: '#/components/examples/PeriodicPremiumCancelled'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The periodic premium cannot be cancelled.
            - `incompatibleStatus`: the periodic premium is in `REJECTED`, `ENDED`, or already `CANCELLED` status. Only `DRAFT`, `SUBMITTED`, `ACCEPTED`, or `SUSPENDED` periodic premiums can be cancelled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
      tags:
        - periodic-premium
  /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}/suspend:
    post:
      operationId: suspendPeriodicPremium
      summary: Suspend a periodic premium
      description: |
        Suspends a periodic premium and transitions it to `SUSPENDED` status. Future scheduled payments
        are paused until the premium is resumed via `POST .../resume` or cancelled via `POST .../cancel`.

        ### Prerequisites
        The periodic premium must be in `ACCEPTED` status.

        ### Behavior
        - If suspension succeeds, the periodic premium transitions to `SUSPENDED` status.
        - Any future scheduled payments are paused; no payment is triggered while in `SUSPENDED`.
        - Already-executed payments are not affected.

        ### Restrictions
        - This endpoint cannot be called on periodic premiums in `DRAFT`, `SUBMITTED`, `SUSPENDED`, `CANCELLED`, `REJECTED`, or `ENDED` status.
        - Calling this on a periodic premium in an invalid status will result in a `409 Conflict` error.
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/PeriodicPremiumId'
      responses:
        '200':
          description: Periodic premium suspended successfully.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PeriodicPremiumResource'
              examples:
                periodicPremiumSuspended:
                  $ref: '#/components/examples/PeriodicPremiumSuspended'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The periodic premium cannot be suspended.
            - `incompatibleStatus`: the periodic premium is in `DRAFT`, `SUBMITTED`, `SUSPENDED`, `CANCELLED`, `REJECTED`, or `ENDED` status. Only `ACCEPTED` periodic premiums can be suspended.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
      tags:
        - periodic-premium
  /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}/resume:
    post:
      operationId: resumePeriodicPremium
      summary: Resume a periodic premium
      description: |
        Resumes a previously suspended periodic premium and transitions it back to `ACCEPTED` status.
        Scheduled payments resume according to the original periodicity from the next eligible payment
        date.

        ### Prerequisites
        The periodic premium must be in `SUSPENDED` status.

        ### Behavior
        - If resumption succeeds, the periodic premium transitions to `ACCEPTED` status.
        - Scheduled payments resume from the next eligible payment date according to the original
          periodicity; payment dates that fell within the suspension period are not retroactively
          executed.

        ### Restrictions
        - This endpoint cannot be called on periodic premiums in `DRAFT`, `SUBMITTED`, `ACCEPTED`, `CANCELLED`, `REJECTED`, or `ENDED` status.
        - Calling this on a periodic premium in an invalid status will result in a `409 Conflict` error.
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/PeriodicPremiumId'
      responses:
        '200':
          description: Periodic premium resumed successfully.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PeriodicPremiumResource'
              examples:
                periodicPremiumResumed:
                  $ref: '#/components/examples/PeriodicPremium'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The periodic premium cannot be resumed.
            - `incompatibleStatus`: the periodic premium is in `DRAFT`, `SUBMITTED`, `ACCEPTED`, `CANCELLED`, `REJECTED`, or `ENDED` status. Only `SUSPENDED` periodic premiums can be resumed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
      tags:
        - periodic-premium
  /contracts/{contract_id}/renounce:
    post:
      operationId: renounceContract
      summary: Create a contract renunciation request
      description: |
        Initiate a `CONTRACT_RENUNCIATION` service request to withdraw a newly
        subscribed contract within the legal 30-day renunciation period.

        `CONTRACT_RENUNCIATION` is the **only** service request a partner can
        initiate explicitly on a contract. All other types
        (`CONTRACT_SUBSCRIPTION`, `PREMIUM_PAYMENT`, `BENEFICIARY_CLAUSE_CHANGE`)
        are created automatically by the server as a side effect of standard
        mutations.

        ### Prerequisites
        - Contract must be in `ACCEPTED` status.
        - Acceptance must have occurred within the last 30 days. Otherwise the
          server returns `409 Conflict` with code `renunciationPeriodExpired`.

        ### Behaviour
        - The service request is immediately submitted — no draft phase.
        - If required documents are missing, the request is created in
          `REQUIRES_INFORMATION` status; otherwise in `UNDER_REVIEW`.
        - Once approved, the contract transitions to `CANCELLED` and cascades
          to all linked premiums.
        - Track and act on the service request via the Service Request API
          using the `service_request_id` returned in the response or the
          `Location` header.
      tags:
        - contract
      parameters:
        - $ref: '#/components/parameters/ContractId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractRenounceRequest'
            examples:
              renounce:
                $ref: '#/components/examples/ContractRenounceRequest'
      responses:
        '201':
          description: Renunciation service request created.
          headers:
            Location:
              description: URL of the created service request in the Service Request API.
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractRenounceResponse'
              examples:
                renounce:
                  $ref: '#/components/examples/ContractRenounceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict. The renunciation request cannot be created.
            - `renunciationPeriodExpired`: the 30-day legal renunciation window has elapsed.
            - `incompatibleStatus`: the contract is not in `ACCEPTED` status.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Conflict'
              examples:
                renunciationPeriodExpired:
                  $ref: '#/components/examples/ConflictRenunciationPeriodExpired'
                incompatibleStatus:
                  $ref: '#/components/examples/ConflictIncompatibleStatus'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - contracts:write
components:
  schemas:
    HalLink:
      type: object
      title: HalLink
      description: |
        HAL link object. Minimal shape: an `href` (URI of the linked resource)
        and the `method` to use when following it. Navigation and pagination
        relations use `GET`; action relations use `POST` (or `DELETE` for
        resource removal). The project does not use `PUT` or `PATCH`.
      additionalProperties: false
      required:
        - href
        - method
      properties:
        href:
          type: string
          format: uri-reference
          maxLength: 2048
          description: URI of the linked resource.
          example: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
        method:
          $ref: '#/components/schemas/HalLinkMethod'
          description: HTTP method to use when following this link.
    HalLinkMethod:
      type: string
      title: HalLinkMethod
      description: |
        HTTP method to use when following a HAL link. Restricted to
        `GET` (navigation), `POST` (actions and mutations), and `DELETE`
        (resource removal). The project does not use `PUT` or `PATCH`.
      enum:
        - GET
        - POST
        - DELETE
      example: GET
    HalPaginationLinks:
      type: object
      title: HalPaginationLinks
      description: |
        Pagination link relations used inside the `_links` of a collection envelope.
        `first` and `last` are always present; `next` and `prev` are conditional on
        page state. Compose with `HalSelfLinks` in every `*Collection._links`.
      properties:
        first:
          $ref: '#/components/schemas/HalLink'
          description: Link to the first page of the collection.
        last:
          $ref: '#/components/schemas/HalLink'
          description: Link to the last page of the collection.
        next:
          $ref: '#/components/schemas/HalLink'
          description: Link to the next page of the collection. Omitted on the last page.
        prev:
          $ref: '#/components/schemas/HalLink'
          description: Link to the previous page of the collection. Omitted on the first page.
      required:
        - first
        - last
      example:
        first:
          href: /resources?page=1&size=20
          method: GET
        last:
          href: /resources?page=5&size=20
          method: GET
        next:
          href: /resources?page=3&size=20
          method: GET
        prev:
          href: /resources?page=1&size=20
          method: GET
    HalSelfLinks:
      type: object
      title: HalSelfLinks
      description: |
        Base shape for every `_links` block. Guarantees that the `self` link is present
        on every HAL Resource and Collection envelope. Compose with `HalPaginationLinks`
        for paginated collections, or extend inline with action/navigation relations.
      properties:
        self:
          $ref: '#/components/schemas/HalLink'
          description: Link to the current resource.
      required:
        - self
      example:
        self:
          href: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
          method: GET
    PageMetadata:
      type: object
      title: PageMetadata
      description: Pagination metadata for collection responses.
      properties:
        number:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
          description: Current page number (one-based).
          example: 1
        size:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          description: Number of items per page.
          example: 20
        total_elements:
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999999
          description: Total number of items across all pages.
          example: 100
        total_pages:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          description: Total number of pages.
          example: 5
      required:
        - size
        - total_elements
        - total_pages
        - number
    ProblemDetails:
      type: object
      title: Problem Details
      description: A RFC 9457 compliant problem detail object
      properties:
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Your current balance is 30, but that costs 50.
        instance:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://pack-solutions.com/accounts/12345/msgs/abc
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 403
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: A short, human-readable summary of the problem type.
          example: You do not have enough credit.
        type:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the problem type.
          default: about:blank
          example: https://pack-solutions.com/probs/out-of-stock
    ValidationProblemDetails:
      type: object
      title: Validation Problem Details
      description: |
        An extension of RFC 9457 Problem Details that includes structured validation errors.
        Used for responses where the server needs to communicate specific field-level or business-rule validation failures.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: array
              maxItems: 100
              description: A list of validation errors that occurred during request processing.
              items:
                $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      title: Validation Error
      description: |
        A single validation error entry describing a specific issue with the request.
      properties:
        code:
          $ref: '#/components/schemas/ValidationErrorCode'
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation of the validation error.
        pointer:
          type: string
          minLength: 1
          maxLength: 500
          pattern: ^/
          description: |
            A JSON Pointer (RFC 6901) to the field in the request body that caused the
            error. For asynchronous validations surfaced on a service request (e.g.,
            manual review rejections), the same convention is used in
            `ServiceRequestRequirement.pointer` (entries with `kind=DATA_FIELD`). Consumer
            rendering logic can therefore be shared between synchronous `422` errors and
            asynchronous INVALID requirements.

            When the offending field lives inside a HAL `_embedded` or `_links` block
            (e.g., on a 409 conflict against a resource that exposes its sub-collections
            via embedding), the pointer follows the **physical** structure of the HAL
            response and includes the `_embedded`/`_links` segments — for example
            `/_embedded/individuals/0/birth/date_of_birth`.
      required:
        - code
        - detail
    ValidationErrorCode:
      type: string
      title: Validation Error Code
      description: |
        A machine-readable error code indicating the type of validation failure.

        Prefer the most specific code available. Use `UNPROCESSABLE` and `CUSTOM`
        only as last-resort fallbacks when no specific code fits.

        ### Presence (typically on 422 and 400)
        - `MISSING`: A required resource or related entity is missing (e.g., referenced `subscriber_id` does not exist).
        - `MISSING_FIELD`: A required field was not provided in the request body.

        ### Shape (typically on 400 and 422)
        - `INVALID`: The field value is invalid in a generic sense. Use a more specific code when applicable.
        - `INVALID_FORMAT`: The field value does not match the expected format (e.g., not a valid IBAN, UUID, ISO-8601 date).
        - `OUT_OF_RANGE`: The field value is well-formed but falls outside the accepted range — numeric bounds, temporal window, or string length.
        - `INCONSISTENT`: The field is inconsistent with another field in the same payload (e.g., `allocations` rates do not sum to 100%, `date_of_end` before `date_of_start`).

        ### State (typically on 409)
        - `ALREADY_EXISTS`: The resource or value already exists and duplicates are not allowed.
        - `INVALID_STATE`: The operation is incompatible with the current state of the resource (e.g., trying to cancel an already-executed premium, submitting a contract whose subscriber is still in `DRAFT`).

        ### Business rules (typically on 422)
        - `BUSINESS_RULE_VIOLATION`: A documented business rule is violated and no more specific code above fits (e.g., a regulatory threshold is crossed).

        ### Fallbacks
        - `UNPROCESSABLE`: Legacy generic code. **Prefer `BUSINESS_RULE_VIOLATION` or a state/shape code above.**
        - `CUSTOM`: A custom validation error not covered by the standard codes.
      enum:
        - MISSING
        - MISSING_FIELD
        - INVALID
        - INVALID_FORMAT
        - OUT_OF_RANGE
        - INCONSISTENT
        - ALREADY_EXISTS
        - INVALID_STATE
        - BUSINESS_RULE_VIOLATION
        - UNPROCESSABLE
        - CUSTOM
      example: MISSING_FIELD
    BadRequest:
      type: object
      title: Bad Request
      description: Bad Request (400)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    Unauthorized:
      type: object
      title: Unauthorized
      description: Unauthorized (401)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      type: object
      title: Forbidden
      description: Forbidden (403)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      type: object
      title: Not Found
      description: Not Found (404)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      type: object
      title: Conflict
      description: Conflict (409)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    ContentTooLarge:
      type: object
      title: Content Too Large
      description: Content Too Large (413). Returned when the request body exceeds the maximum allowed size enforced by the API (default 250 KiB / 256000 bytes). File-upload endpoints may apply a larger, content-specific limit.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    UnprocessableEntity:
      type: object
      title: Unprocessable Entity
      description: Unprocessable Entity (422)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    InternalServerError:
      type: object
      title: Internal Server Error
      description: Internal Server Error (500)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    ServiceRequestRequirement:
      type: object
      title: Service Request Requirement
      description: |
        A single requirement that must be fulfilled for a service request to progress.

        Service requests expose a flat `requirements: ServiceRequestRequirement[]`
        array. When no entry remains in `MISSING` or `INVALID` state, the SR
        auto-transitions from `REQUIRES_INFORMATION` to `UNDER_REVIEW`. Business resources (Contract,
        Premium, Individual…) do **not** carry this model; missing fields on a
        business resource surface as synchronous `422 Unprocessable Entity` errors
        on the mutation that needs them.

        Combines a `kind` (data field vs document) with a `state` to describe precisely
        what the partner must provide or correct. Requirements persist throughout the full
        lifecycle of the service request; only their `state` evolves.

        `state` is server-managed: it is never accepted in a request body and is
        present only on read responses.

        Document requirement lifecycle (`kind=DOCUMENT`):
        `MISSING` → *(document attached)* → `SUBMITTED` → *(reviewer accepts)* → `VALIDATED`
                                                         → *(reviewer rejects)* → `INVALID`
                                          → *(new document attached)* → `SUBMITTED`

        Data field requirement lifecycle (`kind=DATA_FIELD`):
        `MISSING` → *(field posted)* → `VALIDATED`
        `INVALID` → *(corrected value posted)* → `VALIDATED`

        The six cases:

        - **Missing data field** — `kind=DATA_FIELD`, `state=MISSING`. POST the value to
          the service request endpoint; `pointer` locates the target field.
        - **Invalid data field** — `kind=DATA_FIELD`, `state=INVALID`. POST a corrected
          value; `pointer` locates the field and `error_code` classifies the rejection
          programmatically.
        - **Missing document** — `kind=DOCUMENT`, `state=MISSING`. Upload a file via the
          service request `documents` endpoint with a `document_type` from
          `accepted_document_types`.
        - **Submitted document** — `kind=DOCUMENT`, `state=SUBMITTED`. A document has been
          attached and is awaiting manual review. `document` (its `id` and `type`) identifies
          the attached document. The requirement no longer blocks the SR from entering `UNDER_REVIEW`.
        - **Invalid document** — `kind=DOCUMENT`, `state=INVALID`. A document was attached
          but rejected during manual review. `document` (its `id` and `type`) identifies the
          rejected document and `error_code` classifies the rejection. Upload a replacement
          to transition back to `SUBMITTED`.
        - **Validated document** — `kind=DOCUMENT`, `state=VALIDATED`. A document was
          accepted during manual review. `document` (its `id` and `type`) identifies the
          accepted document.
      properties:
        accepted_document_types:
          type: array
          maxItems: 20
          description: |
            List of document types that can satisfy this requirement.
            Present only when `kind=DOCUMENT`. Each value is a `DocumentType`
            from the shared catalog.
          items:
            $ref: '#/components/schemas/DocumentType'
          example:
            - PROOF_OF_ADDRESS
        document:
          readOnly: true
          description: |
            Reference (id + type) of the document attached to satisfy this requirement.
            Present only when `kind=DOCUMENT` and a document has been attached
            (`state` is `SUBMITTED`, `VALIDATED`, or `INVALID` following a review).
            Absent when `state=MISSING`.
          allOf:
            - $ref: '#/components/schemas/DocumentReference'
        error_code:
          description: |
            Machine-readable classification of why this entry is in `state=INVALID`.
            Optional and present only when `state=INVALID`. Reuses the same enum as
            `ValidationError.code` (synchronous `422` errors), so consumers can share
            the same switch logic across both error channels.
          allOf:
            - $ref: '#/components/schemas/ValidationErrorCode'
          example: BUSINESS_RULE_VIOLATION
        kind:
          $ref: '#/components/schemas/ServiceRequestRequirementKind'
        pointer:
          type: string
          minLength: 1
          maxLength: 255
          pattern: ^/
          description: |
            RFC 6901 JSON Pointer to the offending field, relative to the service request
            payload. Present when `kind=DATA_FIELD`. Same convention as
            `ValidationError.pointer` (synchronous 422 errors), allowing consumers to share
            rendering and field-locator logic between both error channels.
          example: /address/postal_code
        state:
          allOf:
            - $ref: '#/components/schemas/ServiceRequestRequirementState'
          readOnly: true
      required:
        - kind
        - state
    ServiceRequestRequirementKind:
      type: string
      title: Service Request Requirement Kind
      description: |
        Nature of a service request requirement.

        - `DATA_FIELD`: a missing or invalid data field on the service request payload.
          Provide or correct the value via `POST` on the service request endpoint.
        - `DOCUMENT`: a missing or invalid supporting document.
          Upload or replace the file via `POST` on the service request `documents` endpoint.
      enum:
        - DATA_FIELD
        - DOCUMENT
      example: DOCUMENT
    ServiceRequestRequirementState:
      type: string
      title: Service Request Requirement State
      description: |
        Current status of a service request requirement.

        - `MISSING`: nothing has been provided yet for this entry — the partner must supply
          the requested field value or document.
        - `INVALID`: a value or document was provided but rejected, either by automated
          validation (format error, business rule) or during manual review by a case handler.
          The partner must replace it to unblock the requirement.
        - `SUBMITTED`: a document has been attached and is awaiting manual review by a case
          handler. Only applies to `kind=DOCUMENT` requirements. The entry no longer blocks
          the service request from transitioning to `UNDER_REVIEW`, but `VALIDATED` is not
          set until a reviewer explicitly accepts it.
        - `VALIDATED`: the value or document provided for this entry was accepted — either
          by automated validation (data fields) or during manual review by a case handler
          (documents). A requirement in this state no longer blocks the service request from
          progressing; it is kept in the list for auditability.
      enum:
        - MISSING
        - INVALID
        - SUBMITTED
        - VALIDATED
      example: MISSING
    DocumentType:
      title: DocumentType
      type: string
      description: |
        Catalog of document types accepted by the API. Values are grouped by the
        **business entity** the document is typically attached to (`person`,
        `contract`, `payment_method`). Each group is further broken down by
        functional sub-category. Owner-scoped subset enums (`PersonDocumentType`,
        `ContractDocumentType`, `PaymentMethodDocumentType`) narrow this catalog
        to the values that are valid for a given owner.

        ### Person — Identity / Civil status
        - `PROOF_OF_IDENTITY`: Justificatif d'identité (CNI ou passeport, en cours de validité)
        - `BIRTH_CERTIFICATE`: Acte de naissance (< 3 mois)
        - `MARRIAGE_CERTIFICATE`: Acte de mariage
        - `DIVORCE_DECREE`: Jugement de divorce
        - `PROOF_OF_ADDRESS`: Justificatif de domicile

        ### Person — International taxation
        - `CERFA_3916`: CERFA 3916 (compte bancaire à l'étranger)
        - `CERFA_5000`: CERFA 5000 (non-résident)
        - `W9_TAX_FORM`: Formulaire W9 (États-Unis)
        - `W8BEN_FORM`: Formulaire W-8BEN

        ### Person — AML-CFT compliance
        - `CONFIDENTIAL_INFORMATION_SHEET`: Fiche de renseignements confidentiels (versements > 40 k€)
        - `AML_PEP_PROOF`: Justificatif LCB-FT / PPE (Personne Politiquement Exposée)

        ### Person — Legal protection
        - `LEGAL_PROTECTION`: Protection juridique (générique)
        - `GUARDIANSHIP_JUDGMENT`: Jugement de mise sous tutelle
        - `CURATORSHIP_JUDGMENT`: Jugement de mise sous curatelle
        - `JUDICIAL_PROTECTION_ORDER`: Jugement / ordonnance de sauvegarde de justice

        ### Contract — Subscription / product
        - `MEMBERSHIP_FORM`: Bulletin d'adhésion
        - `MUTUAL_REGULATION`: Règlement mutualiste
        - `PROFILED_MANAGEMENT_MANDATE`: Mandat de gestion profilé

        ### Contract — Beneficiary clause
        - `SIGNED_BENEFICIARY_CLAUSE_FORM`: Formulaire de clause bénéficiaire signé
        - `ACCEPTING_BENEFICIARY`: Bénéficiaire acceptant

        ### Contract — Pledge / Third-party seizure
        - `PLEDGE_DEED`: Acte de nantissement
        - `PLEDGE_RELEASE`: Mainlevée de nantissement
        - `DGFIP_THIRD_PARTY_NOTICE`: ATD — Avis tiers détenteur DGFiP

        ### Request / Operation — Generic formalism
        - `SIGNED_REQUEST_FORM`: Formulaire de demande signé
        - `SIGNED_REQUEST_LETTER`: Courrier de demande signé

        ### Payment / Financial operation
        - `PROOF_OF_FUND_ORIGIN`: Justificatif d'origine des fonds

        ### Benefit / Surrender
        - `FUND_DESTINATION_PROOF`: Justificatif de destination des fonds

        ### Bank account details
        - `SEPA_MANDATE`: Mandat SEPA
        - `BANK_DETAILS`: RIB (Relevé d'Identité Bancaire)
        - `FOREIGN_BANK_DETAILS`: RIB étranger

        ### Catch-all
        - `OTHER`: Autre
      enum:
        - PROOF_OF_IDENTITY
        - BIRTH_CERTIFICATE
        - MARRIAGE_CERTIFICATE
        - DIVORCE_DECREE
        - PROOF_OF_ADDRESS
        - CERFA_3916
        - CERFA_5000
        - W9_TAX_FORM
        - W8BEN_FORM
        - CONFIDENTIAL_INFORMATION_SHEET
        - AML_PEP_PROOF
        - LEGAL_PROTECTION
        - GUARDIANSHIP_JUDGMENT
        - CURATORSHIP_JUDGMENT
        - JUDICIAL_PROTECTION_ORDER
        - MEMBERSHIP_FORM
        - MUTUAL_REGULATION
        - PROFILED_MANAGEMENT_MANDATE
        - SIGNED_BENEFICIARY_CLAUSE_FORM
        - ACCEPTING_BENEFICIARY
        - PLEDGE_DEED
        - PLEDGE_RELEASE
        - DGFIP_THIRD_PARTY_NOTICE
        - SIGNED_REQUEST_FORM
        - SIGNED_REQUEST_LETTER
        - PROOF_OF_FUND_ORIGIN
        - FUND_DESTINATION_PROOF
        - SEPA_MANDATE
        - BANK_DETAILS
        - FOREIGN_BANK_DETAILS
        - OTHER
      example: PROOF_OF_IDENTITY
    ContractBase:
      type: object
      title: Contract Base
      description: Shared domain properties for a contract.
      properties:
        beneficiary_clause:
          description: Free-text beneficiary clause describing the beneficiary designation.
          type: string
          maxLength: 2000
          example: My legal heirs in equal parts
        date_of_effect:
          description: Date when the contract takes effect.
          type: string
          format: date
          minLength: 10
          maxLength: 10
          example: 2026-04-01
        fee_waivers:
          description: List of fee waivers applied to this contract.
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/FeeWaiver'
        optional_covers:
          description: |
            Optional guarantees attached to this contract. Closed catalog (see `OptionalCover`).
            0 to 6 entries, no duplicates.
          type: array
          minItems: 0
          maxItems: 6
          uniqueItems: true
          items:
            $ref: '#/components/schemas/OptionalCover'
          example:
            - EXEMPTION_GUARANTEE
            - FLOOR_GUARANTEE
        product_id:
          description: Unique identifier of the product associated with this contract.
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        subscriber_id:
          description: Unique identifier of the subscriber (person) from the Person API.
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
    ContractStatus:
      type: string
      title: Contract Status
      description: |
        Current status of a contract in its lifecycle.

        - `DRAFT`: in preparation. Direct updates allowed.
        - `SUBMITTED`: submitted to PACK Solutions; awaiting internal review (driven by the auto-created `CONTRACT_SUBSCRIPTION` service request).
        - `ACCEPTED`: accepted and active. Field changes go through the appropriate service request, but the partner triggers them through the standard endpoints.
        - `REJECTED`: rejected during review.
        - `CANCELLED`: cancelled.
      enum:
        - DRAFT
        - SUBMITTED
        - ACCEPTED
        - REJECTED
        - CANCELLED
      example: DRAFT
    ContractCreate:
      title: Contract Create
      description: |
        Payload for creating a new contract.

        Only `product_id` is required at creation time — a `DRAFT` contract is a
        scratch space that can be filled progressively. `subscriber_id` and
        `date_of_effect` become required at submission time (see
        `POST /contracts/{contract_id}/submit`).
      allOf:
        - $ref: '#/components/schemas/ContractBase'
        - type: object
          required:
            - product_id
    ContractUpdate:
      type: object
      title: Contract Update
      description: Partial update payload for a contract. All fields are optional.
      properties:
        beneficiary_clause:
          description: Free-text beneficiary clause describing the beneficiary designation.
          type: string
          maxLength: 2000
          example: My legal heirs in equal parts
        date_of_effect:
          description: Date when the contract takes effect.
          type: string
          format: date
          minLength: 10
          maxLength: 10
          example: 2026-04-01
        fee_waivers:
          description: List of fee waivers applied to this contract.
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/FeeWaiver'
        optional_covers:
          description: |
            Optional guarantees attached to this contract. Closed catalog (see `OptionalCover`).
            0 to 6 entries, no duplicates. When provided, replaces the entire list on the contract.
          type: array
          minItems: 0
          maxItems: 6
          uniqueItems: true
          items:
            $ref: '#/components/schemas/OptionalCover'
        product_id:
          description: Unique identifier of the product associated with this contract.
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        subscriber_id:
          description: Unique identifier of the subscriber (person) from the Person API.
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
    ContractResponse:
      title: Contract Response
      description: Contract response including server-managed read-only fields.
      allOf:
        - $ref: '#/components/schemas/ContractBase'
        - type: object
          required:
            - id
            - status
            - product_id
          properties:
            contract_number:
              description: Contract number assigned by the insurer **at submission**. Absent on `DRAFT` contracts. Used as the official reference in documents and correspondence after submission. Not modifiable.
              type: string
              minLength: 1
              maxLength: 20
              pattern: ^[A-Z0-9]+$
              readOnly: true
              example: VP2026041800001
            date_of_subscription:
              description: Date and time when the contract was accepted by the insurer. Absent on `DRAFT`, `SUBMITTED`, and `REJECTED` contracts. Always present on `ACCEPTED` contracts and on `CANCELLED` contracts that were cancelled after acceptance.
              type: string
              format: date-time
              minLength: 20
              maxLength: 35
              readOnly: true
              example: 2026-02-12T13:08:00Z
            id:
              description: Unique identifier of the contract.
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              example: 3f3a8119-4e24-4460-a126-c79f8ed0017f
            status:
              $ref: '#/components/schemas/ContractStatus'
              readOnly: true
    ContractResource:
      type: object
      title: Contract Resource
      description: |
        Contract resource with HAL links.

        When the latest mutation triggered one or more service requests (e.g.
        `CONTRACT_SUBSCRIPTION` on submit, `BENEFICIARY_CLAUSE_CHANGE` on a
        sensitive-field change against an `ACCEPTED` contract), the embedded
        `_embedded.service_requests` list navigates to each request detail.
        The submitted values awaiting approval are carried by the service
        request itself.
      allOf:
        - $ref: '#/components/schemas/ContractResponse'
        - type: object
          properties:
            _embedded:
              $ref: '#/components/schemas/ContractResourceEmbedded'
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a contract. Beyond `self`, the partner can navigate to
                    every related resource via dedicated relations. Action relations
                    (`submit`, `cancel`, `renounce`, `update`) are exposed conditionally,
                    depending on the contract's current status.

                    | Relation | Method | Always present | Condition |
                    |---|---|---|---|
                    | `self` | GET | yes | — |
                    | `subscriber` | GET | no | populated once `subscriber_id` is set |
                    | `product` | GET | yes | — |
                    | `one_time_premiums` | GET | yes | — |
                    | `periodic_premiums` | GET | yes | — |
                    | `service_requests` | GET | yes | Link to `GET /service-requests?target_resource_type=CONTRACT&target_resource_id={id}` in the Service Request API |
                    | `submit` | POST | no | status is `DRAFT` |
                    | `cancel` | POST | no | status is `DRAFT` or `SUBMITTED` |
                    | `renounce` | POST | no | status is `ACCEPTED` and within 30 days of acceptance |
                    | `update` | POST | no | status is `DRAFT` or `ACCEPTED` |
                  properties:
                    cancel:
                      $ref: '#/components/schemas/HalLink'
                      description: Action link to cancel the contract. Present when `status` is `DRAFT` or `SUBMITTED`.
                    one_time_premiums:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the one-time premiums collection of this contract.
                    periodic_premiums:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the periodic premiums collection of this contract.
                    product:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the product definition.
                    renounce:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to initiate a `CONTRACT_RENUNCIATION` service request. Present only when `status: ACCEPTED` and within the 30-day legal renunciation window.'
                    service_requests:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to service requests targeting this contract (`GET /service-requests?target_resource_type=CONTRACT&target_resource_id={id}`).
                    submit:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to submit the contract. Present only when `status: DRAFT`.'
                    subscriber:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the subscriber (Person API, `/individuals/{id}`).
                    update:
                      $ref: '#/components/schemas/HalLink'
                      description: Action link to update the contract. Present when `status` is `DRAFT` or `ACCEPTED`.
                  required:
                    - product
                    - one_time_premiums
                    - periodic_premiums
                    - service_requests
          required:
            - _links
    ContractResourceEmbedded:
      title: Contract Resource Embedded
      description: |
        Embedded resources for a Contract resource. Exposes a `service_requests`
        list when the latest mutation triggered (or updated) one or more reviews
        (e.g. `CONTRACT_SUBSCRIPTION` on submit, `BENEFICIARY_CLAUSE_CHANGE` on a
        modification of an `ACCEPTED` contract). The key is absent when no
        review is required.
      readOnly: true
      maxProperties: 10
      additionalProperties: true
      allOf:
        - $ref: '#/components/schemas/WithServiceRequests'
    ContractCollectionEmbedded:
      type: object
      title: Contract Collection Embedded
      description: Embedded container for contract resources in a collection response.
      properties:
        contracts:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/ContractResource'
      required:
        - contracts
    ContractCollection:
      type: object
      title: Contract Collection
      description: Paginated collection of contract resources.
      properties:
        _embedded:
          $ref: '#/components/schemas/ContractCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
    FeeWaiver:
      title: Fee Waiver
      description: A fee waiver applied to the contract for a given period and rate.
      oneOf:
        - $ref: '#/components/schemas/FeeWaiverFinite'
        - $ref: '#/components/schemas/FeeWaiverInfinite'
      discriminator:
        propertyName: fee_waiver_type
        mapping:
          FINITE: '#/components/schemas/FeeWaiverFinite'
          INFINITE: '#/components/schemas/FeeWaiverInfinite'
    FeeWaiverBase:
      type: object
      title: Fee Waiver Base
      description: Base schema for a fee waiver applied to a contract.
      properties:
        date_of_start:
          description: Start date of the fee waiver period.
          type: string
          format: date
          minLength: 10
          maxLength: 10
          example: 2026-01-01
        fee_waiver_type:
          $ref: '#/components/schemas/FeeWaiverType'
        rate:
          $ref: '#/components/schemas/Rate'
          description: Fee waiver rate.
      required:
        - fee_waiver_type
        - date_of_start
        - rate
    FeeWaiverType:
      type: string
      title: Fee Waiver Type
      maxLength: 10
      description: |
        Discriminator value for the fee-waiver duration type.

        - `FINITE`: fee waiver with a defined end date.
        - `INFINITE`: fee waiver applying indefinitely.
      enum:
        - FINITE
        - INFINITE
      example: FINITE
    FeeWaiverFinite:
      title: Finite Fee Waiver
      description: A fee waiver with a defined end date.
      allOf:
        - $ref: '#/components/schemas/FeeWaiverBase'
        - type: object
          properties:
            date_of_end:
              description: End date of the fee waiver period.
              type: string
              format: date
              minLength: 10
              maxLength: 10
              example: 2027-01-01
            fee_waiver_type:
              type: string
              minLength: 1
              maxLength: 10
              const: FINITE
          required:
            - fee_waiver_type
            - date_of_end
    FeeWaiverInfinite:
      title: Infinite Fee Waiver
      description: A fee waiver with no defined end date, applying indefinitely.
      allOf:
        - $ref: '#/components/schemas/FeeWaiverBase'
        - type: object
          properties:
            fee_waiver_type:
              type: string
              minLength: 1
              maxLength: 10
              const: INFINITE
          required:
            - fee_waiver_type
    OptionalCover:
      type: string
      title: Optional Cover
      description: |
        Catalog of optional guarantees (covers) that may be attached to a contract.

          - `EXEMPTION_GUARANTEE`       : "Garanties Exonération"
          - `COMPLETION_GUARANTEE`      : "Garantie Bonne Fin"
          - `MORTALITY_TABLE_GUARANTEE` : "Garantie de Table"
          - `FLOOR_GUARANTEE`           : "Garantie Plancher"
          - `DEPENDENCY_GUARANTEE`      : "Garantie Dépendance"
          - `SPOUSE_ANNUITY_GUARANTEE`  : "Garantie Rentes de Conjoint"
      enum:
        - EXEMPTION_GUARANTEE
        - COMPLETION_GUARANTEE
        - MORTALITY_TABLE_GUARANTEE
        - FLOOR_GUARANTEE
        - DEPENDENCY_GUARANTEE
        - SPOUSE_ANNUITY_GUARANTEE
      example: EXEMPTION_GUARANTEE
    Amount:
      type: object
      title: Amount
      description: |
        Monetary amount represented as an integer value with a scale factor and currency.
        The actual decimal amount is computed as `value * 10^(-scale)`.
        For example, `{ "value": 12345, "scale": 2, "currency": "EUR" }` represents €123.45.
      properties:
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        scale:
          type: integer
          format: int32
          minimum: 0
          maximum: 9
          description: |
            The number of decimal places to apply to the value.
            The actual amount equals `value * 10^(-scale)`.
          example: 2
        value:
          type: integer
          format: int64
          minimum: -999999999999999
          maximum: 999999999999999
          description: The unscaled integer value of the amount.
          example: 12345
      required:
        - value
        - scale
        - currency
    CurrencyCode:
      type: string
      title: Currency Code
      description: |
        ISO 4217 currency code.

        - `EUR`: Euro
        - `USD`: US Dollar
        - `GBP`: British Pound Sterling
        - `CHF`: Swiss Franc
      enum:
        - EUR
        - USD
        - GBP
        - CHF
      example: EUR
    Rate:
      type: object
      title: Rate
      description: |
        A percentage with fixed precision of 2 decimals.
        The actual decimal percentage is computed as `value * 10^(-2)`.
        For example, `{ "value": 1050, "scale": 2 }` represents 10.50%.
      properties:
        scale:
          type: integer
          format: int32
          minimum: 2
          maximum: 2
          const: 2
          description: Fixed number of decimal places.
          examples:
            - 2
        value:
          type: integer
          format: int64
          minimum: 0
          maximum: 10000
          description: |
            The unscaled integer value of the percentage.
            Valid range: 0 to 10000, representing 0.00% to 100.00%.
          examples:
            - 0
            - 50
            - 1050
            - 10000
      required:
        - value
        - scale
      additionalProperties: false
      examples:
        - value: 0
          scale: 2
        - value: 1050
          scale: 2
        - value: 10000
          scale: 2
    PremiumBase:
      type: object
      title: Premium Base
      description: Shared domain properties for a one-time premium.
      properties:
        allocations:
          $ref: '#/components/schemas/PremiumAllocations'
        amount:
          $ref: '#/components/schemas/Amount'
          description: Premium amount paid by the client.
        payment_method_id:
          oneOf:
            - type: string
              format: uuid
              minLength: 36
              maxLength: 36
            - type: 'null'
          description: Payment method identifier used for this premium.
          example: 54512321-1234-5678-8901-234567890123
        type_of_fund_source:
          $ref: '#/components/schemas/TypeOfFundSource'
    PremiumKind:
      type: string
      title: Premium Kind
      description: |
        Nature of the premium, derived by the server from the parent contract's
        status at creation. Immutable.

        - `SUBSCRIPTION`: created while the parent contract was `DRAFT` or `SUBMITTED`. The premium only reaches `ACCEPTED`/`ACTIVE` once the contract reaches `ACCEPTED`.
        - `STANDALONE`: created while the parent contract was `ACCEPTED`. Approval of any backing `PREMIUM_PAYMENT` service request is sufficient to transition the premium to `ACCEPTED`/`ACTIVE`.
      enum:
        - SUBSCRIPTION
        - STANDALONE
      example: STANDALONE
    PremiumCreate:
      title: Premium Create
      description: |
        Payload for creating a new one-time premium. The premium's `kind`
        (`SUBSCRIPTION` or `STANDALONE`) is **not** declared by the partner:
        the server infers it from the parent contract's status at creation
        and exposes it as `readOnly` on the returned `PremiumResource`.
      allOf:
        - $ref: '#/components/schemas/PremiumBase'
        - type: object
          required:
            - amount
    PremiumUpdate:
      type: object
      title: Premium Update
      description: |
        Payload for editing an existing one-time premium **while the parent
        contract is in `DRAFT`** (i.e. premium status `DRAFT`).

        Every field is optional — only the keys present are updated. Server-
        managed fields (`id`, `contract_id`, `kind`, `status`, `requirements`)
        are not accepted here and remain controlled by the server. Once the
        parent contract is `SUBMITTED`, the endpoint returns `409 Conflict`
        with `incompatibleStatus`.
      properties:
        allocations:
          $ref: '#/components/schemas/PremiumAllocations'
        amount:
          $ref: '#/components/schemas/Amount'
          description: Premium amount paid by the client.
        payment_method_id:
          oneOf:
            - type: string
              format: uuid
              minLength: 36
              maxLength: 36
            - type: 'null'
          description: Payment method identifier used for this premium.
          example: 54512321-1234-5678-8901-234567890123
        type_of_fund_source:
          $ref: '#/components/schemas/TypeOfFundSource'
    PremiumResponse:
      title: Premium Response
      description: One-time premium response including server-managed read-only fields.
      allOf:
        - $ref: '#/components/schemas/PremiumBase'
        - type: object
          required:
            - id
            - contract_id
            - status
            - amount
            - kind
          properties:
            contract_id:
              description: Unique identifier for the associated contract.
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              example: 3c7d1f62-0f0a-4f6b-9b8c-0e3a3b1c0001
            id:
              description: Unique identifier for the Premium.
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              example: 1f1a8119-4e24-4460-a126-c79f8ed0017f
            kind:
              $ref: '#/components/schemas/PremiumKind'
              readOnly: true
            status:
              $ref: '#/components/schemas/PremiumStatus'
              readOnly: true
    PremiumResource:
      type: object
      title: Premium Resource
      description: |
        One-time premium resource with HAL links. Embeds a `service_requests`
        list under `_embedded` when the latest mutation triggered (or updated)
        one or more `PREMIUM_PAYMENT` reviews. The key is absent when no review
        is required.
      allOf:
        - $ref: '#/components/schemas/PremiumResponse'
        - type: object
          properties:
            _embedded:
              $ref: '#/components/schemas/PremiumResourceEmbedded'
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a one-time premium. Action links are
                    exposed conditionally on the current status.

                    | Relation | Method | Always present | Condition |
                    |---|---|---|---|
                    | `self` | GET | yes | — |
                    | `contract` | GET | yes | — |
                    | `payment_method` | GET | no | populated once `payment_method_id` is set |
                    | `update` | POST | no | status is `DRAFT` |
                    | `cancel` | POST | no | status is `DRAFT`, `SUBMITTED`, or `ACCEPTED` |
                  properties:
                    cancel:
                      $ref: '#/components/schemas/HalLink'
                      description: Action link to cancel the premium. Present when `status` is `DRAFT`, `SUBMITTED`, or `ACCEPTED`.
                    contract:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the parent contract.
                    payment_method:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the payment method used for this premium.
                    update:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to update the premium. Present only when `status: DRAFT`.'
                  required:
                    - contract
          required:
            - _links
    PremiumResourceEmbedded:
      title: Premium Resource Embedded
      description: |
        Embedded resources for a one-time Premium resource. Exposes a
        `service_requests` list when the latest mutation triggered (or
        updated) one or more `PREMIUM_PAYMENT` reviews. The key is absent when
        no review is required.
      readOnly: true
      maxProperties: 10
      additionalProperties: true
      allOf:
        - $ref: '#/components/schemas/WithServiceRequests'
    PremiumCollectionEmbedded:
      type: object
      title: Premium Collection Embedded
      description: Embedded resources for a one-time premium collection.
      properties:
        premiums:
          type: array
          maxItems: 100
          description: List of one-time premium resources.
          items:
            $ref: '#/components/schemas/PremiumResource'
      required:
        - premiums
    PremiumCollection:
      type: object
      title: Premium Collection
      description: Paginated collection of one-time premiums with HAL links and metadata.
      properties:
        _embedded:
          $ref: '#/components/schemas/PremiumCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
    PremiumStatus:
      type: string
      title: Premium Status
      description: |
        The current lifecycle status of a one-time premium.

        The first three states (`DRAFT`, `SUBMITTED`, `ACCEPTED`) **mirror the
        parent contract status**: as the contract progresses through its own
        lifecycle, every attached premium follows by cascade. The remaining
        states (`EXECUTED`, `CANCELLED`, `REJECTED`) are premium-specific
        terminal outcomes.

        - `DRAFT`: The parent contract is in `DRAFT`. The premium can still
          be edited via
          `POST /contracts/{contract_id}/one-time-premiums/{premium_id}`.
        - `SUBMITTED`: The parent contract has been submitted. Direct field
          updates are locked. The `CONTRACT_SUBSCRIPTION` service request
          drives the next transition.
        - `ACCEPTED`: The parent contract has been accepted. Buy/sell orders
          can be scheduled and the payment can be collected.
        - `EXECUTED`: Orders executed, payment collected, valuation event
          created.
        - `CANCELLED`: Premium cancelled (directly via
          `POST /contracts/{contract_id}/one-time-premiums/{premium_id}/cancel`,
          or by cascade when the parent contract is cancelled).
        - `REJECTED`: The backing `PREMIUM_PAYMENT` service request was
          rejected, or the parent contract's `CONTRACT_SUBSCRIPTION` was
          rejected.

        A backing `PREMIUM_PAYMENT` service request (for AML review) does
        **not** affect the premium's status — it is exposed separately under
        `_embedded.service_requests`. The premium can be in `ACCEPTED` while an
        AML review is still in flight; order execution is gated on the review
        being approved.
      readOnly: true
      enum:
        - DRAFT
        - SUBMITTED
        - ACCEPTED
        - EXECUTED
        - CANCELLED
        - REJECTED
      example: ACCEPTED
    PremiumAllocations:
      type: object
      title: Premium Allocations
      description: |
        Defines how the premium amount is distributed across investment supports.
        Two allocation strategies are available and can be combined:
        - **Free allocation** (`funds`): Manual selection of individual investment funds with explicit allocation rates.
        - **Managed allocation** (`preset_allocations`): Selection of predefined allocation profiles (managed portfolios) that automatically distribute the investment.

        The sum of all allocation rates (funds + preset allocations) must equal 100%.
      properties:
        funds:
          type: array
          maxItems: 50
          description: |
            List of individual fund allocations (free allocation strategy).
            Each entry specifies an investment fund and its allocation rate.
          items:
            $ref: '#/components/schemas/PremiumAllocationFunds'
        preset_allocations:
          type: array
          maxItems: 20
          description: |
            List of preset allocation profiles (managed allocation strategy).
            Each entry references a predefined portfolio with its allocation rate.
          items:
            $ref: '#/components/schemas/PremiumAllocationPreset'
    PremiumAllocationFunds:
      type: object
      title: Premium Allocation Funds
      description: Fund allocation details for the distribution of the net payment.
      properties:
        allocation_rate:
          $ref: '#/components/schemas/Rate'
          description: Allocation rate (between 0.0 and 1.0) of the net amount for this fund.
        fund_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Unique identifier of the investment fund/support.
          example: 3a7c1e2f-4b5d-6e8f-9a0b-1c2d3e4f5001
      required:
        - fund_id
        - allocation_rate
    PremiumAllocationPreset:
      type: object
      title: Premium Allocation Preset
      description: Preset allocation details for the distribution of the net payment.
      properties:
        allocation_rate:
          $ref: '#/components/schemas/Rate'
          description: Allocation rate (between 0.0 and 1.0) of the net amount for this preset allocation.
        preset_allocation_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Unique identifier of the preset allocation.
          example: 1f7a8119-4e24-44f0-a126-c79f8ed0017f
      required:
        - preset_allocation_id
        - allocation_rate
    PeriodicPremiumBase:
      type: object
      title: Periodic Premium Base
      description: Shared domain properties for a periodic (recurring) premium.
      properties:
        allocations:
          $ref: '#/components/schemas/PremiumAllocations'
        dates:
          $ref: '#/components/schemas/PeriodicPremiumDates'
        payment_method_id:
          oneOf:
            - type: string
              format: uuid
              minLength: 36
              maxLength: 36
            - type: 'null'
          description: Payment method identifier used for recurring collection.
          example: 54512321-1234-5678-8901-234567890123
        periodic_amount:
          $ref: '#/components/schemas/Amount'
          description: Amount for each periodic premium payment.
        periodicity:
          $ref: '#/components/schemas/Periodicity'
        type_of_fund_source:
          $ref: '#/components/schemas/TypeOfFundSource'
    Periodicity:
      type: string
      title: Periodicity
      description: |
        Frequency of recurring premium payments.

        - `MONTHLY`: payment due every month.
        - `QUARTERLY`: payment due every three months.
        - `SEMI_ANNUALLY`: payment due every six months.
        - `ANNUALLY`: payment due every year.
      enum:
        - MONTHLY
        - QUARTERLY
        - SEMI_ANNUALLY
        - ANNUALLY
      example: MONTHLY
    PeriodicPremiumCreate:
      title: Periodic Premium Create
      description: |
        Payload for creating a new periodic premium.

        - `kind` is **not** declared by the partner: the server infers it from
          the parent contract's status at creation and exposes it as `readOnly`
          on the returned `PeriodicPremiumResource`.
        - `date_of_start` is **optional**. When absent, the server defaults it
          at acceptance time to `max(date_of_effect, date_of_acceptance) + 30
          days` to honour the legal renunciation window.
        - Periodic premiums are **immutable** after creation. To change any
          field, cancel the existing premium and create a new one.
      allOf:
        - $ref: '#/components/schemas/PeriodicPremiumBase'
        - type: object
          required:
            - dates
            - periodic_amount
            - periodicity
    PeriodicPremiumUpdate:
      type: object
      title: Periodic Premium Update
      description: |
        Payload for editing an existing periodic premium **while the parent
        contract is in `DRAFT`** (i.e. premium status `DRAFT`).

        Every field is optional — only the keys present are updated. Server-
        managed fields (`id`, `contract_id`, `kind`, `status`, `requirements`)
        are not accepted here and remain controlled by the server. Once the
        parent contract is `SUBMITTED`, the endpoint returns `409 Conflict`
        with `incompatibleStatus`.
      properties:
        allocations:
          $ref: '#/components/schemas/PremiumAllocations'
        dates:
          $ref: '#/components/schemas/PeriodicPremiumDates'
        payment_method_id:
          oneOf:
            - type: string
              format: uuid
              minLength: 36
              maxLength: 36
            - type: 'null'
          description: Payment method identifier used for recurring collection.
          example: 54512321-1234-5678-8901-234567890123
        periodic_amount:
          $ref: '#/components/schemas/Amount'
          description: Amount for each periodic premium payment.
        periodicity:
          $ref: '#/components/schemas/Periodicity'
        type_of_fund_source:
          $ref: '#/components/schemas/TypeOfFundSource'
    PeriodicPremiumResponse:
      title: Periodic Premium Response
      description: Periodic premium response including server-managed read-only fields.
      allOf:
        - $ref: '#/components/schemas/PeriodicPremiumBase'
        - type: object
          required:
            - id
            - contract_id
            - status
            - dates
            - periodic_amount
            - periodicity
            - kind
          properties:
            contract_id:
              description: Unique identifier for the associated contract.
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              example: 3c7d1f62-0f0a-4f6b-9b8c-0e3a3b1c0001
            id:
              description: Unique identifier for the Periodic Premium.
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              example: a2b3c4d5-6e7f-8a9b-0c1d-2e3f4a5b6c7d
            kind:
              $ref: '#/components/schemas/PremiumKind'
              readOnly: true
            status:
              $ref: '#/components/schemas/PeriodicPremiumStatus'
              readOnly: true
    PeriodicPremiumResource:
      type: object
      title: Periodic Premium Resource
      description: |
        Periodic premium resource with HAL links. Embeds a `service_requests`
        list under `_embedded` when the latest mutation triggered (or updated)
        one or more `PREMIUM_PAYMENT` reviews. The key is absent when no review
        is required.
      allOf:
        - $ref: '#/components/schemas/PeriodicPremiumResponse'
        - type: object
          properties:
            _embedded:
              $ref: '#/components/schemas/PeriodicPremiumResourceEmbedded'
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: |
                    HAL navigation for a periodic premium. Action links
                    (`update`, `cancel`, `suspend`, `resume`) are exposed
                    conditionally on the current status.

                    | Relation | Method | Always present | Condition |
                    |---|---|---|---|
                    | `self` | GET | yes | — |
                    | `contract` | GET | yes | — |
                    | `payment_method` | GET | no | populated once `payment_method_id` is set |
                    | `update` | POST | no | status is `DRAFT` |
                    | `cancel` | POST | no | status is `DRAFT`, `SUBMITTED`, `ACCEPTED`, or `SUSPENDED` |
                    | `suspend` | POST | no | status is `ACCEPTED` |
                    | `resume` | POST | no | status is `SUSPENDED` |
                  properties:
                    cancel:
                      $ref: '#/components/schemas/HalLink'
                      description: Action link to cancel the periodic premium. Present when `status` is `DRAFT`, `SUBMITTED`, `ACCEPTED`, or `SUSPENDED`.
                    contract:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the parent contract.
                    payment_method:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the payment method used for this periodic premium.
                    resume:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to resume the periodic premium. Present only when `status: SUSPENDED`.'
                    suspend:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to suspend the periodic premium. Present only when `status: ACCEPTED`.'
                    update:
                      $ref: '#/components/schemas/HalLink'
                      description: 'Action link to update the periodic premium. Present only when `status: DRAFT`.'
                  required:
                    - contract
          required:
            - _links
    PeriodicPremiumResourceEmbedded:
      title: Periodic Premium Resource Embedded
      description: |
        Embedded resources for a Periodic Premium resource. Exposes a
        `service_requests` list when the latest mutation triggered (or
        updated) one or more `PREMIUM_PAYMENT` reviews. The key is absent when
        no review is required.
      readOnly: true
      maxProperties: 10
      additionalProperties: true
      allOf:
        - $ref: '#/components/schemas/WithServiceRequests'
    PeriodicPremiumCollectionEmbedded:
      type: object
      title: Periodic Premium Collection Embedded
      description: Embedded resources for a periodic premium collection.
      properties:
        periodic_premiums:
          type: array
          maxItems: 100
          description: List of periodic premium resources.
          items:
            $ref: '#/components/schemas/PeriodicPremiumResource'
      required:
        - periodic_premiums
    PeriodicPremiumCollection:
      type: object
      title: Periodic Premium Collection
      description: Paginated collection of periodic premiums with HAL links and metadata.
      properties:
        _embedded:
          $ref: '#/components/schemas/PeriodicPremiumCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
    PeriodicPremiumDates:
      type: object
      title: Periodic Premium Dates
      description: Key dates for periodic premium processing.
      properties:
        date_of_end:
          oneOf:
            - type: string
              format: date
              minLength: 10
              maxLength: 10
            - type: 'null'
          description: End date of the periodic premium schedule.
          example: 2030-12-31
        date_of_start:
          oneOf:
            - type: string
              format: date
              minLength: 10
              maxLength: 10
            - type: 'null'
          description: |
            First collection date of the periodic premium. Determines the initial debit date
            and serves as reference for subsequent recurring payments based on the defined frequency.

            Must be **after the legal renunciation period** — i.e. strictly later than the contract's
            acceptance date plus 30 days. This prevents a debit from being executed during the window
            in which the subscriber may renounce the contract (cf. `CONTRACT_RENUNCIATION` service
            request, accepted within the 30 days following contract acceptance). The partner is
            responsible for setting `date_of_start` accordingly; on a contract still in `DRAFT` or
            `SUBMITTED`, the partner must anticipate the acceptance date (typically `date_of_effect`
            or later) and add the 30-day buffer.
          example: 2026-02-01
    PeriodicPremiumStatus:
      type: string
      title: Periodic Premium Status
      description: |
        The current lifecycle status of a periodic premium.

        The first three states (`DRAFT`, `SUBMITTED`, `ACCEPTED`) **mirror the
        parent contract status**: as the contract progresses through its own
        lifecycle, every attached periodic premium follows by cascade. The
        remaining states (`SUSPENDED`, `CANCELLED`, `REJECTED`, `ENDED`) are
        premium-specific outcomes.

        - `DRAFT`: The parent contract is in `DRAFT`. The premium can still
          be edited via
          `POST /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}`.
        - `SUBMITTED`: The parent contract has been submitted. Direct field
          updates are locked. The `CONTRACT_SUBSCRIPTION` service request
          drives the next transition.
        - `ACCEPTED`: The parent contract has been accepted. Recurring
          payments are scheduled and collected per the configured periodicity.
        - `SUSPENDED`: Premium temporarily paused via `POST .../suspend`. Can
          be resumed via `POST .../resume` (returns to `ACCEPTED`).
        - `CANCELLED`: Premium cancelled via
          `POST /contracts/{contract_id}/periodic-premiums/{periodic_premium_id}/cancel`
          (allowed from `DRAFT`, `SUBMITTED`, `ACCEPTED`, or `SUSPENDED`).
          Also reached by cascade when the parent contract is cancelled.
        - `REJECTED`: The backing `PREMIUM_PAYMENT` service request was
          rejected, or the parent contract's `CONTRACT_SUBSCRIPTION` was
          rejected.
        - `ENDED`: Natural end of periodicity (`date_of_end` reached).

        A backing `PREMIUM_PAYMENT` service request (for AML review) does
        **not** affect the premium's status — it is exposed separately under
        `_embedded.service_requests`. The premium can be in `ACCEPTED` while an
        AML review is still in flight; recurring collection is gated on the
        review being approved.
      readOnly: true
      enum:
        - DRAFT
        - SUBMITTED
        - ACCEPTED
        - SUSPENDED
        - CANCELLED
        - REJECTED
        - ENDED
      example: ACCEPTED
    TypeOfFundSource:
      title: TypeOfFundSource
      type: string
      description: Source of funds used for this premium (own funds, reinvestment, community property, etc.).
      enum:
        - OWN_FUNDS
        - REINVESTMENT
        - COMMUNITY_PROPERTY
        - SEPARATE_PROPERTY
        - PROFESSIONAL_FUNDS
        - OTHER
      example: OWN_FUNDS
    ServiceRequestType:
      type: string
      title: Service Request Type
      description: |
        The type of service request driving a manual review.

        - `ADDRESS_CHANGE`: Change the policyholder's postal address.
        - `NAME_CHANGE`: Change the policyholder's name.
        - `FAMILY_STATUS_CHANGE`: Change the policyholder's family or marital status.
        - `BANK_ACCOUNT_CHANGE`: Change the bank account details associated with a contract.
        - `BENEFICIARY_CLAUSE_CHANGE`: Update a contract's beneficiary clause.
        - `CONTRACT_SUBSCRIPTION`: Internal review of a submitted contract. Created automatically by the server on `POST /contracts/{contract_id}/submit`. Absorbs the AML review of the subscription premium.
        - `CONTRACT_RENUNCIATION`: Withdraw a newly subscribed contract within the legal renunciation period. The only service request a partner can initiate explicitly on a contract.
        - `PREMIUM_PAYMENT`: Review of an additional premium payment (e.g., AML check on a high amount). Created automatically by the server when the partner posts a premium that triggers a review.
        - `SEPA_MANDATE_SIGNATURE`: Collection of the signed SEPA direct-debit mandate (mandat de prélèvement) for a newly created `SEPA_DEBIT` payment method. Created automatically by the server on `POST /individuals/{id}/payment-methods`.
      maxLength: 30
      minLength: 1
      enum:
        - ADDRESS_CHANGE
        - NAME_CHANGE
        - FAMILY_STATUS_CHANGE
        - BANK_ACCOUNT_CHANGE
        - CONTRACT_SUBSCRIPTION
        - PREMIUM_PAYMENT
        - BENEFICIARY_CLAUSE_CHANGE
        - CONTRACT_RENUNCIATION
        - SEPA_MANDATE_SIGNATURE
      example: PREMIUM_PAYMENT
    ServiceRequestStatus:
      type: string
      title: Service Request Status
      description: |
        Lifecycle status of a service request.

        - `REQUIRES_INFORMATION`: The request needs additional information or documents before review can proceed.
        - `UNDER_REVIEW`: The request is being reviewed by PACK Solutions.
        - `APPROVED`: The request was approved.
        - `REJECTED`: The request was rejected.
        - `CANCELLED`: The request was cancelled before completion.
        - `EXPIRED`: The request expired without resolution.
      maxLength: 30
      minLength: 1
      enum:
        - REQUIRES_INFORMATION
        - UNDER_REVIEW
        - APPROVED
        - REJECTED
        - CANCELLED
        - EXPIRED
      example: UNDER_REVIEW
    ServiceRequestSummary:
      type: object
      title: Service Request Summary
      description: |
        Embedded preview of a single service request — the strict minimum needed
        for navigation: id, type, status, and the HAL `self` link. The full request
        detail is obtained by following `_links.self`.
      properties:
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Unique identifier of the service request.
          example: 5b1a8119-4e24-4460-a126-c79f8ed0017f
        status:
          $ref: '#/components/schemas/ServiceRequestStatus'
        type:
          $ref: '#/components/schemas/ServiceRequestType'
      required:
        - id
        - type
        - status
        - _links
    DocumentRequirement:
      type: object
      title: Document Requirement
      description: |
        A document expected to satisfy a service request. Each requirement
        carries a machine-readable `code`, a human-readable `reason`, and the
        list of document types accepted to fulfil it.
      properties:
        accepted_document_types:
          type: array
          maxItems: 20
          description: |
            List of accepted `DocumentType` values from the shared catalog.
            Any of these can satisfy the requirement.
          items:
            $ref: '#/components/schemas/DocumentType'
          example:
            - PROOF_OF_ADDRESS
        code:
          type: string
          maxLength: 255
          minLength: 1
          pattern: ^[A-Za-z0-9._-]+$
          description: Machine-readable code identifying the requirement.
          example: address-change-proof
        reason:
          type: string
          maxLength: 1000
          minLength: 1
          description: Human-readable explanation of why the document is needed.
          example: A supporting document is required to update the postal address.
      required:
        - code
        - reason
        - accepted_document_types
    WithServiceRequests:
      type: object
      title: With Service Requests
      description: |
        Mixin merged (via `allOf`) into a resource's `_embedded` namespace.
        Contributes the list of service requests created or updated by the
        latest mutation on the parent resource. A single mutation may trigger
        several reviews at once (e.g. an individual update touching name,
        address and bank account), hence a list rather than a single entry.

        Conventions:
        - The key is **absent** from `_embedded` when no review is required.
        - When present, it is a non-empty list. Each entry exposes the strict
          minimum needed for navigation: id, type, status, and the HAL `self`
          link. The full request detail is obtained by following `_links.self`.
      properties:
        service_requests:
          type: array
          readOnly: true
          maxItems: 10
          description: |
            Embedded previews of the service requests created or updated by the
            latest mutation on the parent resource. Absent from `_embedded`
            when no review is required; otherwise a non-empty list.
          items:
            $ref: '#/components/schemas/ServiceRequestSummary'
    ServiceRequestResource:
      type: object
      title: Service Request Resource
      description: |
        Partner-facing read model for a service request. Returned by
        `GET /{parent}/{parent_id}/service-requests/{service_request_id}` on the
        Contract and Person APIs.

        Type-specific fields (e.g. `beneficiary_clause_draft`, `fund_origin`)
        are carried by per-API extensions composed via `allOf`.
      properties:
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - type: object
              description: HAL navigation links.
              properties:
                parent:
                  $ref: '#/components/schemas/HalLink'
        documents:
          type: array
          maxItems: 50
          readOnly: true
          description: Documents already attached to the service request.
          items:
            $ref: '#/components/schemas/AttachedDocument'
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          readOnly: true
          description: Unique identifier of the service request.
          example: 5b1a8119-4e24-4460-a126-c79f8ed0017f
        previous_outcome:
          oneOf:
            - $ref: '#/components/schemas/PreviousOutcome'
            - type: 'null'
          readOnly: true
          description: |
            Outcome of the previous version of the service request when the
            current one is the result of a `resubmit` action. `null` on the
            first submission.
        rejection_reasons:
          type: array
          maxItems: 50
          readOnly: true
          description: |
            Human-readable reasons returned when the service request is
            `REJECTED`. Empty array when not rejected.
          items:
            $ref: '#/components/schemas/RejectionReason'
        required_documents:
          type: array
          maxItems: 50
          readOnly: true
          description: Documents expected to fulfil the request.
          items:
            $ref: '#/components/schemas/DocumentRequirement'
        status:
          allOf:
            - $ref: '#/components/schemas/ServiceRequestStatus'
          readOnly: true
        type:
          allOf:
            - $ref: '#/components/schemas/ServiceRequestType'
          readOnly: true
        version:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
          readOnly: true
          description: |
            Incremented every time the service request is resubmitted after a
            rejection. The original submission is version `1`.
          example: 1
      required:
        - id
        - type
        - status
        - version
        - required_documents
        - documents
        - rejection_reasons
        - _links
    AttachedDocument:
      type: object
      title: Attached Document
      description: |
        A document already attached to a service request, with its type and the HAL
        `self` link to the document resource in the Document API.
      properties:
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
        document_type:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Document type as declared on upload.
          example: PROOF_OF_ADDRESS
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of the attached document (Document API).
          example: 6f1a6b9d-3f3f-4f31-a2d7-8d8dc2e90b55
      required:
        - id
        - document_type
    RejectionReason:
      type: object
      title: Rejection Reason
      description: |
        A single human-readable reason returned when a service request is `REJECTED`,
        paired with a machine-readable code.
      properties:
        code:
          type: string
          maxLength: 255
          minLength: 1
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable reason code.
          example: PROOF_OF_ADDRESS_ILLEGIBLE
        message:
          type: string
          maxLength: 1000
          minLength: 1
          description: Human-readable explanation.
          example: The submitted proof of address is illegible.
      required:
        - code
        - message
    PreviousOutcome:
      type: string
      title: Previous Outcome
      description: |
        Terminal outcome of the previous version of a service request before it
        was resubmitted. Only non-approved terminal states are tracked here —
        an approved request is never resubmitted.

        - `REJECTED`: The previous version was rejected by the reviewer.
        - `EXPIRED`: The previous version expired without resolution.
      enum:
        - REJECTED
        - EXPIRED
      example: REJECTED
    ContractRenounceRequest:
      type: object
      title: Contract Renounce Request
      description: |
        Optional request body for initiating a contract renunciation within the
        30-day legal renunciation window. All fields are optional.
      properties:
        reason:
          type: string
          description: Optional reason or notes provided by the partner for the renunciation.
          maxLength: 1000
    ContractRenounceResponse:
      type: object
      title: Contract Renounce Response
      description: |
        Confirmation that a `CONTRACT_RENUNCIATION` service request has been created.
        The full request lifecycle can be tracked via the Service Request API using
        the returned `service_request_id` or the `_links.service_request` navigation link.
      required:
        - service_request_id
        - status
        - _links
      properties:
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - type: object
              properties:
                service_request:
                  $ref: '#/components/schemas/HalLink'
                  description: Link to the full service request resource in the Service Request API.
              required:
                - service_request
        service_request_id:
          type: string
          format: uuid
          description: Identifier of the created `CONTRACT_RENUNCIATION` service request.
          minLength: 36
          maxLength: 36
        status:
          $ref: '#/components/schemas/ServiceRequestStatus'
          description: Initial status of the service request (`REQUIRES_INFORMATION` or `UNDER_REVIEW`).
    DocumentReference:
      type: object
      title: Document Reference
      description: |
        Lightweight reference to a document: its identifier plus its type.
      properties:
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of the referenced document.
          example: 6f1a6b9d-7c23-4f11-ae82-90b3c5d8e14a
        type:
          description: Type of the referenced document, from the shared `DocumentType` catalog.
          allOf:
            - $ref: '#/components/schemas/DocumentType'
          example: PROOF_OF_ADDRESS
      required:
        - id
        - type
  parameters:
    ContractId:
      name: contract_id
      in: path
      required: true
      description: The ID of the contract.
      schema:
        type: string
