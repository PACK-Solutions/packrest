    PeriodicPremiumDateOfStartUnprocessable:
      summary: Periodic premium date_of_start falls within the legal renunciation period
      value:
        type: https://api.pack-solutions.com/problems/date-of-start-within-renunciation-period
        title: Unprocessable Entity
        status: 422
        detail: The periodic premium cannot be created because `date_of_start` falls within or before the legal renunciation period. The first collection date must be strictly later than the contract's acceptance date plus 30 days, to avoid a debit being executed during the window in which the subscriber may renounce the contract.
        instance: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f/periodic-premiums
        errors:
          - code: OUT_OF_RANGE
            detail: '`date_of_start` must be strictly after the legal renunciation period (`date_of_acceptance + 30 days`). Contract was accepted on 2026-04-01; earliest valid `date_of_start` is 2026-05-02. Received: 2026-04-15.'
            pointer: /dates/date_of_start
    UnprocessableSubmitMissingSubscriber:
      summary: Submit blocked — subscriber_id missing on the contract
      value:
        type: https://pack-solutions.com/probs/unprocessable-entity
        title: Unprocessable Entity
        status: 422
        detail: The contract cannot be submitted because `subscriber_id` is missing. Patch the contract via `POST /contracts/{contract_id}` with a valid `subscriber_id` (the referenced person must be in `SUBMITTED` or `ENGAGED` status at submission time) and retry.
        instance: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f/submit
        errors:
          - code: MISSING_FIELD
            detail: '`subscriber_id` is required at submission time. The referenced person must be in `SUBMITTED` or `ENGAGED` status.'
            pointer: /subscriber_id
    UnprocessableSubmitMissingFields:
      summary: Submit blocked — multiple required fields missing on the contract
      value:
        type: https://pack-solutions.com/probs/unprocessable-entity
        title: Unprocessable Entity
        status: 422
        detail: The contract cannot be submitted because required fields are missing. Patch the contract via `POST /contracts/{contract_id}` to set the missing values and retry.
        instance: /contracts/3f3a8119-4e24-4460-a126-c79f8ed0017f/submit
        errors:
          - code: MISSING_FIELD
            detail: '`subscriber_id` is required at submission time. The referenced person must be in `SUBMITTED` or `ENGAGED` status.'
            pointer: /subscriber_id
          - code: MISSING_FIELD
            detail: '`date_of_effect` is required at submission time.'
            pointer: /date_of_effect
    BadRequestCreateMissingProduct:
      summary: Create blocked — product_id missing from the request body
      value:
        type: https://pack-solutions.com/probs/bad-request
        title: Bad Request
        status: 400
        detail: 'The create payload violates the `ContractCreate` schema: `product_id` is required and was not provided.'
        instance: /contracts
        errors:
          - code: MISSING_FIELD
            detail: '`product_id` is required to create a contract.'
