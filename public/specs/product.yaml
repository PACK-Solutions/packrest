openapi: 3.1.2
info:
  title: Product Catalog API
  description: |
    # Overview
    The Product Catalog API exposes the product offering of Pack Solutions:
    **products**, **funds** and **preset-allocations** (allocation grids). It is
    a read-oriented, resource-oriented REST API. The only mutating operation is
    the reservation of a contract number for a product.

    ## Core Concepts

    ### Versioning
    **Products** and **preset-allocations** are versioned. A resource keeps a
    stable `id` across all its versions, while `version_number` (sequential) and
    the application period (`effective_from` / `effective_to`) identify a single
    version. **Funds** are global and not versioned.

    ### Current version resolution
    A version applies at an instant when
    `effective_from <= instant < effective_to`, or when `effective_to` is
    `null` (open-ended). `GET /products/{id}` and
    `GET /preset-allocations/{id}` return the version applicable at the current
    server time. Pass `?effective_at=<ISO 8601>` to resolve the version
    applicable at another date.

    ### Non-overlapping application periods
    Within a single product — and within a single preset-allocation — the
    application periods of the versions never overlap. This is a server-enforced
    invariant: version creation happens out of band (back office), so at most one
    version is applicable at any instant.

    ### Preset-allocations of a product
    `GET /products/{id}/preset-allocations` (and its versioned variant) returns
    HAL **references** to the preset-allocations available for the product, not
    their full bodies. A preset-allocation with no version applicable at the
    current date is omitted, so the embedded list may be empty.

    ### Management modes
    Funds are offered under two management modes:

    - **Self-directed management** (*gestion libre*) — the subscriber freely
      selects funds. `GET /products/{id}/funds` lists exactly the funds eligible
      for this mode (including the euro fund when applicable).
    - **Discretionary management** (*gestion pilotée*) — investments follow a
      predefined allocation grid managed on the subscriber's behalf. These funds
      are not returned by `/products/{id}/funds`; they are the funds referenced
      by the fund-allocation lines of the product's preset-allocations
      (`GET /preset-allocations/{id}/fund-allocations`).

    ## Security and Authentication
    The API is secured using **OAuth 2.0** (Client Credentials flow). Clients
    obtain an access token and send it as a Bearer token.

    ### Scopes
    - `products:read`: read-only access. Required for all `GET` operations.
    - `products:write`: write access. Required for the contract-number
      reservation.

    ## Navigation & HAL
    Responses follow **HAL** principles: resources and collections carry a
    `_links` object for navigation, and collections embed their items under
    `_embedded`.
  version: 0.0.59
  contact:
    email: support@pack-solutions.com
    name: Pack Solutions Support
  license:
    name: Proprietary
    url: https://pack-solutions.com/license
security:
  - oauth2:
      - products:read
      - products:write
tags:
  - name: product
    description: |
      Versioned products. Browse products, resolve their current version,
      navigate their version history, eligible funds and preset-allocations,
      and reserve contract numbers.
  - name: fund
    description: |
      Global, non-versioned funds. A classic fund carries a standard ISIN; the
      euro fund is identified by the reserved ISIN value `EURO`.
  - name: preset-allocation
    description: |
      Versioned preset-allocations (allocation grids). Browse grids, resolve
      their current version, navigate their version history and fund-allocation
      lines.
paths:
  /products:
    get:
      operationId: listProducts
      summary: List Products
      description: |
        Returns a paginated list of products. By default each product is returned
        in its **current version** — the version whose application period contains
        the resolved date (`effective_from <= effective_at < effective_to`, or
        `effective_to` is null). Use `effective_at` to resolve versions at another
        date. Optional filters narrow the result by code or tax-wrapper attributes.
      parameters:
        - $ref: '#/components/parameters/ProductCode'
        - $ref: '#/components/parameters/TaxWrapperTypeFilter'
        - $ref: '#/components/parameters/PreferentialTaxRegimeFilter'
        - $ref: '#/components/parameters/EffectiveAt'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of products.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}:
    get:
      operationId: getProduct
      summary: Get Product
      description: |
        Returns a product in its **current version** — the version applicable at
        the resolved date (`effective_from <= effective_at < effective_to`, or
        `effective_to` is null). Use `effective_at` to resolve the version
        applicable at another date.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/EffectiveAt'
      responses:
        '200':
          description: The product version applicable at the resolved date.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/versions:
    get:
      operationId: listProductVersions
      summary: List Product Versions
      description: |
        Returns the paginated version history of a product, ordered by
        `version_number`. Application periods never overlap across versions of the
        same product. Optionally restrict the result to versions whose application
        period intersects the `[effective_from, effective_to]` window.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/EffectiveFrom'
        - $ref: '#/components/parameters/EffectiveTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated version history of the product.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/versions/{version_number}:
    get:
      operationId: getProductVersion
      summary: Get Product Version
      description: Returns a specific version of a product, identified by its sequential `version_number`.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: The requested product version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/funds:
    get:
      operationId: listProductFunds
      summary: List Product Funds
      description: |
        Returns the funds eligible for **self-directed management** (*gestion
        libre*) on the **current version** of the product — i.e. the funds a
        subscriber may freely select themselves (including the euro fund when
        applicable). Funds used in discretionary management (*gestion pilotée*) are
        not listed here; those are the funds referenced by the fund-allocation lines
        of the product's preset-allocations
        (`GET /preset-allocations/{preset_allocation_id}/fund-allocations`). The
        current version is the one applicable at the current server time.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Funds eligible for the current product version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductFunds'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/versions/{version_number}/funds:
    get:
      operationId: listProductVersionFunds
      summary: List Product Version Funds
      description: |
        Returns the funds eligible for **self-directed management** (*gestion
        libre*) on a specific version of the product — the funds a subscriber may
        freely select themselves. Funds used in discretionary management (*gestion
        pilotée*) are not listed here; those are exposed through the fund-allocation
        lines of the product's preset-allocations.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: Funds eligible for the requested product version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductFunds'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/preset-allocations:
    get:
      operationId: listProductPresetAllocations
      summary: List Product Preset Allocations
      description: |
        Returns HAL references to the preset-allocations available for the
        **current version** of the product. Only preset-allocations that have a
        version applicable at the current date are returned; a preset-allocation
        with no applicable version is omitted, so the embedded list may be empty.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: References to the applicable preset-allocations of the current product version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductPresetAllocations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/versions/{version_number}/preset-allocations:
    get:
      operationId: listProductVersionPresetAllocations
      summary: List Product Version Preset Allocations
      description: |
        Returns HAL references to the preset-allocations available for a specific
        version of the product. Only preset-allocations that have a version
        applicable at the current date are returned; a preset-allocation with no
        applicable version is omitted, so the embedded list may be empty.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: References to the applicable preset-allocations of the requested product version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ProductPresetAllocations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - product
  /products/{product_id}/contract-number-reservations:
    post:
      operationId: createContractNumberReservation
      summary: Reserve a Contract Number
      description: |
        Reserves and returns a contract number unique within the product. The
        server mints the `contract_number`; no request body is required. Uniqueness
        is guaranteed per product, not globally.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '201':
          description: Contract-number reservation created.
          headers:
            Location:
              description: URI of the created reservation.
              schema:
                type: string
                format: uri-reference
                maxLength: 2048
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ContractNumberReservationResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - products:write
      tags:
        - product
  /funds:
    get:
      operationId: listFunds
      summary: List Funds
      description: |
        Returns a paginated list of funds. Funds are global and not versioned.
        Filter by `isin` to look up a single fund (including the euro fund, ISIN
        `EURO`).
      parameters:
        - $ref: '#/components/parameters/Isin'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of funds.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FundCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - fund
  /funds/{fund_id}:
    get:
      operationId: getFund
      summary: Get Fund
      description: Returns a single fund by its identifier.
      parameters:
        - $ref: '#/components/parameters/FundId'
      responses:
        '200':
          description: The requested fund.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FundResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - fund
  /preset-allocations:
    get:
      operationId: listPresetAllocations
      summary: List Preset Allocations
      description: |
        Returns a paginated list of preset-allocations. By default each is returned
        in its **current version** — the version applicable at the resolved date
        (`effective_from <= effective_at < effective_to`, or `effective_to` is
        null). Use `effective_at` to resolve versions at another date. Filter by
        risk profile and/or strategy.
      parameters:
        - $ref: '#/components/parameters/RiskProfileFilter'
        - $ref: '#/components/parameters/StrategyFilter'
        - $ref: '#/components/parameters/EffectiveAt'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of preset-allocations.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PresetAllocationCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - preset-allocation
  /preset-allocations/{preset_allocation_id}:
    get:
      operationId: getPresetAllocation
      summary: Get Preset Allocation
      description: |
        Returns a preset-allocation in its **current version** — the version
        applicable at the resolved date (`effective_from <= effective_at <
        effective_to`, or `effective_to` is null). Use `effective_at` to resolve
        the version applicable at another date.
      parameters:
        - $ref: '#/components/parameters/PresetAllocationId'
        - $ref: '#/components/parameters/EffectiveAt'
      responses:
        '200':
          description: The preset-allocation version applicable at the resolved date.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PresetAllocationResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - preset-allocation
  /preset-allocations/{preset_allocation_id}/versions:
    get:
      operationId: listPresetAllocationVersions
      summary: List Preset Allocation Versions
      description: |
        Returns the paginated version history of a preset-allocation, ordered by
        `version_number`. Application periods never overlap across versions of the
        same preset-allocation. Optionally restrict to versions whose application
        period intersects the `[effective_from, effective_to]` window.
      parameters:
        - $ref: '#/components/parameters/PresetAllocationId'
        - $ref: '#/components/parameters/EffectiveFrom'
        - $ref: '#/components/parameters/EffectiveTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated version history of the preset-allocation.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PresetAllocationCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - preset-allocation
  /preset-allocations/{preset_allocation_id}/versions/{version_number}:
    get:
      operationId: getPresetAllocationVersion
      summary: Get Preset Allocation Version
      description: Returns a specific version of a preset-allocation, identified by its sequential `version_number`.
      parameters:
        - $ref: '#/components/parameters/PresetAllocationId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: The requested preset-allocation version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PresetAllocationResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - preset-allocation
  /preset-allocations/{preset_allocation_id}/fund-allocations:
    get:
      operationId: listPresetAllocationFundAllocations
      summary: List Preset Allocation Fund Allocations
      description: |
        Returns the fund-allocation lines of the **current version** of the
        preset-allocation. Each line binds a fund to a weight; weights are expected
        to sum to 100%. These funds are the ones used in **discretionary management**
        (*gestion pilotée*) — the allocation grid is managed on the subscriber's
        behalf — as opposed to the self-directed funds (*gestion libre*) returned by
        `GET /products/{product_id}/funds`.
      parameters:
        - $ref: '#/components/parameters/PresetAllocationId'
      responses:
        '200':
          description: Fund-allocation lines of the current preset-allocation version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FundAllocations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - preset-allocation
  /preset-allocations/{preset_allocation_id}/versions/{version_number}/fund-allocations:
    get:
      operationId: listPresetAllocationVersionFundAllocations
      summary: List Preset Allocation Version Fund Allocations
      description: |
        Returns the fund-allocation lines of a specific version of the
        preset-allocation. These funds are used in **discretionary management**
        (*gestion pilotée*), as opposed to the self-directed funds (*gestion libre*)
        returned by `GET /products/{product_id}/funds`.
      parameters:
        - $ref: '#/components/parameters/PresetAllocationId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: Fund-allocation lines of the requested preset-allocation version.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/FundAllocations'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - preset-allocation
components:
  schemas:
    ProductBase:
      type: object
      title: ProductBase
      description: |
        Domain properties of a product version. A product is versioned: its stable
        `id` is shared across versions, while `version_number` and the application
        period (`effective_from` / `effective_to`) identify a single version.
        Application periods never overlap within the same product (server-enforced
        invariant — version creation happens out of band).
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          pattern: ^[A-Z0-9_]+$
          description: Functional code of the product. Unique across products and stable across versions.
          example: SWVIE
        effective_from:
          type: string
          format: date-time
          minLength: 20
          maxLength: 35
          description: Start of the application period of this version (inclusive), ISO 8601.
          example: 2026-01-01T00:00:00Z
        effective_to:
          oneOf:
            - type: string
              format: date-time
              minLength: 20
              maxLength: 35
            - type: 'null'
          description: |
            End of the application period of this version (exclusive), ISO 8601.
            `null` means the version is open-ended and applies indefinitely from
            `effective_from`.
          example: null
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Human-readable product name.
          example: Switche Vie by Carac
        tax_wrapper:
          $ref: '#/components/schemas/TaxWrapper'
        version_number:
          type: integer
          format: int32
          minimum: 1
          maximum: 100000
          description: Sequential version number of the product. Increases by one at each new version.
          example: 2
    Product:
      type: object
      title: Product
      description: A persisted product version, including its server-generated identifier.
      allOf:
        - $ref: '#/components/schemas/ProductBase'
        - type: object
          required:
            - id
            - code
            - name
            - version_number
            - effective_from
            - tax_wrapper
          properties:
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Stable, server-generated identifier of the product. Identical across all versions of the product.
              example: 019eb600-25f6-77a4-b6c5-a88d54ead9d9
    ProductResource:
      type: object
      title: Product Resource
      description: |
        Product version read model with HAL links. Returned by single-product and
        product-version read operations. Navigation links point to the version list,
        the eligible funds and the eligible preset-allocations of this product.
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: HAL navigation links for a product version.
                  properties:
                    funds:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the funds eligible for this product version.
                    preset_allocations:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the preset-allocations available for this product version.
                    versions:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the version history of this product.
                  required:
                    - versions
                    - funds
                    - preset_allocations
          required:
            - _links
      examples:
        - $ref: '#/components/examples/ProductResource'
    ProductCollection:
      type: object
      title: Product Collection
      description: Paginated collection of product versions with HAL links and pagination metadata.
      properties:
        _embedded:
          $ref: '#/components/schemas/ProductCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
      examples:
        - $ref: '#/components/examples/ProductCollection'
    ProductCollectionEmbedded:
      type: object
      title: Product Collection Embedded
      description: Embedded resources for a product collection.
      properties:
        products:
          type: array
          maxItems: 100
          description: List of product version resources.
          items:
            $ref: '#/components/schemas/ProductResource'
      required:
        - products
    TaxWrapper:
      type: object
      title: TaxWrapper
      description: Enveloppe fiscale (tax wrapper) d'un produit, avec son type et ses régimes fiscaux préférentiels optionnels.
      properties:
        preferential_tax_regime:
          type: array
          maxItems: 10
          description: Régimes fiscaux préférentiels accordés en complément du type d'enveloppe fiscale.
          items:
            $ref: '#/components/schemas/PreferentialTaxRegime'
        type:
          $ref: '#/components/schemas/TaxWrapperType'
      required:
        - type
      example:
        type: ASSURANCE_VIE
        preferential_tax_regime:
          - EPARGNE_HANDICAP
    TaxWrapperType:
      type: string
      title: TaxWrapperType
      description: |
        Type d'enveloppe fiscale (tax wrapper) d'un produit.
        - `PER_INDIVIDUEL` : Plan d'Épargne Retraite individuel.
        - `PER_OBLIGATOIRE` : Plan d'Épargne Retraite obligatoire.
        - `PERE_COLLECTIF` : Plan d'Épargne Retraite d'Entreprise collectif.
        - `ASSURANCE_VIE` : Assurance Vie.
        - `ARTICLE_82` : Article 82 (retraite supplémentaire).
        - `PEA` : Plan d'Épargne en Actions.
        - `IFC` : Indemnités de Fin de Carrière.
        - `ARTICLE_39` : Article 39 (retraite à prestations définies).
        - `MADELIN` : Contrat Madelin (retraite/prévoyance des travailleurs non salariés).
        - `PERP` : Plan d'Épargne Retraite Populaire.
        - `ARTICLE_83` : Article 83 (retraite supplémentaire à cotisations définies).
      enum:
        - PER_INDIVIDUEL
        - PER_OBLIGATOIRE
        - PERE_COLLECTIF
        - ARTICLE_39_A_DROITS_CERTAINS
        - ASSURANCE_VIE
        - ARTICLE_82
        - PEA
        - IFC
        - ARTICLE_39
        - MADELIN
        - PERP
        - ARTICLE_83
      example: ASSURANCE_VIE
    PreferentialTaxRegime:
      type: string
      title: PreferentialTaxRegime
      description: |
        Régime fiscal préférentiel pouvant s'appliquer à l'enveloppe fiscale d'un produit.
        - `PEP` : Plan d'Épargne Populaire.
        - `DSK` : Dispositif DSK.
        - `NSK` : Dispositif NSK.
        - `EPARGNE_HANDICAP` : Épargne Handicap.
      enum:
        - PEP
        - DSK
        - NSK
        - EPARGNE_HANDICAP
      example: PEP
    ProductPresetAllocations:
      type: object
      title: Product Preset Allocations
      description: |
        HAL envelope listing the preset-allocations available for a product version,
        as references only. Only preset-allocations that have a version applicable at
        the current date are listed; those without an applicable version are omitted,
        so the list may be empty.
      properties:
        _embedded:
          $ref: '#/components/schemas/ProductPresetAllocationsEmbedded'
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
      required:
        - _embedded
        - _links
      examples:
        - $ref: '#/components/examples/ProductPresetAllocations'
        - $ref: '#/components/examples/ProductPresetAllocationsEmpty'
    ProductPresetAllocationsEmbedded:
      type: object
      title: Product Preset Allocations Embedded
      description: Embedded preset-allocation references for a product version.
      properties:
        preset_allocations:
          type: array
          maxItems: 100
          description: References to the preset-allocations applicable for the product version. Empty when none apply at the resolved date.
          items:
            $ref: '#/components/schemas/PresetAllocationRef'
      required:
        - preset_allocations
    PresetAllocationRef:
      type: object
      title: Preset Allocation Reference
      description: |
        Minimal HAL reference to a preset-allocation, exposing only its stable
        identifier and a self link. Used inside a product's preset-allocation list,
        where full preset-allocation bodies are intentionally not inlined.
      properties:
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
        id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          readOnly: true
          description: Stable identifier of the referenced preset-allocation.
          example: 019eb600-3e4b-7686-8c8f-616a1fc4ed93
      required:
        - id
        - _links
    ProductFunds:
      type: object
      title: Product Funds
      description: HAL envelope listing the funds eligible for a product version.
      properties:
        _embedded:
          $ref: '#/components/schemas/ProductFundsEmbedded'
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
      required:
        - _embedded
        - _links
      examples:
        - $ref: '#/components/examples/ProductFunds'
    ProductFundsEmbedded:
      type: object
      title: Product Funds Embedded
      description: Embedded fund resources eligible for a product version.
      properties:
        funds:
          type: array
          maxItems: 1000
          description: Funds eligible for the product version, including the euro fund when applicable.
          items:
            $ref: '#/components/schemas/FundResource'
      required:
        - funds
    FundBase:
      type: object
      title: FundBase
      description: |
        Domain properties of a fund. Funds are global and not versioned. A classic
        fund carries a standard ISIN; the euro fund is also a fund, identified by the
        reserved ISIN value `EURO`.
      properties:
        isin:
          type: string
          minLength: 4
          maxLength: 12
          pattern: ^(EURO|[A-Z0-9]{12})$
          description: Fund identifier. A standard ISO 6166 ISIN, or the reserved value `EURO` for the euro fund. Unique across funds.
          example: FR0010315770
        name:
          type: string
          minLength: 1
          maxLength: 140
          description: Human-readable fund name.
          example: Carac Profil Dynamique
    Fund:
      type: object
      title: Fund
      description: A persisted fund, including its server-generated identifier.
      allOf:
        - $ref: '#/components/schemas/FundBase'
        - type: object
          required:
            - id
            - isin
            - name
          properties:
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Server-generated unique identifier of the fund.
              example: 019eb600-5a2c-7c10-9f4e-2b9d1e7a6c44
    FundResource:
      type: object
      title: Fund Resource
      description: Fund read model with HAL self link.
      allOf:
        - $ref: '#/components/schemas/Fund'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/HalSelfLinks'
          required:
            - _links
      examples:
        - $ref: '#/components/examples/FundResource'
    FundCollection:
      type: object
      title: Fund Collection
      description: Paginated collection of funds with HAL links and pagination metadata.
      properties:
        _embedded:
          $ref: '#/components/schemas/FundCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
      examples:
        - $ref: '#/components/examples/FundCollection'
    FundCollectionEmbedded:
      type: object
      title: Fund Collection Embedded
      description: Embedded resources for a fund collection.
      properties:
        funds:
          type: array
          maxItems: 100
          description: List of fund resources.
          items:
            $ref: '#/components/schemas/FundResource'
      required:
        - funds
    PresetAllocationBase:
      type: object
      title: PresetAllocationBase
      description: |
        Domain properties of a preset-allocation (allocation grid) version. A
        preset-allocation is versioned: its stable `id` is shared across versions,
        while `version_number` and the application period identify a single version.
        Application periods never overlap within the same preset-allocation
        (server-enforced invariant — version creation happens out of band).
      properties:
        effective_from:
          type: string
          format: date-time
          minLength: 20
          maxLength: 35
          description: Start of the application period of this version (inclusive), ISO 8601.
          example: 2026-01-01T00:00:00Z
        effective_to:
          oneOf:
            - type: string
              format: date-time
              minLength: 20
              maxLength: 35
            - type: 'null'
          description: End of the application period of this version (exclusive), ISO 8601. `null` means open-ended.
          example: null
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Human-readable name of the allocation grid.
          example: Allocation dynamique convaincu
        risk_profile:
          $ref: '#/components/schemas/RiskProfile'
        strategy:
          $ref: '#/components/schemas/Strategy'
        version_number:
          type: integer
          format: int32
          minimum: 1
          maximum: 100000
          description: Sequential version number of the preset-allocation.
          example: 1
    PresetAllocation:
      type: object
      title: PresetAllocation
      description: A persisted preset-allocation version, including its server-generated identifier.
      allOf:
        - $ref: '#/components/schemas/PresetAllocationBase'
        - type: object
          required:
            - id
            - version_number
            - risk_profile
            - strategy
            - name
            - effective_from
          properties:
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Stable, server-generated identifier of the preset-allocation. Identical across all its versions.
              example: 019eb600-3e4b-7686-8c8f-616a1fc4ed93
    PresetAllocationResource:
      type: object
      title: Preset Allocation Resource
      description: Preset-allocation version read model with HAL links to its version history and fund-allocation lines.
      allOf:
        - $ref: '#/components/schemas/PresetAllocation'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: HAL navigation links for a preset-allocation version.
                  properties:
                    fund_allocations:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the fund-allocation lines of this preset-allocation version.
                    versions:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the version history of this preset-allocation.
                  required:
                    - versions
                    - fund_allocations
          required:
            - _links
      examples:
        - $ref: '#/components/examples/PresetAllocationResource'
    PresetAllocationCollection:
      type: object
      title: Preset Allocation Collection
      description: Paginated collection of preset-allocation versions with HAL links and pagination metadata.
      properties:
        _embedded:
          $ref: '#/components/schemas/PresetAllocationCollectionEmbedded'
        _links:
          allOf:
            - $ref: '#/components/schemas/HalSelfLinks'
            - $ref: '#/components/schemas/HalPaginationLinks'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - _embedded
        - _links
        - page
      examples:
        - $ref: '#/components/examples/PresetAllocationCollection'
    PresetAllocationCollectionEmbedded:
      type: object
      title: Preset Allocation Collection Embedded
      description: Embedded resources for a preset-allocation collection.
      properties:
        preset_allocations:
          type: array
          maxItems: 100
          description: List of preset-allocation version resources.
          items:
            $ref: '#/components/schemas/PresetAllocationResource'
      required:
        - preset_allocations
    RiskProfile:
      type: string
      title: RiskProfile
      description: |
        Risk profile of a preset-allocation. Free-form value issued from product
        configuration (server-validated), not a closed vocabulary. Observed values
        include `PRUDENT`, `EQUILIBRE` and `DYNAMIQUE`.
      minLength: 1
      maxLength: 30
      pattern: ^[A-Z0-9_]+$
      example: DYNAMIQUE
    Strategy:
      type: string
      title: Strategy
      description: |
        Management strategy of a preset-allocation. Free-form value issued from
        product configuration (server-validated), not a closed vocabulary. Observed
        values include `CONVAINCU`, `CURIEUX`, `DETERMINE`, `ENGAGE` and `LIV`.
      minLength: 1
      maxLength: 30
      pattern: ^[A-Z0-9_]+$
      example: CONVAINCU
    FundAllocation:
      type: object
      title: FundAllocation
      description: |
        A single line of an allocation grid, binding a fund to a weight. Embedded
        value object: it has no own identifier and no self link.
      properties:
        fund_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Identifier of the allocated fund.
          example: 019eb600-5a2c-7c10-9f4e-2b9d1e7a6c44
        weight:
          $ref: '#/components/schemas/Rate'
          description: |
            Share of the grid allocated to the fund, expressed as a percentage.
            The weights of a grid sum to 100%.
      required:
        - fund_id
        - weight
    FundAllocations:
      type: object
      title: Fund Allocations
      description: HAL envelope listing the fund-allocation lines of a preset-allocation version.
      properties:
        _embedded:
          $ref: '#/components/schemas/FundAllocationsEmbedded'
        _links:
          $ref: '#/components/schemas/HalSelfLinks'
      required:
        - _embedded
        - _links
      examples:
        - $ref: '#/components/examples/FundAllocations'
    FundAllocationsEmbedded:
      type: object
      title: Fund Allocations Embedded
      description: Embedded fund-allocation lines of a preset-allocation version.
      properties:
        fund_allocations:
          type: array
          maxItems: 1000
          description: Allocation lines binding funds to weights. Weights are expected to sum to 100%.
          items:
            $ref: '#/components/schemas/FundAllocation'
      required:
        - fund_allocations
    ContractNumberReservationBase:
      type: object
      title: ContractNumberReservationBase
      description: Domain properties of a contract-number reservation minted for a product.
      properties:
        contract_number:
          type: string
          minLength: 1
          maxLength: 32
          pattern: ^[A-Z0-9-]+$
          readOnly: true
          description: Reserved contract number, unique within the product.
          example: SWVIE-000123
        created_at:
          type: string
          format: date-time
          minLength: 20
          maxLength: 35
          readOnly: true
          description: Timestamp at which the reservation was created, ISO 8601.
          example: 2026-06-29T10:15:30Z
        product_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          readOnly: true
          description: Identifier of the product the reservation belongs to.
          example: 019eb600-25f6-77a4-b6c5-a88d54ead9d9
    ContractNumberReservation:
      type: object
      title: ContractNumberReservation
      description: A persisted contract-number reservation, including its server-generated identifier.
      allOf:
        - $ref: '#/components/schemas/ContractNumberReservationBase'
        - type: object
          required:
            - id
            - product_id
            - contract_number
            - created_at
          properties:
            id:
              type: string
              format: uuid
              minLength: 36
              maxLength: 36
              readOnly: true
              description: Server-generated unique identifier of the reservation.
              example: 019eb601-7a1d-7f22-bc33-44ad90fe1122
    ContractNumberReservationResource:
      type: object
      title: Contract Number Reservation Resource
      description: Contract-number reservation read model with HAL links to itself and its product.
      allOf:
        - $ref: '#/components/schemas/ContractNumberReservation'
        - type: object
          properties:
            _links:
              allOf:
                - $ref: '#/components/schemas/HalSelfLinks'
                - type: object
                  description: HAL navigation links for a contract-number reservation.
                  properties:
                    product:
                      $ref: '#/components/schemas/HalLink'
                      description: Link to the product the reservation belongs to.
                  required:
                    - product
          required:
            - _links
      examples:
        - $ref: '#/components/examples/ContractNumberReservationResource'
    HalLink:
      type: object
      title: HalLink
      description: |
        HAL link object. Minimal shape: an `href` (URI of the linked resource)
        and the `method` to use when following it. Navigation and pagination
        relations use `GET`; action relations use `POST` (or `DELETE` for
        resource removal). The project does not use `PUT` or `PATCH`.
      additionalProperties: false
      required:
        - href
        - method
      properties:
        href:
          type: string
          format: uri-reference
          maxLength: 2048
          description: URI of the linked resource.
          example: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
        method:
          $ref: '#/components/schemas/HalLinkMethod'
          description: HTTP method to use when following this link.
    HalLinkMethod:
      type: string
      title: HalLinkMethod
      description: |
        HTTP method to use when following a HAL link. Restricted to
        `GET` (navigation), `POST` (actions and mutations), and `DELETE`
        (resource removal). The project does not use `PUT` or `PATCH`.
      enum:
        - GET
        - POST
        - DELETE
      example: GET
    HalSelfLinks:
      type: object
      title: HalSelfLinks
      description: |
        Base shape for every `_links` block. Guarantees that the `self` link is present
        on every HAL Resource and Collection envelope. Compose with `HalPaginationLinks`
        for paginated collections, or extend inline with action/navigation relations.
      properties:
        self:
          $ref: '#/components/schemas/HalLink'
          description: Link to the current resource.
      required:
        - self
      example:
        self:
          href: /resources/1f1a8119-4e24-4460-a126-c79f8ed0017f
          method: GET
    HalPaginationLinks:
      type: object
      title: HalPaginationLinks
      description: |
        Pagination link relations used inside the `_links` of a collection envelope.
        `first` and `last` are always present; `next` and `prev` are conditional on
        page state. Compose with `HalSelfLinks` in every `*Collection._links`.
      properties:
        first:
          $ref: '#/components/schemas/HalLink'
          description: Link to the first page of the collection.
        last:
          $ref: '#/components/schemas/HalLink'
          description: Link to the last page of the collection.
        next:
          $ref: '#/components/schemas/HalLink'
          description: Link to the next page of the collection. Omitted on the last page.
        prev:
          $ref: '#/components/schemas/HalLink'
          description: Link to the previous page of the collection. Omitted on the first page.
      required:
        - first
        - last
      example:
        first:
          href: /resources?page=1&size=20
          method: GET
        last:
          href: /resources?page=5&size=20
          method: GET
        next:
          href: /resources?page=3&size=20
          method: GET
        prev:
          href: /resources?page=1&size=20
          method: GET
    PageMetadata:
      type: object
      title: PageMetadata
      description: Pagination metadata for collection responses.
      properties:
        number:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
          description: Current page number (one-based).
          example: 1
        size:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          description: Number of items per page.
          example: 20
        total_elements:
          type: integer
          format: int64
          minimum: 0
          maximum: 999999999999
          description: Total number of items across all pages.
          example: 100
        total_pages:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          description: Total number of pages.
          example: 5
      required:
        - size
        - total_elements
        - total_pages
        - number
    Rate:
      type: object
      title: Rate
      description: |
        A percentage with fixed precision of 2 decimals.
        The actual decimal percentage is computed as `value * 10^(-2)`.
        For example, `{ "value": 1050, "scale": 2 }` represents 10.50%.
      properties:
        scale:
          type: integer
          format: int32
          minimum: 2
          maximum: 2
          const: 2
          description: Fixed number of decimal places.
          examples:
            - 2
        value:
          type: integer
          format: int64
          minimum: 0
          maximum: 10000
          description: |
            The unscaled integer value of the percentage.
            Valid range: 0 to 10000, representing 0.00% to 100.00%.
          examples:
            - 0
            - 50
            - 1050
            - 10000
      required:
        - value
        - scale
      additionalProperties: false
      examples:
        - value: 0
          scale: 2
        - value: 1050
          scale: 2
        - value: 10000
          scale: 2
    ProblemDetails:
      type: object
      title: Problem Details
      description: A RFC 9457 compliant problem detail object
      properties:
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Your current balance is 30, but that costs 50.
        instance:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://pack-solutions.com/accounts/12345/msgs/abc
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 403
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: A short, human-readable summary of the problem type.
          example: You do not have enough credit.
        type:
          type: string
          format: uri-reference
          maxLength: 2048
          description: A URI reference that identifies the problem type.
          default: about:blank
          example: https://pack-solutions.com/probs/out-of-stock
    ValidationErrorCode:
      type: string
      title: Validation Error Code
      description: |
        A machine-readable error code indicating the type of validation failure.

        Prefer the most specific code available. Use `UNPROCESSABLE` and `CUSTOM`
        only as last-resort fallbacks when no specific code fits.

        ### Presence (typically on 422 and 400)
        - `MISSING`: A required resource or related entity is missing (e.g., referenced `subscriber_id` does not exist).
        - `MISSING_FIELD`: A required field was not provided in the request body.

        ### Shape (typically on 400 and 422)
        - `INVALID`: The field value is invalid in a generic sense. Use a more specific code when applicable.
        - `INVALID_FORMAT`: The field value does not match the expected format (e.g., not a valid IBAN, UUID, ISO-8601 date).
        - `OUT_OF_RANGE`: The field value is well-formed but falls outside the accepted range — numeric bounds, temporal window, or string length.
        - `INCONSISTENT`: The field is inconsistent with another field in the same payload (e.g., `allocations` rates do not sum to 100%, `date_of_end` before `date_of_start`).

        ### State (typically on 409)
        - `ALREADY_EXISTS`: The resource or value already exists and duplicates are not allowed.
        - `INVALID_STATE`: The operation is incompatible with the current state of the resource (e.g., trying to cancel an already-executed premium, submitting a contract whose subscriber is still in `DRAFT`).

        ### Business rules (typically on 422)
        - `BUSINESS_RULE_VIOLATION`: A documented business rule is violated and no more specific code above fits (e.g., a regulatory threshold is crossed).

        ### Fallbacks
        - `UNPROCESSABLE`: Legacy generic code. **Prefer `BUSINESS_RULE_VIOLATION` or a state/shape code above.**
        - `CUSTOM`: A custom validation error not covered by the standard codes.
      enum:
        - MISSING
        - MISSING_FIELD
        - INVALID
        - INVALID_FORMAT
        - OUT_OF_RANGE
        - INCONSISTENT
        - ALREADY_EXISTS
        - INVALID_STATE
        - BUSINESS_RULE_VIOLATION
        - UNPROCESSABLE
        - CUSTOM
      example: MISSING_FIELD
    ValidationError:
      type: object
      title: Validation Error
      description: |
        A single validation error entry describing a specific issue with the request.
      properties:
        code:
          $ref: '#/components/schemas/ValidationErrorCode'
        detail:
          type: string
          minLength: 1
          maxLength: 1000
          description: A human-readable explanation of the validation error.
        pointer:
          type: string
          minLength: 1
          maxLength: 500
          pattern: ^/
          description: |
            A JSON Pointer (RFC 6901) to the field in the request body that caused the
            error. For asynchronous validations surfaced on a service request (e.g.,
            manual review rejections), the same convention is used in
            `ServiceRequestRequirement.pointer` (entries with `kind=DATA_FIELD`). Consumer
            rendering logic can therefore be shared between synchronous `422` errors and
            asynchronous INVALID requirements.

            When the offending field lives inside a HAL `_embedded` or `_links` block
            (e.g., on a 409 conflict against a resource that exposes its sub-collections
            via embedding), the pointer follows the **physical** structure of the HAL
            response and includes the `_embedded`/`_links` segments — for example
            `/_embedded/individuals/0/birth/date_of_birth`.
      required:
        - code
        - detail
    ValidationProblemDetails:
      type: object
      title: Validation Problem Details
      description: |
        An extension of RFC 9457 Problem Details that includes structured validation errors.
        Used for responses where the server needs to communicate specific field-level or business-rule validation failures.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: array
              maxItems: 100
              description: A list of validation errors that occurred during request processing.
              items:
                $ref: '#/components/schemas/ValidationError'
    BadRequest:
      type: object
      title: Bad Request
      description: Bad Request (400)
      allOf:
        - $ref: '#/components/schemas/ValidationProblemDetails'
    Unauthorized:
      type: object
      title: Unauthorized
      description: Unauthorized (401)
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      type: object
      title: Forbidden
      description: Forbidden (403)
      allOf:
