  parameters:
    ProductId:
      name: product_id
      in: path
      description: Stable unique identifier of the product (shared across versions).
      required: true
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 019eb600-25f6-77a4-b6c5-a88d54ead9d9
    FundId:
      name: fund_id
      in: path
      description: Unique identifier of the fund.
      required: true
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 019eb600-5a2c-7c10-9f4e-2b9d1e7a6c44
    PresetAllocationId:
      name: preset_allocation_id
      in: path
      description: Stable unique identifier of the preset-allocation (shared across versions).
      required: true
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
        example: 019eb600-3e4b-7686-8c8f-616a1fc4ed93
    VersionNumber:
      name: version_number
      in: path
      description: Sequential version number of the resource.
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100000
        example: 2
    ProductCode:
      name: code
      in: query
      description: Filter products by their unique functional code.
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 20
        pattern: ^[A-Z0-9_]+$
        example: SWVIE
    Isin:
      name: isin
      in: query
      description: Filter funds by their unique ISIN (or the reserved value `EURO`).
      required: false
      schema:
        type: string
        minLength: 4
        maxLength: 12
        pattern: ^(EURO|[A-Z0-9]{12})$
        example: FR0010315770
    TaxWrapperTypeFilter:
      name: tax_wrapper_type
      in: query
      description: Filter products by their tax-wrapper type.
      required: false
      schema:
        $ref: '#/components/schemas/TaxWrapperType'
    PreferentialTaxRegimeFilter:
      name: preferential_tax_regime
      in: query
      description: Filtre les produits bénéficiant du régime fiscal préférentiel indiqué.
      required: false
      schema:
        $ref: '#/components/schemas/PreferentialTaxRegime'
    RiskProfileFilter:
      name: risk_profile
      in: query
      description: Filter preset-allocations by risk profile.
      required: false
      schema:
        $ref: '#/components/schemas/RiskProfile'
    StrategyFilter:
      name: strategy
      in: query
      description: Filter preset-allocations by management strategy.
      required: false
      schema:
        $ref: '#/components/schemas/Strategy'
    EffectiveAt:
      name: effective_at
      in: query
      description: |
        Resolve the version applicable at this instant (ISO 8601). A version applies
        when `effective_from <= effective_at < effective_to`, or when
        `effective_to` is null. Defaults to the current server time when omitted.
      required: false
      schema:
        type: string
        format: date-time
        minLength: 20
        maxLength: 35
        example: 2026-06-29T00:00:00Z
    EffectiveFrom:
      name: effective_from
      in: query
      description: Keep only versions whose application period ends at or after this instant (ISO 8601).
      required: false
      schema:
        type: string
        format: date-time
        minLength: 20
        maxLength: 35
        example: 2026-01-01T00:00:00Z
    EffectiveTo:
      name: effective_to
      in: query
      description: Keep only versions whose application period starts before this instant (ISO 8601).
      required: false
      schema:
        type: string
        format: date-time
        minLength: 20
        maxLength: 35
        example: 2027-01-01T00:00:00Z
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 1
        minimum: 1
        maximum: 10000
        example: 1
      description: Page number (one-based).
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
        minimum: 1
        maximum: 100
        example: 20
      description: Maximum number of items per page.
  responses:
    BadRequest:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequest'
          example:
            value:
              type: https://pack-solutions.com/probs/bad-request
              title: Bad Request
              status: 400
              detail: The request body contains invalid or malformed fields.
              errors:
                - code: INVALID
                  detail: The value provided is not a valid date format. Expected YYYY-MM-DD.
                  pointer: /birth/date_of_birth
                - code: INVALID
                  detail: The value provided is not a valid email address.
                  pointer: /communication/email
                - code: MISSING_FIELD
                  detail: The last_name field is required.
                  pointer: /last_name
      description: Bad Request
    Unauthorized:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Unauthorized'
          example:
            value:
              type: https://pack-solutions.com/probs/unauthorized
              title: Unauthorized
              status: 401
              detail: The request requires user authentication.
      description: Unauthorized
    Forbidden:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Forbidden'
          example:
            value:
              type: https://pack-solutions.com/probs/forbidden
              title: Forbidden
              status: 403
              detail: The server understood the request, but is refusing to fulfill it.
      description: Forbidden
    NotFound:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFound'
          example:
            value:
              type: https://pack-solutions.com/probs/not-found
              title: Not Found
              status: 404
              detail: The server has not found anything matching the Request-URI.
      description: Not Found
    InternalServerError:
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/InternalServerError'
          example:
            value:
              type: https://pack-solutions.com/probs/internal-server-error
              title: Internal Server Error
              status: 500
              detail: The server encountered an unexpected condition which prevented it from fulfilling the request.
      description: Internal Server Error
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://iam.pack-solutions.com/oauth/token
          scopes:
