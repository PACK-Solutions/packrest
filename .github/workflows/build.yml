name: build

# Manual run (Actions → build → Run workflow) produces downloadable artifacts.
# Pushing a tag like `v0.1.0` additionally publishes a GitHub Release with the
# installers attached.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to create the Release on tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary — runs on both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Windows x64 (Intel/AMD). Produces the NSIS per-user setup + the MSI.
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # The bundled seed specs (public/specs/*.yaml) are gitignored and
      # generated from an external repo, so they may be absent on a fresh CI
      # checkout. Fail early with a clear message rather than shipping an app
      # with zero APIs. See the note in the PR/README: commit the specs (force
      # add) for distribution builds, or provide PACKREST_SPECS_DIR.
      - name: Verify bundled specs are present
        shell: bash
        run: |
          if ! ls public/specs/*.yaml >/dev/null 2>&1; then
            echo "::error::No specs found under public/specs/. Commit them (git add -f public/specs/*.yaml) or set PACKREST_SPECS_DIR before building."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Cache the Rust build (crate compilation is the slow part).
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS dependencies
        run: npm ci

      # Builds the frontend (npm run build → out/) and bundles the desktop app.
      # On a `v*` tag it also creates/uploads a GitHub Release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('PackRest {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false

      # Always expose the installers as workflow artifacts (handy for a plain
      # workflow_dispatch run, without cutting a release).
      - uses: actions/upload-artifact@v4
        with:
          name: packrest-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*-setup.exe
            src-tauri/target/**/release/bundle/msi/*.msi
